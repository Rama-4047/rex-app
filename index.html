
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>REX Dashboard</title>

<style>
body{
  font-family:Arial;
  background:linear-gradient(135deg,#1e3a8a,#0ea5e9);
  padding:20px;
}

.main{
  background:white;
  border-radius:12px;
  padding:20px;
  max-width:1100px;
  margin:auto;
}

h2{text-align:center;color:white;}

button{
  padding:10px 15px;
  margin:5px;
  background:#2563eb;
  color:white;
  border:none;
  border-radius:6px;
  cursor:pointer;
}
.deleteBtn{background:#dc2626;}

textarea{width:100%;margin-top:5px;}

/* ✅ TITLE */
.sectionTitle{
  text-align:center;
  font-size:20px;
  font-weight:bold;
  margin-top:10px;
}

/* ✅ CATEGORY UI */
.summaryHeader{
  display:flex;
  flex-wrap:wrap;
  gap:20px;
  justify-content:center;
  margin-top:15px;
}

.timelineCard{
  position:relative;
  width:180px;
  height:110px;
  background:#1e3a8a;
  color:white;
  border-radius:15px;

  display:flex;
  align-items:center;
  justify-content:center;

  box-shadow:0 6px 15px rgba(0,0,0,0.3);
  cursor:pointer;
  transition:0.3s;
}

.timelineCard:hover{
 transform:translateY(-5px) scale(1.05);
}

.cornerCount{
  position:absolute;
  top:0;
  left:0;
  background:#e5e7eb;
  color:#111;
  padding:6px 10px;
  font-weight:bold;
  border-radius:15px 0 10px 0;
}

.timelineTitle{
 font-size:16px;
 font-weight:bold;
 text-align:center;
}

.activeCat{
  background:#059669 !important;
}

/* Chart */
.chartWrapper{
  display:flex;
  justify-content:center;
  margin-top:15px;
}
.chartBox{
  width:80%;
  height:350px;
}

/* Cards */
.card{
  background:#f3f4f6;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
}

.row{display:flex;gap:10px;}

.box{
  height:180px;
  border:1px dashed #ccc;
  display:flex;
  align-items:center;
  justify-content:center;
}
.box img{max-width:100%;max-height:100%;}

.takeaway{
  background:#0c4a6e;
  color:white;
  padding:10px;
  margin-top:10px;
}
</style>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<!-- Chart -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>

<!-- PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

<h2>📊 REX Dashboard</h2>

<button onclick="showCreate()">New REX</button>
<button onclick="showSummary()">Summary</button>

<!-- CREATE -->
<div id="createPage" class="main">

<input type="hidden" id="editId">
<input id="title" placeholder="Title"><br><br>

<select id="cat">
<option>5S</option>
<option>Safety</option>
<option>QMS</option>
<option>Automation</option>
<option>Digitization</option>
<option>Skill Development</option>
<option>Process Capability Improvement</option>
<option>Others</option>
</select>

<br><br>

<div class="row">
<div style="flex:1">
Before
<input type="file" id="before"><br>
<img id="bImg">
<textarea id="beforeDesc"></textarea>
</div>

<div style="flex:1">
After
<input type="file" id="after"><br>
<img id="aImg">
<textarea id="afterDesc"></textarea>
</div>
</div>

<textarea id="impact"></textarea>

<div class="takeaway">
<textarea id="takeaway"></textarea>
</div>

<button onclick="save()">Save</button>

</div>

<!-- SUMMARY -->
<div id="summaryPage" class="main" style="display:none"></div>

<script>

firebase.initializeApp({
 apiKey:"AIza...",
 authDomain:"rex-multi-user-file.firebaseapp.com",
 projectId:"rex-multi-user-file"
});

const db=firebase.firestore();

/* NAV */
function showCreate(){
 createPage.style.display="block";
 summaryPage.style.display="none";
}

function showSummary(){
 createPage.style.display="none";
 summaryPage.style.display="block";
 summaryPage.innerHTML="<h3 style='text-align:center'>Loading...</h3>";
}

/* IMAGE */
let beforeData="",afterData="";

before.onchange=e=>{
 let r=new FileReader();
 r.onload=x=>{beforeData=x.target.result;bImg.src=beforeData;}
 r.readAsDataURL(e.target.files[0]);
};

after.onchange=e=>{
 let r=new FileReader();
 r.onload=x=>{afterData=x.target.result;aImg.src=afterData;}
 r.readAsDataURL(e.target.files[0]);
};

/* SAVE */
function save(){
 if(!title.value) return alert("Enter Title");

 db.collection("rex").add({
  title:title.value,
  cat:cat.value,
  before:beforeData,
  after:afterData,
  beforeDesc:beforeDesc.value,
  afterDesc:afterDesc.value,
  impact:impact.value,
  takeaway:takeaway.value
 }).then(()=>alert("Saved"));
}

/* LOAD */
db.collection("rex").onSnapshot(snap=>{

 let data=[],count={};

 snap.forEach(doc=>{
  let d=doc.data();
  if(!d.cat) return;                     /* ✅ remove undefined */

  data.push(d);
  count[d.cat]=(count[d.cat]||0)+1;
 });

 if(summaryPage.style.display==="block"){

 let html=`<h3 style="text-align:center">Dashboard</h3>

 <div class="sectionTitle">REX Category</div>

 <div class="summaryHeader">`;

 for(let c in count){
 html+=`
 <div class="timelineCard">
   <div class="cornerCount">${count[c]}</div>
   <div class="timelineTitle">${c}</div>
 </div>`;
 }

 html+=`</div>

 <div class="chartWrapper">
 <div class="chartBox"><canvas id="barChart"></canvas></div>
 </div>

 <button onclick="exportPDF()">Export PDF</button>

 <div id="rexList"></div>`;

 summaryPage.innerHTML=html;

 createChart(count);
 }
});

/* ✅ CLEAN CHART */
function createChart(count){

 new Chart(barChart,{
  type:'bar',
  data:{
   labels:Object.keys(count),
   datasets:[{
    label:"REX Count",        /* ✅ remove undefined */
    data:Object.values(count),
    backgroundColor:[
     '#3b82f6','#10b981','#f59e0b',
     '#ef4444','#8b5cf6','#14b8a6'
    ]
   }]
  }
 });
}

</script>

</body>
</html>
