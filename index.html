
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>REX</title>

<style>
body{font-family:Arial;padding:20px;background:#f0f2f5;}
button{padding:8px 12px;background:blue;color:white;border:none;cursor:pointer;margin:5px;}
.box{border:1px solid black;height:120px;display:flex;align-items:center;justify-content:center;}
.box img{max-width:100%;max-height:100%;}
.template{background:white;padding:10px;margin:10px 0;}
</style>

</head>

<body>

<h2>REX System</h2>

<input id="title" placeholder="Title"><br><br>

<select id="cat">
<option>5S</option>
<option>Safety</option>
<option>QMS</option>
<option>Automation</option>
<option>Others</option>
</select>

<br><br>

<input type="file" id="beforeFile"><br>
<img id="beforeImg" width="150"><br>

<input type="file" id="afterFile"><br>
<img id="afterImg" width="150"><br>

<br>

<textarea id="impact" placeholder="Impact"></textarea><br><br>

<button onclick="saveData()">Save</button>

<hr>

<div id="summary"></div>

<script>
let beforeData="", afterData="";

beforeFile.onchange = function(){
 let r=new FileReader();
 r.onload=e=>{
  beforeData=e.target.result;
  beforeImg.src=beforeData;
 };
 r.readAsDataURL(this.files[0]);
};

afterFile.onchange = function(){
 let r=new FileReader();
 r.onload=e=>{
  afterData=e.target.result;
  afterImg.src=afterData;
 };
 r.readAsDataURL(this.files[0]);
};
</script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCPUL-TGaO2PY7zYC3d1Eyx6J2oHjHWoyE",
  authDomain: "rex-multi-user-file.firebaseapp.com",
  projectId: "rex-multi-user-file",
  storageBucket: "rex-multi-user-file.appspot.com",
  messagingSenderId: "755387388691",
  appId: "1:755387388691:web:476a69ef829c22fcc700e6"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ✅ SAVE
window.saveData = async function(){

 let t = document.getElementById("title").value;

 if(!t){
  alert("Enter title");
  return;
 }

 await addDoc(collection(db,"rex"),{
  title:t,
  cat:cat.value,
  before:beforeData,
  after:afterData,
  impact:impact.value
 });

 alert("Saved ✅");
};

// ✅ LOAD DATA
onSnapshot(collection(db,"rex"),snap=>{

 let html="";

 snap.forEach(doc=>{
  let d = doc.data();

  html += `
  <div class="template">
    <b>${d.title}</b> (${d.cat})
    <div style="display:flex;gap:10px;">
      <div class="box">${d.before?`<img src="${d.before}>
      <div class="box">${d.after?`<img srcr}`:""}</div>
    </div>
    <div>${d.impact || ""}</div>
  </div>`;
 });

 document.getElementById("summary").innerHTML = html;
});

</script>

</body>
</html>
