
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>REX Dashboard</title>

<style>

/* ✅ BACKGROUND */
body{
  font-family:Arial;
  background:#0f1f4a;
  padding:20px;
}

/* ✅ HEADER */
.header{
  background:linear-gradient(90deg,#1e3a8a,#0ea5e9);
  padding:20px;
  border-radius:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  max-width:1100px;
  margin:auto;
}

/* HEADER LEFT */
.headerTitle{
  display:flex;
  align-items:center;
  color:white;
  font-size:22px;
  font-weight:bold;
}

/* BUTTONS */
.headerBtns button{
  padding:10px 18px;
  border-radius:10px;
  border:none;
  margin-left:10px;
  cursor:pointer;
  font-weight:600;
}

/* ✅ BUTTON STYLES */
.btnPrimary{
  background:#e5e7eb;
  color:#1e3a8a;
}

.btnOutline{
  background:transparent;
  border:2px solid white;
  color:white;
}

/* ✅ MAIN */
.main{
  background:#f3f4f6;
  border-radius:15px;
  padding:20px;
  max-width:1100px;
  margin:20px auto;
}

/* ✅ CATEGORY */
.summaryHeader{
 display:flex;
 flex-wrap:wrap;
 gap:15px;
 justify-content:center;
}

.timelineCard{
 background:#2b3f8f;
 color:white;
 padding:20px;
 border-radius:15px;
 cursor:pointer;
 text-align:center;
 position:relative;
 min-width:160px;
 box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

.cornerCount{
 position:absolute;
 top:-10px;
 left:-10px;
 background:#d1d5db;
 color:black;
 padding:5px 10px;
 border-radius:10px;
 font-weight:bold;
}

/* ✅ CHART */
.chartWrapper{
 display:flex;
 justify-content:center;
}
.chartBox{
 width:80%;
 height:350px;
}

/* ✅ CARDS */
.card{
 background:white;
 padding:15px;
 margin-top:10px;
 border-radius:10px;
}

.row{
 display:flex;
 gap:10px;
}

.box{
 height:160px;
 border:1px dashed #ccc;
 display:flex;
 justify-content:center;
 align-items:center;
}
.box img{
 max-width:100%;
 max-height:100%;
}

.desc{
 font-size:13px;
 margin-top:5px;
}

.takeaway{
 background:#1e3a8a;
 color:white;
 padding:8px;
 margin-top:6px;
 border-radius:6px;
}

button{
 margin-top:5px;
}

.deleteBtn{
 background:#dc2626;
 color:white;
}

textarea{width:100%;margin-top:5px;}

</style>

<!-- ✅ LIBRARIES -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

<!-- ✅ HEADER -->
<div class="header">

  <div class="headerTitle">
    📊 REX Dashboard
  </div>

  <div class="headerBtns">
    <button class="btnPrimary" onclick="showCreate()">+ New REX</button>
    <button class="btnOutline" onclick="showSummary()">Summary</button>
  </div>

</div>

<!-- CREATE -->
<div id="createPage" class="main">

<input type="hidden" id="editId">

<input id="title" placeholder="Title"><br><br>

<select id="cat">
<option>5S</option>
<option>Safety</option>
<option>QMS</option>
<option>Automation</option>
<option>Digitization</option>
<option>Others</option>
</select>

<br><br>

<div class="row">
<div style="flex:1">
Before <input type="file" id="before"><br>
<img id="bImg">
<textarea id="beforeDesc"></textarea>
</div>

<div style="flex:1">
After <input type="file" id="after"><br>
<img id="aImg">
<textarea id="afterDesc"></textarea>
</div>
</div>

<textarea id="impact"></textarea>

<div class="takeaway">
<textarea id="takeaway"></textarea>
</div>

<button onclick="save()">Save</button>

</div>

<!-- SUMMARY -->
<div id="summaryPage" class="main" style="display:none"></div>

<script>

/* Firebase */
firebase.initializeApp({
 apiKey:"AIzaSyCPUL-TGaO2PY7zYC3d1Eyx6J2oHjHWoyE",
 authDomain:"rex-multi-user-file.firebaseapp.com",
 projectId:"rex-multi-user-file"
});

const db=firebase.firestore();

/* NAV */
function showCreate(){
 createPage.style.display="block";
 summaryPage.style.display="none";
}
function showSummary(){
 createPage.style.display="none";
 summaryPage.style.display="block";
 summaryPage.innerHTML="<h3>Loading...</h3>";
}

/* SAVE */
function save(){

 let id=editId.value;

 let data={
  title:title.value,
  cat:cat.value,
  beforeDesc:beforeDesc.value,
  afterDesc:afterDesc.value,
  impact:impact.value,
  takeaway:takeaway.value
 };

 if(id){
  db.collection("rex").doc(id).update(data).then(()=>alert("Updated"));
 }else{
  db.collection("rex").add(data).then(()=>alert("Saved"));
 }
}

/* LOAD */
db.collection("rex").onSnapshot(snap=>{

 let data=[],count={};

 snap.forEach(doc=>{
  let d=doc.data();
  d.id=doc.id;
  data.push(d);
  count[d.cat]=(count[d.cat]||0)+1;
 });

 if(summaryPage.style.display==="block"){

 let html="<h3 style='text-align:center'>Dashboard</h3>";

 html+="<div class='summaryHeader'>";

 for(let c in count){
 html+=`
 <div class="timelineCard" onclick="filter('${c}')">
  <div class="cornerCount">${count[c]}</div>
  ${c}
 </div>`;
 }

 html+="</div>";

 html+=`
 <div class="chartWrapper">
 <div class="chartBox">
 <canvas id="barChart"></canvas>
 </div>
 </div>

 <button onclick="showAll()">Show All</button>
 <button onclick="exportPDF()">Export PDF</button>

 <div id="rexList"></div>`;

 summaryPage.innerHTML=html;

 window.allData=data;

 renderList(data);
 createChart(count);
 }

});

/* CHART */
function createChart(count){

 let labels=Object.keys(count);
 let values=Object.values(count);

 new Chart(barChart,{
  type:'bar',
  data:{labels:labels,datasets:[{data:values}]},
  plugins:[ChartDataLabels]
 });
}

/* FILTER */
function filter(cat){
 renderList(allData.filter(d=>d.cat===cat));
}
function showAll(){renderList(allData);}

/* DISPLAY */
function renderList(data){

 rexList.innerHTML=data.map(d=>`
 <div class="card">
 <b>${d.title} (${d.cat})</b>

 <div>${d.beforeDesc||""}</div>
 <div>${d.afterDesc||""}</div>
 <div>${d.impact||""}</div>

 <div class="takeaway">${d.takeaway||""}</div>

 <button onclick="edit('${d.id}')">Edit</button>
 <button class="deleteBtn" onclick="del('${d.id}')">Delete</button>

 </div>
 `).join('');
}

/* EDIT */
function edit(id){
 let d=allData.find(x=>x.id===id);
 showCreate();

 editId.value=id;
 title.value=d.title;
 cat.value=d.cat;
 beforeDesc.value=d.beforeDesc||"";
 afterDesc.value=d.afterDesc||"";
 impact.value=d.impact||"";
 takeaway.value=d.takeaway||"";
}

/* DELETE */
function del(id){
 if(confirm("Delete?")){
  db.collection("rex").doc(id).delete();
 }
}

/* PDF */
async function exportPDF(){
 const {jsPDF}=window.jspdf;
 let canvas=await html2canvas(rexList);
 let pdf=new jsPDF();
 pdf.addImage(canvas,"PNG",0,0);
 pdf.save("REX_Report.pdf");
}

</script>

</body>
</html>
