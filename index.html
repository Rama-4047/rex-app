
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>REX Dashboard</title>

<style>
body{
  font-family:Arial;
  background:linear-gradient(135deg,#1e3a8a,#0ea5e9);
  padding:20px;
}

.main{
  background:white;
  border-radius:12px;
  padding:20px;
  max-width:1100px;
  margin:auto;
}

h2{text-align:center;color:white;}

button{
  padding:10px 15px;
  margin:5px;
  background:#2563eb;
  color:white;
  border:none;
  border-radius:6px;
  cursor:pointer;
}
.deleteBtn{background:#dc2626;}

textarea{width:100%;margin-top:5px;}

.summaryHeader{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  justify-content:center;
}
.catCard{
  background:#1e3a8a;
  color:white;
  padding:8px 14px;
  border-radius:25px;
  cursor:pointer;
}
.activeCat{background:#059669 !important;}

.chartWrapper{
  display:flex;
  justify-content:center;
  margin-top:20px;
}
.chartBox{
  width:80%;
  height:350px;
}

.card{
  background:#f3f4f6;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
}

.row{display:flex;gap:10px;}

.box{
  height:180px;
  border:1px dashed #ccc;
  display:flex;
  align-items:center;
  justify-content:center;
}
.box img{max-width:100%;max-height:100%;}
</style>

<!-- ✅ Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<!-- ✅ Chart -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>

</head>

<body>

<h2>📊 REX Dashboard</h2>

<button onclick="showCreate()">New REX</button>
<button onclick="showSummary()">Summary</button>

<!-- CREATE -->
<div id="createPage" class="main">

<input type="hidden" id="editId">
<input id="title" placeholder="Title"><br><br>

<select id="cat">
<option>5S</option>
<option>Safety</option>
<option>QMS</option>
<option>Automation</option>
<option>Digitization</option>
<option>Skill Development</option>
<option>Process Capability Improvement</option>
<option>Others</option>
</select>

<br><br>

<div class="row">
<div style="flex:1">
Before
<input type="file" id="before"><br>
<img id="bImg">
<textarea id="beforeDesc"></textarea>
</div>

<div style="flex:1">
After
<input type="file" id="after"><br>
<img id="aImg">
<textarea id="afterDesc"></textarea>
</div>
</div>

<textarea id="impact"></textarea>
<textarea id="takeaway"></textarea>

<button onclick="save()">Save</button>
</div>

<!-- SUMMARY -->
<div id="summaryPage" class="main" style="display:none"></div>

<script>

/* Firebase */
firebase.initializeApp({
 apiKey:"AIzaSyCPUL-TGaO2PY7zYC3d1Eyx6J2oHjHWoyE",
 authDomain:"rex-multi-user-file.firebaseapp.com",
 projectId:"rex-multi-user-file"
});

const db=firebase.firestore();

/* NAV */
function showCreate(){
 createPage.style.display="block";
 summaryPage.style.display="none";
}
function showSummary(){
 createPage.style.display="none";
 summaryPage.style.display="block";
 summaryPage.innerHTML="<h3>Loading...</h3>";
}

/* Image */
let beforeData="",afterData="";

before.onchange=e=>{
 let r=new FileReader();
 r.onload=x=>{beforeData=x.target.result;bImg.src=beforeData;}
 r.readAsDataURL(e.target.files[0]);
};

after.onchange=e=>{
 let r=new FileReader();
 r.onload=x=>{afterData=x.target.result;aImg.src=afterData;}
 r.readAsDataURL(e.target.files[0]);
};

/* ✅ SAVE + EDIT FIX */
function save(){

 if(!title.value) return alert("Enter Title");

 let id=editId.value;

 let data={
  title:title.value,
  cat:cat.value,
  before:beforeData,
  after:afterData,
  beforeDesc:beforeDesc.value,
  afterDesc:afterDesc.value,
  impact:impact.value,
  takeaway:takeaway.value
 };

 if(id){
   db.collection("rex").doc(id).update(data)
     .then(()=>{
       alert("✅ Updated");
       resetForm();
     });

 }else{
   db.collection("rex").add(data)
     .then(()=>{
       alert("✅ Saved");
       resetForm();
     });
 }
}

/* ✅ RESET FORM */
function resetForm(){
 editId.value="";
 title.value="";
 beforeData="";
 afterData="";
 bImg.src="";
 aImg.src="";
 beforeDesc.value="";
 afterDesc.value="";
 impact.value="";
 takeaway.value="";
}

/* LOAD */
db.collection("rex").onSnapshot(snap=>{

 let data=[],count={};

 snap.forEach(doc=>{
  let d=doc.data();
  d.id=doc.id;

  data.push(d);
  count[d.cat]=(count[d.cat]||0)+1;
 });

 if(summaryPage.style.display==="block"){

 summaryPage.innerHTML=`
 <div class="summaryHeader">
 ${Object.keys(count).map(c=>
 `<div class="catCard" onclick="filterCategory('${c}',this)">
 ${c}<br>${count[c]}</div>`).join('')}
 </div>

 <div class="chartWrapper">
  <div class="chartBox">
   <canvas id="barChart"></canvas>
  </div>
 </div>

 <div id="rexList"></div>`;

 window.allData=data;

 renderList(data);
 createChart(count);
 }
});

/* EDIT */
function edit(id){
 let d=allData.find(x=>x.id===id);

 showCreate();

 editId.value=id;
 title.value=d.title;
 cat.value=d.cat;

 beforeData=d.before || "";
 afterData=d.after || "";

 bImg.src=beforeData;
 aImg.src=afterData;

 beforeDesc.value=d.beforeDesc || "";
 afterDesc.value=d.afterDesc || "";
 impact.value=d.impact || "";
 takeaway.value=d.takeaway || "";
}

/* DELETE */
function del(id){
 if(confirm("Delete?")){
  db.collection("rex").doc(id).delete();
 }
}

/* FILTER */
function filterCategory(cat,el){
 document.querySelectorAll('.catCard').forEach(x=>x.classList.remove("activeCat"));
 el.classList.add("activeCat");
 renderList(allData.filter(d=>d.cat===cat));
}

/* RENDER */
function renderList(data){
 rexList.innerHTML=data.map(d=>`
 <div class="card">
 <b>${d.title}</b>

 <div class="row">
 <div class="box">${d.before?'<img src="'+d.before+'">':''}</div>
 <div class="box">${d.after?'<img src="'+d.after+'">':''}</div>
 </div>

 <button onclick="edit('${d.id}')">Edit</button>
 <button class="deleteBtn" onclick="del('${d.id}')">Delete</button>

 </div>
 `).join('');
}

/* ✅ CHART */
function createChart(count){

 let values=Object.values(count);
 let max=Math.max(...values)||1;

 new Chart(document.getElementById("barChart"),{
  type:'bar',
  data:{
   labels:Object.keys(count),
   datasets:[{
    data:values,
    backgroundColor:[
     '#3b82f6','#10b981','#f59e0b','#ef4444',
     '#8b5cf6','#14b8a6','#f97316'
    ]
   }]
  },
  plugins:[ChartDataLabels],
  options:{
   scales:{
    y:{
      beginAtZero:true,
      suggestedMax:Math.ceil(max*1.2),
      ticks:{stepSize:Math.ceil(max/5)}
    }
   }
  }
 });
}

</script>

</body>
</html>
