
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>REX Dashboard</title>

<style>
body{
  font-family:Arial;
  background:linear-gradient(135deg,#1e3a8a,#0ea5e9);
  padding:20px;
}

/* Main */
.main{
  background:white;
  border-radius:12px;
  padding:20px;
  max-width:1100px;
  margin:auto;
}

h2{text-align:center;color:white;}

button{
  padding:10px 15px;
  margin:5px;
  background:#2563eb;
  color:white;
  border:none;
  border-radius:6px;
  cursor:pointer;
}
.deleteBtn{background:#dc2626;}

/* KPI */
.kpiContainer{
  display:flex;
  justify-content:center;
  gap:15px;
}
.kpi{
  width:170px;
  padding:10px;
  color:white;
  text-align:center;
  border-radius:8px;
}
.kpi1{background:#3b82f6;}
.kpi2{background:#10b981;}
.kpi3{background:#f59e0b;}

/* Category Pills */
.summaryHeader{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  justify-content:center;
}
.catCard{
  background:#1e3a8a;
  color:white;
  padding:8px 14px;
  border-radius:25px;
  cursor:pointer;
}
.activeCat{background:#059669 !important;}

/* Chart */
.chartWrapper{
  display:flex;
  justify-content:center;
  margin-top:15px;
}
.chartBox{
  width:80%;
  height:350px;
}

/* Cards */
.card{
  background:#f8fafc;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
}

.row{display:flex;gap:10px;}

.box{
  height:180px;
  border:1px dashed #ccc;
  display:flex;
  align-items:center;
  justify-content:center;
}
.box img{max-width:100%;max-height:100%;}

.section{font-weight:bold;margin-top:5px;}

textarea{width:100%;margin-top:5px;}

.takeaway{background:#0c4a6e;color:white;padding:10px;margin-top:10px;}
</style>

<!-- ✅ FIREBASE -->
<script src="https://www.gstatic.com/firebasejsase-app.js</script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<!-- ✅ CHART FIXED -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>

<!-- ✅ PDF FIXED -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

<h2>📊 REX Management System</h2>

<button onclick="showCreate()">New REX</button>
<button onclick="showSummary()">Summary</button>

<!-- CREATE -->
<div id="createPage" class="main">

<input type="hidden" id="editId">

<input id="title" placeholder="Title"><br><br>

<select id="cat">
<option>5S</option>
<option>Safety</option>
<option>QMS</option>
<option>Automation</option>
<option>Digitization</option>
<option>Skill Development</option>
<option>Process Capability Improvement</option>
<option>Others</option>
</select>

<br><br>

<div class="row">

<div style="flex:1">
<div class="section">Before</div>
<input type="file" id="before"><br>
<img id="bImg">
<textarea id="beforeDesc"></textarea>
</div>

<div style="flex:1">
<div class="section">After</div>
<input type="file" id="after"><br>
<img id="aImg">
<textarea id="afterDesc"></textarea>
</div>

</div>

<div class="section">Impact</div>
<textarea id="impact"></textarea>

<div class="takeaway">
<textarea id="takeaway"></textarea>
</div>

<button onclick="save()">Save</button>

</div>

<!-- SUMMARY -->
<div id="summaryPage" class="main" style="display:none"></div>

<script>

/* Firebase */
firebase.initializeApp({
 apiKey:"AIzaSyCPUL-TGaO2PY7zYC3d1Eyx6J2oHjHWoyE",
 authDomain:"rex-multi-user-file.firebaseapp.com",
 projectId:"rex-multi-user-file"
});

const db=firebase.firestore();

/* NAV */
function showCreate(){
 createPage.style.display="block";
 summaryPage.style.display="none";
}

function showSummary(){
 createPage.style.display="none";
 summaryPage.style.display="block";
 summaryPage.innerHTML="<h3 style='text-align:center'>⏳ Loading Dashboard...</h3>";
}

/* IMAGE */
let beforeData="",afterData="";

before.onchange=e=>{
 let r=new FileReader();
 r.onload=x=>{beforeData=x.target.result;bImg.src=beforeData;}
 r.readAsDataURL(e.target.files[0]);
};

after.onchange=e=>{
 let r=new FileReader();
 r.onload=x=>{afterData=x.target.result;aImg.src=afterData;}
 r.readAsDataURL(e.target.files[0]);
};

/* SAVE */
function save(){

 let id=editId.value;

 let data={
  title:title.value,
  cat:(cat.value||"Others").trim(),
  before:beforeData,
  after:afterData,
  beforeDesc:beforeDesc.value,
  afterDesc:afterDesc.value,
  impact:impact.value,
  takeaway:takeaway.value
 };

 if(id){
  db.collection("rex").doc(id).update(data);
 }else{
  db.collection("rex").add(data);
 }

 alert("Saved");
 editId.value="";
}

/* LOAD */
db.collection("rex").onSnapshot(snap=>{

 let data=[],count={};

 snap.forEach(doc=>{
  let d=doc.data();
  d.id=doc.id;

  data.push(d);
  count[d.cat]=(count[d.cat]||0)+1;
 });

 if(summaryPage.style.display==="block"){

 let html=`<h3 style="text-align:center">Dashboard</h3>

 <div class="kpiContainer">
  <div class="kpi kpi1">Total<br>${data.length}</div>
  <div class="kpi kpi2">Categories<br>${Object.keys(count).length}</div>
  <div class="kpi kpi3">Displayed<br>${data.length}</div>
 </div>

 <div class="summaryHeader">`;

 for(let c in count){
  html+=`<div class="catCard" onclick="filterCategory('${c}',this)">
  ${c}<br>${count[c]}</div>`;
 }

 html+=`</div>

 <div class="chartWrapper">
  <div class="chartBox">
   <canvas id="barChart"></canvas>
  </div>
 </div>

 <div style="text-align:center">
  <button onclick="showAll()">Show All</button>
  <button onclick="exportPDF()">Export PDF</button>
 </div>

 <div id="rexList"></div>`;

 summaryPage.innerHTML=html;

 window.allData=data;

 renderList(data);
 createChart(count);
 }
});

/* FILTER */
function filterCategory(cat,el){
 document.querySelectorAll('.catCard').forEach(x=>x.classList.remove("activeCat"));
 el.classList.add("activeCat");
 renderList(allData.filter(d=>d.cat===cat));
}

function showAll(){
 renderList(allData);
}

/* ✅ BAR CHART FINAL */
function createChart(count){

 let labels = Object.keys(count);
 let values = Object.values(count);

 let max = Math.max(...values)||1;

 let colors = [
  '#3b82f6','#10b981','#f59e0b','#ef4444',
  '#8b5cf6','#14b8a6','#f97316'
 ];

 if(window.chartObj) window.chartObj.destroy();

 window.chartObj = new Chart(document.getElementById("barChart"),{
  type:'bar',
  data:{
   labels:labels,
   datasets:[{
     data:values,
     backgroundColor:colors.slice(0,labels.length),
     borderRadius:8,
     barPercentage:0.6
   }]
  },
  plugins:[ChartDataLabels],
  options:{
   maintainAspectRatio:false,

   plugins:{
     legend:{display:false},
     datalabels:{
       anchor:'end',
       align:'top',
       formatter:v=>v
     }
   },

   scales:{
     y:{
       beginAtZero:true,
       suggestedMax:Math.ceil(max*1.2),
       ticks:{stepSize:Math.ceil(max/5)||1}
     }
   }
  }
 });
}

/* RENDER */
function renderList(data){

 let html="";

 data.forEach(d=>{
 html+=`
 <div class="card">
 <b>${d.title} (${d.cat})</b>

 <div class="row">
 <div style="flex:1">
 Before
 <div class="box">${d.before?'<img src="'+d.before+'">':''}</div>
 </div>

 <div style="flex:1">
 After
 <div class="box">${d.after?'<img src="'+d.after+'">':''}</div>
 </div>
 </div>

 <div>${d.impact||""}</div>

 <button onclick="edit('${d.id}')">Edit</button>
 <button class="deleteBtn" onclick="del('${d.id}')">Delete</button>

 </div>`;
 });

 rexList.innerHTML=html;
}

/* EDIT */
function edit(id){
 let d=allData.find(x=>x.id===id);
 showCreate();

 editId.value=id;
 title.value=d.title;
 cat.value=d.cat;

 beforeData=d.before;
 afterData=d.after;

 bImg.src=beforeData;
 aImg.src=afterData;
}

/* DELETE */
function del(id){
 if(confirm("Delete?")){
  db.collection("rex").doc(id).delete();
 }
}

/* PDF */
async function exportPDF(){
 const {jsPDF}=window.jspdf;

 let canvas=await html2canvas(rexList,{scale:2});
 let img=canvas.toDataURL("image/png");

 let pdf=new jsPDF("p","mm","a4");

 let w=210;
 let h=canvas.height*w/canvas.width;

 pdf.addImage(img,"PNG",0,0,w,h);
 pdf.save("REX_Report.pdf");
}

</script>

</body>
</html>
