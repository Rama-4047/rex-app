
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>REX Dashboard</title>

<style>
body{
  font-family:Arial;
  background:linear-gradient(135deg,#1e3a8a,#0ea5e9);
  padding:20px;
}

/* TOP */
h2{
  text-align:center;
  color:white;
}

button{
  padding:10px;
  margin:5px;
  background:#2563eb;
  color:white;
  border:none;
  border-radius:6px;
}

/* MAIN */
.main{
  background:white;
  border-radius:10px;
  padding:20px;
  margin-top:10px;
}

/* CATEGORY */
.summaryHeader{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  justify-content:center;
}

.catCard{
  background:#1e3a8a;
  color:white;
  padding:10px;
  border-radius:20px;
  cursor:pointer;
  text-align:center;
}

.activeCat{
  background:#059669;
}

/* CHART */
.chartWrapper{
  display:flex;
  justify-content:center;
}

.chartBox{
  width:80%;
  height:350px;
}

/* CARDS */
.card{
  background:#f3f4f6;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
}

.row{
  display:flex;
  gap:10px;
}

.box{
  height:150px;
  border:1px dashed #aaa;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

.box img{
  max-width:100%;
  max-height:100%;
}

.section{
  font-weight:bold;
  margin-top:5px;
}

/* TEXT */
.descBox{
  background:#f1f5f9;
  padding:6px;
}

.impactBox{
  background:#e0f2fe;
  padding:6px;
  margin-top:5px;
}

.takeaway{
  background:#0c4a6e;
  color:white;
  padding:6px;
  margin-top:5px;
}

/* IMAGE ZOOM */
#imgModal{
 display:none;
 position:fixed;
 top:0;
 left:0;
 width:100%;
 height:100%;
 background:rgba(0,0,0,0.8);
 justify-content:center;
 align-items:center;
}
#imgModal img{
 max-width:90%;
 max-height:90%;
}
</style>

<!-- ✅ LIBRARIES -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>
</head>

<body>

<h2>📊 REX Dashboard</h2>

<button onclick="showCreate()">New REX</button>
<button onclick="showSummary()">Summary</button>

<!-- CREATE -->
<div id="createPage" class="main">

<input type="hidden" id="editId">

<input id="title" placeholder="Title"><br><br>

<select id="cat">
<option>5S</option>
<option>Safety</option>
<option>QMS</option>
<option>Automation</option>
<option>Digitization</option>
<option>Others</option>
</select>

<br><br>

<div class="row">

<div style="flex:1">
<div class="section">Before</div>
<input type="file" id="before"><br>
<img id="bImg">
<textarea id="beforeDesc"></textarea>
</div>

<div style="flex:1">
<div class="section">After</div>
<input type="file" id="after"><br>
<img id="aImg">
<textarea id="afterDesc"></textarea>
</div>

</div>

<div class="section">Impact</div>
<textarea id="impact"></textarea>

<div class="takeaway">
<textarea id="takeaway"></textarea>
</div>

<button onclick="save()">Save</button>
</div>

<!-- SUMMARY -->
<div id="summaryPage" class="main" style="display:none"></div>

<!-- IMAGE ZOOM -->
<div id="imgModal" onclick="this.style.display='none'">
<img id="zoomImg">
</div>

<script>

/* FIREBASE */
firebase.initializeApp({
 apiKey:"AIzaSyCPUL-TGaO2PY7zYC3d1Eyx6J2oHjHWoyE",
 authDomain:"rex-multi-user-file.firebaseapp.com",
 projectId:"rex-multi-user-file"
});

const db=firebase.firestore();

/* NAV */
function showCreate(){
 createPage.style.display="block";
 summaryPage.style.display="none";
}

function showSummary(){
 createPage.style.display="none";
 summaryPage.style.display="block";
 summaryPage.innerHTML="<h3>Loading...</h3>";
}

/* IMAGE */
let beforeData="", afterData="";

before.onchange=e=>{
 let r=new FileReader();
 r.onload=x=>{
  beforeData=x.target.result;
  bImg.src=beforeData;
 };
 r.readAsDataURL(e.target.files[0]);
};

after.onchange=e=>{
 let r=new FileReader();
 r.onload=x=>{
  afterData=x.target.result;
  aImg.src=afterData;
 };
 r.readAsDataURL(e.target.files[0]);
};

/* SAVE */
function save(){

 let data={
  title:title.value,
  cat:cat.value,
  before:beforeData,
  after:afterData,
  beforeDesc:beforeDesc.value,
  afterDesc:afterDesc.value,
  impact:impact.value,
  takeaway:takeaway.value
 };

 db.collection("rex").add(data).then(()=>alert("Saved"));
}

/* LOAD */
db.collection("rex").onSnapshot(snap=>{

 let data=[], count={};

 snap.forEach(doc=>{
  let d=doc.data();
  d.id=doc.id;

  data.push(d);
  count[d.cat] = (count[d.cat]||0)+1;
 });

 if(summaryPage.style.display==="block"){

 let html="<h3 style='text-align:center'>Summary</h3>";

 html+="<div class='summaryHeader'>";
 for(let c in count){
 html+=`<div class="catCard" onclick="filter('${c}',this)">
 ${c}<br>${count[c]}</div>`;
 }
 html+="</div>";

 html+=`
 <div class="chartWrapper">
  <div class="chartBox">
  <canvas id="barChart"></canvas>
  </div>
 </div>

 <button onclick="showAll()">Show All</button>

 <div id="rexList"></div>`;

 summaryPage.innerHTML=html;

 window.allData=data;

 renderList(data);
 createChart(count);
 }

});

/* ✅ CHART */
function createChart(count){

 let labels=Object.keys(count);
 let values=Object.values(count);

 new Chart(document.getElementById("barChart"),{

  type:'bar',

  data:{
   labels:labels,
   datasets:[{
    data:values,
    backgroundColor:['#3b82f6','#10b981','#f59e0b','#ef4444','#8b5cf6']
   }]
  },

  plugins:[ChartDataLabels],

  options:{
   plugins:{
    datalabels:{
     anchor:'end',
     align:'top'
    }
   },
   onClick:(e,el)=>{
    if(el.length){
     let index=el[0].index;
     let cat=labels[index];
     filter(cat);
    }
   }
  }
 });
}

/* FILTER */
function filter(cat,el){
 document.querySelectorAll('.catCard').forEach(x=>x.classList.remove("activeCat"));
 if(el) el.classList.add("activeCat");
 renderList(allData.filter(d=>d.cat===cat));
}

function showAll(){
 renderList(allData);
}

/* ✅ DISPLAY */
function renderList(data){

 let html="";

 data.forEach(d=>{
 html+=`
 <div class="card">

 <b>${d.title} (${d.cat})</b>

 <div class="row">

 <div style="flex:1">
 <div class="section">Before</div>
 <div class="box" onclick="zoom('${d.before}')">
 <img src="${d.before
 <div class="descBox">${d.beforeDesc||""}</div>
 </div>

 <div style="flex:1">
 <div class="section">After</div>
 <div class="box" onclick="zoom('${d.after}')">
 <img src="${d</div>
 <div class="descBox">${d.afterDesc||""}</div>
 </div>

 </div>

 <div class="impactBox"><b>Impact:</b> ${d.impact||""}</div>

 <div class="takeaway"><b>Takeaway:</b> ${d.takeaway||""}</div>

 </div>`;
 });

 rexList.innerHTML=html;
}

/* IMAGE ZOOM */
function zoom(src){
 zoomImg.src=src;
 imgModal.style.display="flex";
}

</script>

</body>
</html>
