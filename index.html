
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>REX Management</title>

<style>
body{font-family:Arial;margin:20px;background:#eef1f5;}
button{padding:10px 15px;background:#005a9e;color:white;border:none;margin:5px;cursor:pointer;}
.template{background:white;padding:20px;margin-top:20px;border-radius:10px;}
.row{display:flex;gap:20px;}
.col{flex:1;}
.box{border:2px solid black;height:180px;display:flex;align-items:center;justify-content:center;}
.box img{max-width:100%;max-height:100%;}
.desc{border:2px solid black;margin-top:10px;padding:8px;}
.impact{display:flex;border:2px solid black;margin-top:15px;}
.impact div{flex:1;padding:10px;}
.takeaway{background:#003d66;color:white;padding:10px;margin-top:15px;text-align:center;}
</style>
</head>

<body>

<h2>REX Management System</h2>
<button onclick="showCreate()">New REX</button>
<button onclick="showSummary()">Summary</button>

<div id="createPage">
<input id="title" placeholder="REX Title"><br><br>

<select id="cat">
<option>5S</option>
<option>Safety</option>
<option>QMS</option>
<option>Automation</option>
<option>Others</option>
</select>

<div class="template">
<div class="row">

<div class="col">
<b>BEFORE</b><br>
<input type="file" id="beforeFile">
<div class="box"><img id="beforeImg" style="display:none"></div>
<textarea id="beforeDesc" class="desc"></textarea>
</div>

<div class="col">
<b>AFTER</b><br>
<input type="file" id="afterFile">
<div class="box"><img id="afterImg" style="display:none"></div>
<textarea id="afterDesc" class="desc"></textarea>
</div>

</div>

<div class="impact">
<div><b>Impact</b></div>
<div><textarea id="impact" style="width:100%;border:none"></textarea></div>
</div>

<div class="takeaway">
<textarea id="takeaway" style="width:100%;border:none"></textarea>
</div>

</div>

<button onclick="saveRex()">Save REX</button>
</div>

<div id="summaryPage" style="display:none"></div>

<script>
var rexList=[];
var beforeData="", afterData="";
var editIndex=-1;

/* IMAGE */
function loadImage(input,type){
 var reader=new FileReader();
 reader.onload=e=>{
  if(type==="before"){beforeData=e.target.result; beforeImg.src=beforeData; beforeImg.style.display="block";}
  else{afterData=e.target.result; afterImg.src=afterData; afterImg.style.display="block";}
 };
 reader.readAsDataURL(input.files[0]);
}

beforeFile.onchange=()=>loadImage(beforeFile,"before");
afterFile.onchange=()=>loadImage(afterFile,"after");

/* SHOW */
function showSummary(){
 createPage.style.display="none";
 summaryPage.style.display="block";

 let html="";
 rexList.forEach((d,i)=>{
  html+=`
  <div class='template'>
  <b>${d.title}</b> (${d.cat})
  <button onclick="editRex(${i})">Edit</button>

  <div class='row'>
   <div class='col'>
     <b>BEFORE</b>
     <div class='box'>${d.before ? `<{d.before}` : ""}</div>
     <div class='desc'>${d.beforeDesc}</div>
   </div>

   <div class='col'>
     <b>AFTER</b>
     <div class='box'>${d.after ? `<{d.after}` : ""}</div>
     <div class='desc'>${d.afterDesc}</div>
   </div>
  </div>

  <div class='impact'><div><b>Impact</b></div><div>${d.impact}</div></div>
  <div class='takeaway'>${d.takeaway}</div>
  </div>`;
 });

 summaryPage.innerHTML=html;
}

function showCreate(){
 createPage.style.display="block";
 summaryPage.style.display="none";
}

/* EDIT */
function editRex(i){
 let d=rexList[i];
 editIndex=i;

 title.value=d.title;
 cat.value=d.cat;
 beforeData=d.before;
 afterData=d.after;

 beforeImg.src=d.before; beforeImg.style.display="block";
 afterImg.src=d.after; afterImg.style.display="block";

 beforeDesc.value=d.beforeDesc;
 afterDesc.value=d.afterDesc;
 impact.value=d.impact;
 takeaway.value=d.takeaway;

 showCreate();
}

window.showSummary=showSummary;
</script>

<!-- ✅ FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, updateDoc, doc }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCPUL-TGaO2PY7zYC3d1Eyx6J2oHjHWoyE",
  authDomain: "rex-multi-user-file.firebaseapp.com",
  projectId: "rex-multi-user-file",
  storageBucket: "rex-multi-user-file.appspot.com",
  messagingSenderId: "755387388691",
  appId: "1:755387388691:web:476a69ef829c22fcc700e6"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* SAVE */
window.saveRex = async function(){
 let obj={
  title:title.value,
  cat:cat.value,
  before:beforeData,
  after:afterData,
  beforeDesc:beforeDesc.value,
  afterDesc:afterDesc.value,
  impact:impact.value,
  takeaway:takeaway.value
 };

 if(obj.title===""){
  alert("Enter Title");
  return;
 }

 try{
   if(editIndex===-1){
     await addDoc(collection(db,"rex"),obj);
   } else {
     await updateDoc(doc(db,"rex",rexList[editIndex].id),obj);
     editIndex=-1;
   }
   alert("✅ Saved to Cloud");
 }catch(e){
   alert("❌ Error saving: " + e.message);
 }
};

/* LIVE SYNC */
onSnapshot(collection(db,"rex"),snapshot=>{
 window.rexList=[];
 snapshot.forEach(docSnap=>{
  window.rexList.push({...docSnap.data(),id:docSnap.id});
 });
 window.showSummary();
});
</script>

</body>
</html>
