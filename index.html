
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>REX Management System</title>

<style>
body{
  font-family:Arial;
  margin:0;
  padding:20px;
  background:linear-gradient(135deg,#1e3a8a,#0ea5e9);
}

/* Main */
.main{
  background:white;
  border-radius:12px;
  padding:20px;
  max-width:1200px;
  margin:auto;
}

h2{text-align:center;color:white;}

button{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:6px;
  background:#2563eb;
  color:white;
  cursor:pointer;
}
.deleteBtn{background:#dc2626;}

textarea{
  width:100%;
  margin-top:5px;
}

/* KPI */
.kpiContainer{display:flex;gap:10px;}
.kpi{
  flex:1;
  padding:10px;
  color:white;
  text-align:center;
  border-radius:8px;
}
.kpi1{background:#3b82f6;}
.kpi2{background:#10b981;}
.kpi3{background:#f59e0b;}

/* Category */
.summaryHeader{display:flex;flex-wrap:wrap;gap:10px;}
.catCard{
  background:#1e3a8a;
  color:white;
  padding:10px;
  border-radius:8px;
  cursor:pointer;
}
.activeCat{background:#059669 !important;}

/* Chart */
.chartBox{
  background:white;
  padding:15px;
  margin-top:15px;
  border-radius:10px;
}

/* Cards */
.card{
  background:#f8fafc;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
}

.row{display:flex;gap:10px;}

.box{
  height:200px;
  border:1px dashed #ccc;
  display:flex;
  align-items:center;
  justify-content:center;
}
.box img{max-width:100%;max-height:100%;}

.section{font-weight:bold;margin-top:5px;}

.takeaway{
  background:#0c4a6e;
  color:white;
  padding:10px;
  margin-top:10px;
}
</style>

<!-- ✅ Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<!-- ✅ Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- ✅ Chart Labels -->
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>

<!-- ✅ PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

<h2>📘 REX Management System</h2>

<button onclick="showCreate()">New REX</button>
<button onclick="showSummary()">Summary</button>

<!-- CREATE -->
<div id="createPage" class="main">

<input id="title" placeholder="Title"><br><br>

<select id="cat">
<option>5S</option>
<option>Safety</option>
<option>QMS</option>
<option>Automation</option>
<option>Digitization</option>
<option>Skill Development</option>
<option>Process Capability Improvement</option>
<option>Others</option>
</select>

<br><br>

<div class="row">

<div style="flex:1">
<div class="section">Before</div>
<input type="file" id="before"><br>
<img id="bImg">
<textarea id="beforeDesc" placeholder="Before Description"></textarea>
</div>

<div style="flex:1">
<div class="section">After</div>
<input type="file" id="after"><br>
<img id="aImg">
<textarea id="afterDesc" placeholder="After Description"></textarea>
</div>

</div>

<div class="section">Impact</div>
<textarea id="impact"></textarea>

<div class="takeaway">
<textarea id="takeaway" placeholder="Takeaway"></textarea>
</div>

<br>
<button onclick="save()">Save REX</button>

</div>

<!-- SUMMARY -->
<div id="summaryPage" class="main" style="display:none"></div>

<script>

/* Firebase */
firebase.initializeApp({
 apiKey:"AIzaSyCPUL-TGaO2PY7zYC3d1Eyx6J2oHjHWoyE",
 authDomain:"rex-multi-user-file.firebaseapp.com",
 projectId:"rex-multi-user-file"
});

const db=firebase.firestore();

/* Image */
let beforeData="",afterData="";

before.onchange=e=>{
 let r=new FileReader();
 r.onload=x=>{beforeData=x.target.result;bImg.src=beforeData}
 r.readAsDataURL(e.target.files[0])
};

after.onchange=e=>{
 let r=new FileReader();
 r.onload=x=>{afterData=x.target.result;aImg.src=afterData}
 r.readAsDataURL(e.target.files[0])
};

/* Save */
function save(){

 if(!title.value) return alert("Enter title");

 db.collection("rex").add({
  title:title.value,
  cat:cat.value,
  before:beforeData,
  after:afterData,
  beforeDesc:beforeDesc.value,
  afterDesc:afterDesc.value,
  impact:impact.value,
  takeaway:takeaway.value
 });

 alert("Saved");
}

/* Nav */
function showCreate(){
 createPage.style.display="block";
 summaryPage.style.display="none";
}

function showSummary(){
 createPage.style.display="none";
 summaryPage.style.display="block";
}

/* Load */
db.collection("rex").onSnapshot(snap=>{

 let data=[],count={};

 snap.forEach(doc=>{
  let d=doc.data();
  data.push(d);
  count[d.cat]=(count[d.cat]||0)+1;
 });

 if(summaryPage.style.display==="block"){

 let html=`<h3>📊 Dashboard</h3>

 <div class="kpiContainer">
  <div class="kpi kpi1">Total<br>${data.length}</div>
  <div class="kpi kpi2">Categories<br>${Object.keys(count).length}</div>
  <div class="kpi kpi3">Displayed<br>${data.length}</div>
 </div>

 <div class="summaryHeader">`;

 for(let c in count){
  html+=`<div class="catCard" onclick="filterCategory('${c}',this)">
  ${c}<br>${count[c]}</div>`;
 }

 html+=`</div>

 <div class="chartBox">
  <canvas id="barChart"></canvas>
 </div>

 <div style="text-align:center">
  <button onclick="showAll()">Show All</button>
  <button onclick="exportPDF()">Export PDF</button>
 </div>

 <div id="rexList"></div>`;

 summaryPage.innerHTML=html;

 window.allData=data;

 renderList(data);
 createChart(count);
 }

});

/* ✅ BAR CHART ONLY */
function createChart(count){

 let values=Object.values(count);
 let ctx=document.getElementById("barChart");

 if(window.chartObj) window.chartObj.destroy();

 window.chartObj=new Chart(ctx,{
  type:"bar",
  data:{
   labels:Object.keys(count),
   datasets:[{
    data:values,
    backgroundColor:"#3b82f6"
   }]
  },
  plugins:[ChartDataLabels],
  options:{
   plugins:{
    legend:{display:false},
    datalabels:{
      anchor:'end',
      align:'top',
      formatter:v=>v
    }
   },
   scales:{
    y:{beginAtZero:true}
   }
  }
 });
}

/* Render */
function renderList(data){
 let html="";
 data.forEach(d=>{
 html+=`<div class="card">

 <b>${d.title} (${d.cat})</b>

 <div class="row">

 <div style="flex:1">
 <div class="section">Before</div>
 <div class="box">${d.before?'<img src="'+d.before+'">':''}</div>
 <div>${d.beforeDesc||""}</div>
 </div>

 <div style="flex:1">
 <div class="section">After</div>
 <div class="box">${d.after?'<img src="'+d.after+'">':''}</div>
 <div>${d.afterDesc||""}</div>
 </div>

 </div>

 <div>${d.impact||""}</div>
 <div class="takeaway">${d.takeaway||""}</div>

 </div>`;
 });

 rexList.innerHTML=html;
}

/* Filter */
function filterCategory(cat,el){
 document.querySelectorAll('.catCard').forEach(x=>x.classList.remove("activeCat"));
 el.classList.add("activeCat");
 renderList(allData.filter(d=>d.cat===cat));
}

function showAll(){
 renderList(allData);
}

/* ✅ PDF EXPORT */
async function exportPDF(){

 const { jsPDF } = window.jspdf;

 let element = document.getElementById("rexList");

 const canvas = await html2canvas(element, {scale:2});

 const imgData = canvas.toDataURL('image/png');

 let pdf = new jsPDF('p','mm','a4');

 let width = 210;
 let height = canvas.height * width / canvas.width;

 pdf.addImage(imgData,'PNG',0,0,width,height);

 pdf.save("REX_Report.pdf");
}

</script>

</body>
</html>
