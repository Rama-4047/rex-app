
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>REX System</title>

<style>
body{font-family:Arial;background:#eef1f5;padding:20px;}
input,select,textarea{width:100%;margin:5px 0;}
button{padding:8px;background:#005a9e;color:white;border:none;margin-top:10px;}
.container{background:white;padding:15px;margin-top:10px;}
.row{display:flex;gap:10px;}
.box{border:1px solid black;height:120px;display:flex;align-items:center;justify-content:center;}
.box img{max-width:100%;max-height:100%;}
</style>
</head>

<body>

<h2>REX Management</h2>

<div class="container">

<input id="title" placeholder="Title">

<select id="cat">
<option>5S</option>
<option>Safety</option>
<option>QMS</option>
<option>Automation</option>
<option>Others</option>
</select>

<label>Before</label>
<input type="file" id="before">
<img id="bImg" width="100">

<label>After</label>
<input type="file" id="after">
<img id="aImg" width="100">

<textarea id="impact" placeholder="Impact"></textarea>

<button onclick="save()">Save REX</button>

</div>

<hr>

<div id="summary"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// ✅ Firebase config
const app = initializeApp({
  apiKey: "AIzaSyCPUL-TGaO2PY7zYC3d1Eyx6J2oHjHWoyE",
  authDomain: "rex-multi-user-file.firebaseapp.com",
  projectId: "rex-multi-user-file"
});

const db = getFirestore(app);

// ✅ Image storage variables
let beforeData="", afterData="";

// ✅ File handling INSIDE SAME SCRIPT
document.getElementById("before").addEventListener("change",function(e){
 let r=new FileReader();
 r.onload=x=>{
  beforeData=x.target.result;
  document.getElementById("bImg").src=beforeData;
 };
 r.readAsDataURL(e.target.files[0]);
});

document.getElementById("after").addEventListener("change",function(e){
 let r=new FileReader();
 r.onload=x=>{
  afterData=x.target.result;
  document.getElementById("aImg").src=afterData;
 };
 r.readAsDataURL(e.target.files[0]);
});

// ✅ SAVE (NO CONFLICT)
window.save = async function(){

 let title = document.getElementById("title").value;
 let cat = document.getElementById("cat").value;
 let impact = document.getElementById("impact").value;

 if(title===""){
  alert("Enter Title");
  return;
 }

 try{
   await addDoc(collection(db,"rex"),{
     title:title,
     cat:cat,
     before:beforeData,
     after:afterData,
     impact:impact
   });

   alert("✅ Saved Successfully");

 }catch(err){
   alert("❌ Error: "+err.message);
 }
};

// ✅ LIVE LOAD
onSnapshot(collection(db,"rex"),snap=>{

 let html="";

 snap.forEach(doc=>{
  let d = doc.data();

  html += `
  <div class="container">
   <b>${d.title}</b> (${d.cat})
   <div class="row">
     <div class="box">${d.before?`<img src="${d.before}>
     <div class="box">${d.after?`<img src="${""}</div>
   </div>
   <p>${d.impact || ""}</p>
  </div>
  `;
 });

 document.getElementById("summary").innerHTML = html;

});

</script>

</body>
</html>
