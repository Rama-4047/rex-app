
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>REX Management System</title>

<style>
body{font-family:Arial;background:#e5e7eb;padding:20px;}
button{padding:10px 15px;background:#155e95;color:white;border:none;margin:5px;cursor:pointer;}
.main{background:white;padding:15px;border-radius:8px;}
.card{background:#f3f4f6;padding:15px;margin-top:15px;border-radius:10px;}
.row{display:flex;gap:20px;}
.box{border:2px solid black;height:200px;display:flex;align-items:center;justify-content:center;}
.box img{max-width:100%;max-height:100%;}
.desc{border:1px solid black;margin-top:5px;padding:5px;}
.impact{border:1px solid black;margin-top:10px;padding:10px;}
.takeaway{background:#0c4a6e;color:white;margin-top:10px;padding:10px;text-align:center;}
</style>

<!-- ✅ FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<!-- ✅ PDF LIB -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

<h2>REX Management System</h2>

<button onclick="showCreate()">New REX</button>
<button onclick="showSummary()">Summary</button>

<!-- CREATE -->
<div id="createPage" class="main">

<input id="title" placeholder="Title"><br><br>

<select id="cat">
<option>5S</option>
<option>Safety</option>
<option>QMS</option>
<option>Automation</option>
<option>Others</option>
</select>

<br><br>

<div class="row">
<div style="flex:1">
<b>BEFORE</b><br>
<input type="file" id="before"><br>
<img id="bImg"><br>
<textarea id="beforeDesc"></textarea>
</div>

<div style="flex:1">
<b>AFTER</b><br>
<input type="file" id="after"><br>
<img id="aImg"><br>
<textarea id="afterDesc"></textarea>
</div>
</div>

<div class="impact">
<b>Impact</b><br>
<textarea id="impact"></textarea>
</div>

<div class="takeaway">
<textarea id="takeaway"></textarea>
</div>

<br>
<button onclick="save()">Save REX</button>

</div>

<!-- SUMMARY -->
<div id="summaryPage" class="main" style="display:none"></div>

<script>

/* ✅ FIREBASE INIT */
firebase.initializeApp({
 apiKey: "AIzaSyCPUL-TGaO2PY7zYC3d1Eyx6J2oHjHWoyE",
 authDomain: "rex-multi-user-file.firebaseapp.com",
 projectId: "rex-multi-user-file"
});

const db = firebase.firestore();

/* ✅ IMAGE */
let beforeData="", afterData="";

before.onchange=e=>{
 let r=new FileReader();
 r.onload=x=>{
   beforeData=x.target.result;
   bImg.src=beforeData;
 };
 r.readAsDataURL(e.target.files[0]);
};

after.onchange=e=>{
 let r=new FileReader();
 r.onload=x=>{
   afterData=x.target.result;
   aImg.src=afterData;
 };
 r.readAsDataURL(e.target.files[0]);
};

/* ✅ SAVE */
function save(){

 let title=document.getElementById("title").value;

 if(!title){ alert("Enter title"); return; }

 db.collection("rex").add({
  title:title,
  cat:cat.value,
  before:beforeData,
  after:afterData,
  beforeDesc:beforeDesc.value,
  afterDesc:afterDesc.value,
  impact:impact.value,
  takeaway:takeaway.value
 })
 .then(()=>alert("✅ Saved Successfully"))
 .catch(e=>alert(e.message));

}

/* ✅ NAV */
function showCreate(){
 createPage.style.display="block";
 summaryPage.style.display="none";
}

function showSummary(){
 createPage.style.display="none";
 summaryPage.style.display="block";
 loadData();
}

/* ✅ LOAD + COUNT */
function loadData(){

 db.collection("rex").get().then(snapshot=>{

  let count={5S:0,Safety:0,QMS:0,Automation:0,Others:0};
  let list=[];

  snapshot.forEach(doc=>{
   let d=doc.data();
   list.push(d);
   if(count[d.cat]!=undefined) count[d.cat]++;
  });

  window.rexData=list;

  let html=`
  <div>
    <button onclick="filterData('All')">All</button>
    <button onclick="filterData('5S')">5S (${count["5S"]})</button>
    <button onclick="filterData('Safety')">Safety (${count["Safety"]})</button>
    <button onclick="filterData('QMS')">QMS (${count["QMS"]})</button>
    <button onclick="filterData('Automation')">Automation (${count["Automation"]})</button>
    <button onclick="filterData('Others')">Others (${count["Others"]})</button>
    <button onclick="downloadPDF()">Download PDF</button>
  </div>
  <div id="cards"></div>
  `;

  summaryPage.innerHTML=html;
  renderCards(list);

 });

}

/* ✅ FILTER */
function filterData(cat){
 let data = cat=="All"?rexData:rexData.filter(d=>d.cat==cat);
 renderCards(data);
}

/* ✅ RENDER */
function renderCards(list){

 let html="";

 list.forEach(d=>{

  html+='<div class="card">';

  html+='<b>'+d.title+' ('+d.cat+')</b>';

  html+='<div class="row">';

  html+='<div style="flex:1">BEFORE<div class="box">';
  if(d.before) html+='<img src="'+d.before+'">';
  html+='</div><div class="desc">'+(d.beforeDesc||'')+'</div></div>';

  html+='<div style="flex:1">AFTER<div class="box">';
  if(d.after) html+='<img src="'+d.after+'">';
  html+='</div><div class="desc">'+(d.afterDesc||'')+'</div></div>';

  html+='</div>';

  html+='<div class="impact"><b>Impact</b><br>'+ (d.impact||'') +'</div>';
  html+='<div class="takeaway">'+ (d.takeaway||'') +'</div>';

  html+='</div>';
 });

 document.getElementById("cards").innerHTML=html;

}

/* ✅ PDF */
function downloadPDF(){

 const { jsPDF } = window.jspdf;
 const doc = new jsPDF();

 let y=10;

 rexData.forEach(d=>{

  doc.text("Title: "+d.title,10,y); y+=8;
  doc.text("Category: "+d.cat,10,y); y+=8;
  doc.text("Impact: "+(d.impact||""),10,y); y+=8;
  doc.text("Takeaway: "+(d.takeaway||""),10,y); y+=12;

  if(y>270){ doc.addPage(); y=10; }

 });

 doc.save("REX_Report.pdf");

}

</script>

</body>
</html>
