
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>REX Dashboard</title>

<style>
body{
 font-family:Arial;
 background:linear-gradient(135deg,#1e3a8a,#0ea5e9);
 padding:20px;
}

.headerBox{
 background:linear-gradient(90deg,#1e3a8a,#0ea5e9);
 padding:12px;
 color:white;
 display:flex;
 justify-content:space-between;
 border-radius:10px;
}

.main{
 background:white;
 padding:20px;
 border-radius:10px;
 margin-top:15px;
}

/* CATEGORY */
.summaryHeader{
 display:flex;
 flex-wrap:wrap;
 gap:10px;
 justify-content:center;
 margin-bottom:10px;
}

.timelineCard{
 background:#1e3a8a;
 color:white;
 padding:8px 18px;
 border-radius:25px;
 cursor:pointer;
 position:relative;
}

.timelineCard.active{
 background:#059669;
}

.cornerCount{
 position:absolute;
 top:-6px;
 left:-6px;
 background:white;
 color:black;
 padding:3px 6px;
 border-radius:8px;
 font-size:12px;
}

/* GRAPH */
.chartWrapper{
 display:flex;
 justify-content:center;
}
.chartBox{
 width:50%;
 height:250px;
}

/* CARD */
.card{
 background:#f3f4f6;
 padding:10px;
 margin-top:10px;
 border-radius:8px;
}

.row{display:flex;gap:10px;}

.box{
 height:150px;
 border:1px dashed #aaa;
 display:flex;
 align-items:center;
 justify-content:center;
 cursor:pointer;
}
.box img{max-width:100%;max-height:100%;}

/* TEXT */
.sectionTitle{font-weight:bold;color:#1e3a8a;}
.descBox{background:#eef2ff;padding:8px;margin-top:5px;}
.impactBox{background:#dbeafe;padding:8px;margin-top:5px;border-left:4px solid blue;}
.takeaway{background:#0c4a6e;color:white;padding:8px;margin-top:5px;}

textarea{width:100%;}
#impact,#takeaway{height:120px;}

.deleteBtn{background:red;color:white;}

#imgModal{
 display:none;
 position:fixed;
 width:100%;
 height:100%;
 background:rgba(0,0,0,0.8);
 justify-content:center;
 align-items:center;
}
#imgModal img{
 max-width:90%;
 max-height:90%;
}
</style>

<!-- LIBRARIES -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

<div class="headerBox">
 <b>📊 REX Dashboard</b>
 <div>
  <button onclick="showCreate()">New REX</button>
  <button onclick="showSummary()">Summary</button>
 </div>
</div>

<!-- CREATE -->
<div id="createPage" class="main">
<input type="hidden" id="editId">

<input id="title" placeholder="Title"><br><br>

<select id="cat">
<option>5S</option>
<option>Safety</option>
<option>Skill Development</option>
<option>Process Capability Improvement</option>
<option>QMS</option>
<option>Automation</option>
<option>Digitization</option>
<option>Others</option>
</select><br><br>

<div class="row">
<div style="flex:1">
Before <input type="file" id="before"><br>
<img id="bImg">
<textarea id="beforeDesc"></textarea>
</div>

<div style="flex:1">
After <input type="file" id="after"><br>
<img id="aImg">
<textarea id="afterDesc"></textarea>
</div>
</div>

<div class="sectionTitle">Impact</div>
<textarea id="impact"></textarea>

<div class="sectionTitle">Takeaway</div>
<div class="takeaway">
<textarea id="takeaway"></textarea>
</div>

<button onclick="save()">Save</button>
</div>

<!-- SUMMARY -->
<div id="summaryPage" class="main" style="display:none"></div>

<div id="imgModal" onclick="this.style.display='none'">
<img id="zoomImg">
</div>

<script>

/* Firebase */
firebase.initializeApp({
 apiKey:"AIza...",
 projectId:"rex-multi-user-file"
});
const db=firebase.firestore();

let allData=[];
let selectedCategory=null;

/* NAV */
function showCreate(){
 createPage.style.display="block";
 summaryPage.style.display="none";
}
function showSummary(){
 createPage.style.display="none";
 summaryPage.style.display="block";
 summaryPage.innerHTML="Loading...";
}

/* IMAGE */
let beforeData="",afterData="";
before.onchange=e=>{
 let r=new FileReader();
 r.onload=x=>{beforeData=x.target.result;bImg.src=beforeData;}
 r.readAsDataURL(e.target.files[0]);
};
after.onchange=e=>{
 let r=new FileReader();
 r.onload=x=>{afterData=x.target.result;aImg.src=afterData;}
 r.readAsDataURL(e.target.files[0]);
};

/* SAVE */
function save(){
 db.collection("rex").add({
  title:title.value,
  cat:cat.value,
  before:beforeData,
  after:afterData,
  beforeDesc:beforeDesc.value,
  afterDesc:afterDesc.value,
  impact:impact.value,
  takeaway:takeaway.value
 });
}

/* LOAD */
db.collection("rex").onSnapshot(snap=>{

 let count={};
 allData=[];

 snap.forEach(doc=>{
  let d=doc.data();
  d.id=doc.id;
  allData.push(d);
  count[d.cat]=(count[d.cat]||0)+1;
 });

 if(summaryPage.style.display==="block"){

 let html="<h3>Dashboard</h3>";

 html+="<div class='summaryHeader'>";
 Object.keys(count).forEach(c=>{
 html+=`
 <div class="timelineCard" onclick="selectCategory('${c}')">
  <div class="cornerCount">${count[c]}</div>${c}
 </div>`;
 });
 html+="</div>";

 html+=`
 <div class="chartWrapper">
  <div class="chartBox">
   <canvas id="barChart"></canvas>
  </div>
 </div>

 <button onclick="showAll()">Show All</button>
 <button onclick="exportPDF()">Export PDF</button>

 <div id="rexList"></div>`;

 summaryPage.innerHTML=html;

 renderList(allData);
 createChart(count);
 }
});

/* SELECT CATEGORY */
function selectCategory(cat){
 selectedCategory=cat;
 filter(cat);
 highlightCategory();
}

/* GRAPH */
function createChart(count){

 let labels=Object.keys(count);
 let values=Object.values(count);

 let colorMap={
  "5S":"#f59e0b",
  "Safety":"#3b82f6",
  "Skill Development":"#10b981",
  "Process Capability Improvement":"#ef4444",
  "Automation":"#8b5cf6",
  "Digitization":"#14b8a6",
  "QMS":"#f97316"
 };

 let colors=labels.map(l=>{
  return selectedCategory && l!==selectedCategory ? "#cbd5e1" : colorMap[l];
 });

 new Chart(barChart,{
  type:'bar',
  data:{labels:labels,datasets:[{data:values,backgroundColor:colors}]},
  plugins:[ChartDataLabels],
  options:{
   plugins:{legend:{display:false}},
   onClick:(e,el)=>{
    if(el.length){
     let cat=labels[el[0].index];
     selectCategory(cat);
    }
   }
  }
 });
}

/* HIGHLIGHT CATEGORY */
function highlightCategory(){
 document.querySelectorAll('.timelineCard').forEach(el=>{
  el.classList.toggle("active", el.innerText.includes(selectedCategory));
 });
}

/* FILTER */
function filter(cat){
 renderList(allData.filter(x=>x.cat===cat));
 createChartCount();
}

function createChartCount(){
 let count={};
 allData.forEach(d=>{
  count[d.cat]=(count[d.cat]||0)+1;
 });
 createChart(count);
}

function showAll(){
 selectedCategory=null;
 renderList(allData);
 createChartCount();
}

/* DISPLAY */
function renderList(data){
 rexList.innerHTML=data.map(d=>`
 <div class="card">

 <b>${d.title}</b>
 <div>Category: ${d.cat}</div>

 <div class="row">

 <div style="flex:1">
 <div class="sectionTitle">Before</div>
 <div class="box" onclick="zoom('${d.before}')">${d.before?'<img src="'+d.before+'">':''}</div>
 <div class="descBox">${d.beforeDesc||""}</div>
 </div>

 <div style="flex:1">
 <div class="sectionTitle">After</div>
 <div class="box" onclick="zoom('${d.after}')">${d.after?'<img src="'+d.after+'">':''}</div>
 <div class="descBox">${d.afterDesc||""}</div>
 </div>

 </div>

 <div class="impactBox">${d.impact||""}</div>
 <div class="takeaway">${d.takeaway||""}</div>
 </div>
 `).join('');
}

/* ZOOM */
function zoom(src){
 zoomImg.src=src;
 imgModal.style.display="flex";
}

/* PDF */
async function exportPDF(){
 const {jsPDF}=window.jspdf;
 let canvas=await html2canvas(rexList,{scale:2});
 let pdf=new jsPDF();
 pdf.addImage(canvas,"PNG",0,0);
 pdf.save("REX.pdf");
}

</script>

</body>
</html>
