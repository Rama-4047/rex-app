
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>REX Management System</title>

<style>
body{font-family:Arial;background:#e5e7eb;padding:20px;}
button{padding:8px 12px;background:#155e95;color:white;border:none;margin:3px;cursor:pointer;}
.main{background:white;padding:15px;border-radius:8px;}
.card{background:#f3f4f6;padding:15px;margin-top:15px;border-radius:10px;}
.row{display:flex;gap:20px;}
.box{border:2px solid black;height:200px;display:flex;align-items:center;justify-content:center;}
.box img{max-width:100%;max-height:100%;}
.desc{border:1px solid black;margin-top:5px;padding:5px;}
.impact{border:1px solid black;margin-top:10px;padding:10px;}
.takeaway{background:#0c4a6e;color:white;margin-top:10px;padding:10px;text-align:center;}
.actions button{background:#0f766e;}
.deleteBtn{background:#b91c1c;}
</style>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<!-- PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

<h2>REX Management System</h2>

<button onclick="showCreate()">New REX</button>
<button onclick="showSummary()">Summary</button>

<!-- CREATE -->
<div id="createPage" class="main">

<input type="hidden" id="editId">

<input id="title" placeholder="Title"><br><br>

<select id="cat">
<option>5S</option>
<option>Safety</option>
<option>QMS</option>
<option>Automation</option>
<option>Digitization</option>
<option>Skill Development</option>
<option>Process Capability Improvement</option>
<option>Others</option>
</select>

<br><br>

<div class="row">
<div style="flex:1">
<b>BEFORE</b><br>
<input type="file" id="before"><br>
<img id="bImg"><br>
<textarea id="beforeDesc"></textarea>
</div>

<div style="flex:1">
<b>AFTER</b><br>
<input type="file" id="after"><br>
<img id="aImg"><br>
<textarea id="afterDesc"></textarea>
</div>
</div>

<div class="impact">
<b>Impact</b><br>
<textarea id="impact"></textarea>
</div>

<div class="takeaway">
<textarea id="takeaway"></textarea>
</div>

<br>
<button onclick="save()">Save REX</button>

</div>

<!-- SUMMARY -->
<div id="summaryPage" class="main" style="display:none"></div>

<script>

/* ✅ FIREBASE */
firebase.initializeApp({
 apiKey:"AIzaSyCPUL-TGaO2PY7zYC3d1Eyx6J2oHjHWoyE",
 authDomain:"rex-multi-user-file.firebaseapp.com",
 projectId:"rex-multi-user-file"
});

const db=firebase.firestore();

/* IMAGE */
let beforeData="",afterData="";

before.onchange=e=>{
 let r=new FileReader();
 r.onload=evt=>{beforeData=evt.target.result;bImg.src=beforeData;};
 r.readAsDataURL(e.target.files[0]);
};

after.onchange=e=>{
 let r=new FileReader();
 r.onload=evt=>{afterData=evt.target.result;aImg.src=afterData;};
 r.readAsDataURL(e.target.files[0]);
};

/* SAVE / UPDATE */
function save(){

 let id=document.getElementById("editId").value;

 let data={
  title:title.value,
  cat:(cat.value||"Others").trim(),
  before:beforeData,
  after:afterData,
  beforeDesc:beforeDesc.value,
  afterDesc:afterDesc.value,
  impact:impact.value,
  takeaway:takeaway.value
 };

 if(!data.title){alert("Enter title");return;}

 if(id){
   db.collection("rex").doc(id).update(data).then(()=>{
     alert("✅ Updated");
     editId.value="";
   });
 }else{
   db.collection("rex").add(data).then(()=>alert("✅ Saved"));
 }
}

/* NAV */
function showCreate(){
 createPage.style.display="block";
 summaryPage.style.display="none";
}

function showSummary(){
 createPage.style.display="none";
 summaryPage.style.display="block";
 loadData();
}

/* LOAD */
function loadData(){

 db.collection("rex").get().then(snap=>{

  let data=[],count={};

  snap.forEach(doc=>{
   let d=doc.data();
   d.id=doc.id;

   let c=(d.cat||"").trim()||"Others";
   d.cat=c;

   data.push(d);

   if(!count[c]) count[c]=0;
   count[c]++;
  });

  let html="<h3>Category Summary</h3>";

  for(let c in count){
   html+=`<button onclick="filterCategory('${c}')">${c} (${count[c]})</button>`;
  }

  html+=`<button onclick="showAll()">Show All</button>
         <button onclick="exportPDF()">Export PDF</button>
         <div id="rexList"></div>`;

  summaryPage.innerHTML=html;

  window.allData=data;
  window.currentFilter=data;

  renderList(data);
 });
}

/* RENDER */
function renderList(data){

 let html="";

 data.forEach(d=>{

 html+=`
 <div class="card">
 <b>${d.title} (${d.cat})</b>

 <div class="row">

 <div style="flex:1">
 BEFORE
 <div class="box">${d.before?'<img src="'+d.before+'">':''}</div>
 <div class="desc">${d.beforeDesc||""}</div>
 </div>

 <div style="flex:1">
 AFTER
 <div class="box">${d.after?'<img src="'+d.after+'">':''}</div>
 <div class="desc">${d.afterDesc||""}</div>
 </div>

 </div>

 <div class="impact"><b>Impact</b><br>${d.impact||""}</div>
 <div class="takeaway">${d.takeaway||""}</div>

 <div class="actions">
   <button onclick="edit('${d.id}')">Edit</button>
   <button class="deleteBtn" onclick="del('${d.id}')">Delete</button>
 </div>

 </div>`;
 });

 rexList.innerHTML=html;
}

/* FILTER */
function filterCategory(cat){
 let f=allData.filter(d=>(d.cat||"").trim().toLowerCase()===cat.toLowerCase());
 currentFilter=f;
 renderList(f);
}

function showAll(){
 currentFilter=allData;
 renderList(allData);
}

/* EDIT */
function edit(id){

 let d=allData.find(x=>x.id===id);

 showCreate();

 editId.value=id;
 title.value=d.title;
 cat.value=d.cat;
 beforeData=d.before||"";
 afterData=d.after||"";
 bImg.src=beforeData;
 aImg.src=afterData;
 beforeDesc.value=d.beforeDesc;
 afterDesc.value=d.afterDesc;
 impact.value=d.impact;
 takeaway.value=d.takeaway;

}

/* DELETE */
function del(id){

 if(confirm("Delete this REX?")){
   db.collection("rex").doc(id).delete().then(()=>{
     alert("Deleted");
     loadData();
   });
 }
}

/* PDF */
async function exportPDF(){

 const {jsPDF}=window.jspdf;
 let canvas=await html2canvas(rexList,{scale:2});
 let img=canvas.toDataURL("image/png");

 let pdf=new jsPDF("p","mm","a4");

 let w=210,h=canvas.height*w/canvas.width;
 pdf.addImage(img,"PNG",0,0,w,h);

 pdf.save("REX.pdf");
}

</script>

</body>
</html>
