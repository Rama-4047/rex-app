
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>REX Dashboard</title>

<style>

body{
  font-family:Arial;
  background:linear-gradient(135deg,#1e3a8a,#0ea5e9);
  padding:20px;
}

/* HEADER - SAME */
.headerBox{
  background:linear-gradient(90deg,#1e3a8a,#0ea5e9);
  padding:18px 25px;
  border-radius:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  max-width:1100px;
  margin:auto;
}

.headerTitle{
  color:white;
  font-size:22px;
  font-weight:bold;
}

.btnNew{
  background:#e5e7eb;
  color:#1e3a8a;
  border:none;
  padding:8px 16px;
  border-radius:10px;
  font-weight:bold;
}
.btnSummary{
  background:transparent;
  border:2px solid white;
  color:white;
  padding:8px 16px;
  border-radius:10px;
}

/* MAIN */
.main{
  background:white;
  border-radius:12px;
  padding:20px;
  max-width:1100px;
  margin:20px auto;
}

/* ✅ SMART ART STYLE */
.summaryHeader{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:40px;
  position:relative;
}

/* LINE CONNECTOR */
.summaryHeader::before{
  content:"";
  position:absolute;
  top:50%;
  left:0;
  right:0;
  height:3px;
  background:#94a3b8;
}

.timelineCard{
  position:relative;
  background:#1e3a8a;
  color:white;
  padding:15px 25px;
  border-radius:30px;
  cursor:pointer;
  z-index:1;
  font-size:14px;
}

/* COUNT BADGE */
.cornerCount{
  position:absolute;
  top:-10px;
  left:-10px;
  background:#e5e7eb;
  color:black;
  padding:5px 10px;
  border-radius:12px;
  font-weight:bold;
}

/* CHART */
.chartWrapper{
 display:flex;
 justify-content:center;
}
.chartBox{
 width:80%;
 height:350px;
}

/* CARDS */
.card{
  background:#f3f4f6;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
}

.row{
 display:flex;
 gap:10px;
}

.box{
 height:150px;
 border:1px dashed #aaa;
 display:flex;
 align-items:center;
 justify-content:center;
}
.box img{
 max-width:100%;
 max-height:100%;
}

.takeaway{
 background:#0c4a6e;
 color:white;
 padding:6px;
 margin-top:5px;
}

.deleteBtn{background:#dc2626;color:white;}

textarea{width:100%;}

</style>

<!-- LIBRARIES -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

<div class="headerBox">
  <div class="headerTitle">📊 REX Dashboard</div>
  <div>
    <button class="btnNew" onclick="showCreate()">+ New REX</button>
    <button class="btnSummary" onclick="showSummary()">Summary</button>
  </div>
</div>

<!-- CREATE -->
<div id="createPage" class="main">
<input type="hidden" id="editId">

<input id="title" placeholder="Title"><br><br>

<select id="cat">
<option>5S</option>
<option>Safety</option>
<option>QMS</option>
<option>Automation</option>
<option>Digitization</option>
<option>Others</option>
</select><br><br>

<div class="row">
<div style="flex:1">
Before <input type="file" id="before"><br>
<img id="bImg">
<textarea id="beforeDesc"></textarea>
</div>

<div style="flex:1">
After <input type="file" id="after"><br>
<img id="aImg">
<textarea id="afterDesc"></textarea>
</div>
</div>

<textarea id="impact"></textarea>

<div class="takeaway">
<textarea id="takeaway"></textarea>
</div>

<button onclick="save()">Save</button>

</div>

<!-- SUMMARY -->
<div id="summaryPage" class="main" style="display:none"></div>

<script>

firebase.initializeApp({
 apiKey:"AIzaSyCPUL-TGaO2PY7zYC3d1Eyx6J2oHjHWoyE",
 projectId:"rex-multi-user-file"
});

const db=firebase.firestore();

function showCreate(){
 createPage.style.display="block";
 summaryPage.style.display="none";
}

function showSummary(){
 createPage.style.display="none";
 summaryPage.style.display="block";
 summaryPage.innerHTML="Loading...";
}

/* IMAGE */
let beforeData="",afterData="";
before.onchange=e=>{
 let r=new FileReader();
 r.onload=x=>{beforeData=x.target.result;bImg.src=beforeData;}
 r.readAsDataURL(e.target.files[0]);
};
after.onchange=e=>{
 let r=new FileReader();
 r.onload=x=>{afterData=x.target.result;aImg.src=afterData;}
 r.readAsDataURL(e.target.files[0]);
};

/* SAVE */
function save(){
 db.collection("rex").add({
  title:title.value,
  cat:cat.value,
  before:beforeData,
  after:afterData,
  beforeDesc:beforeDesc.value,
  afterDesc:afterDesc.value,
  impact:impact.value,
  takeaway:takeaway.value
 });
}

/* LOAD */
db.collection("rex").onSnapshot(snap=>{

 let data=[],count={};

 snap.forEach(doc=>{
  let d=doc.data();
  d.id=doc.id;
  data.push(d);
  count[d.cat]=(count[d.cat]||0)+1;
 });

 if(summaryPage.style.display==="block"){

 let html="<h3>Dashboard</h3><div class='summaryHeader'>";

 for(let c in count){
 html+=`
 <div class="timelineCard" onclick="filter('${c}')">
   <div class="cornerCount">${count[c]}</div>
   ${c}
 </div>`;
 }

 html+="</div><canvas id='barChart'></canvas><div id='rexList'></div>";

 summaryPage.innerHTML=html;

 window.allData=data;

 renderList(data);
 createChart(count);
 }
});

/* CHART */
function createChart(count){
 new Chart(barChart,{
  type:'bar',
  data:{
   labels:Object.keys(count),
   datasets:[{data:Object.values(count)}]
  },
  plugins:[ChartDataLabels]
 });
}

/* FILTER */
function filter(cat){
 renderList(allData.filter(d=>d.cat===cat));
}

/* DISPLAY */
function renderList(data){
 rexList.innerHTML=data.map(d=>`
 <div class="card">
 <b>${d.title}</b>

 <div class="row">
 <div class="box">${d.before?'<img src="'+d.before+'">':''}</div>
 <div class="box">${d.after?'<img src="'+d.after+'">':''}</div>
 </div>

 <div>${d.beforeDesc||""}</div>
 <div>${d.afterDesc||""}</div>

 <div>${d.impact||""}</div>
 <div class="takeaway">${d.takeaway||""}</div>

 <button onclick="edit('${d.id}')">Edit</button>
 <button class="deleteBtn" onclick="del('${d.id}')">Delete</button>
 </div>
 `).join('');
}

</script>

</body>
</html>
