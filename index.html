
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>REX Management</title>

<style>
body{font-family:Arial;background:#eef1f5;padding:20px;}

button{
 padding:8px 12px;
 background:#005a9e;
 color:white;
 border:none;
 margin:5px;
 cursor:pointer;
}

.container{
 background:white;
 padding:15px;
 margin-top:10px;
 border-radius:8px;
}

.row{display:flex;gap:10px;}

.col{flex:1;}

.box{
 border:1px solid black;
 height:140px;
 display:flex;
 align-items:center;
 justify-content:center;
}

.box img{max-width:100%;max-height:100%;}

textarea{width:100%;margin-top:5px;}

.takeaway{
 background:#003d66;
 color:white;
 padding:8px;
 margin-top:10px;
}
</style>

</head>

<body>

<h2>REX Management</h2>

<button onclick="showCreate()">New REX</button>
<button onclick="showSummary()">Summary</button>

<!-- CREATE PAGE -->
<div id="createPage" class="container">

<input id="title" placeholder="Title"><br><br>

<select id="cat">
<option>5S</option>
<option>Safety</option>
<option>QMS</option>
<option>Automation</option>
<option>Others</option>
</select>

<br><br>

<div class="row">
<div class="col">
<b>BEFORE</b><br>
<input type="file" id="beforeFile"><br>
<img id="beforeImg" style="width:100%;max-height:120px"><br>
<textarea id="beforeDesc" placeholder="Before Description"></textarea>
</div>

<div class="col">
<b>AFTER</b><br>
<input type="file" id="afterFile"><br>
<img id="afterImg" style="width:100%;max-height:120px"><br>
<textarea id="afterDesc" placeholder="After Description"></textarea>
</div>
</div>

<br>

<b>Impact</b>
<textarea id="impact"></textarea>

<b>Takeaway</b>
<textarea id="takeaway"></textarea>

<br>

<button onclick="saveRex()">Save REX</button>

</div>

<!-- SUMMARY PAGE -->
<div id="summaryPage" style="display:none"></div>

<script>
let rexList=[];
let beforeData="", afterData="";

beforeFile.onchange=function(){
 let r=new FileReader();
 r.onload=e=>{
  beforeData=e.target.result;
  beforeImg.src=beforeData;
 };
 r.readAsDataURL(this.files[0]);
};

afterFile.onchange=function(){
 let r=new FileReader();
 r.onload=e=>{
  afterData=e.target.result;
  afterImg.src=afterData;
 };
 r.readAsDataURL(this.files[0]);
};

function showCreate(){
 createPage.style.display="block";
 summaryPage.style.display="none";
}

function showSummary(){
 createPage.style.display="none";
 summaryPage.style.display="block";
 render();
}

function render(){

 let html="";

 rexList.forEach(d=>{

  html+=`
  <div class="container">

  <b>${d.title}</b> (${d.cat})

  <div class="row">
    <div class="col">
      BEFORE
      <div class="box">${d.before? `${d.before}`:""}</div>
      <div>${d.beforeDesc}</div>
    </div>

    <div class="col">
      AFTER
      <div class="box">${d.after? `${d.after}`:""}</div>
      <div>${d.afterDesc}</div>
    </div>
  </div>

  <p><b>Impact:</b> ${d.impact}</p>
  <div class="takeaway">${d.takeaway}</div>

  </div>`;
 });

 summaryPage.innerHTML=html;
}

window.render=render;
</script>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCPUL-TGaO2PY7zYC3d1Eyx6J2oHjHWoyE",
  authDomain: "rex-multi-user-file.firebaseapp.com",
  projectId: "rex-multi-user-file",
  storageBucket: "rex-multi-user-file.appspot.com",
  messagingSenderId: "755387388691",
  appId: "1:755387388691:web:476a69ef829c22fcc700e6"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* SAVE */
window.saveRex = async function(){

 let obj={
  title:title.value,
  cat:cat.value,
  before:beforeData,
  after:afterData,
  beforeDesc:beforeDesc.value,
  afterDesc:afterDesc.value,
  impact:impact.value,
  takeaway:takeaway.value
 };

 if(!obj.title){
  alert("Enter Title");
  return;
 }

 await addDoc(collection(db,"rex"),obj);

 alert("✅ Saved");
};

/* LOAD LIVE */
onSnapshot(collection(db,"rex"),snap=>{

 rexList=[];

 snap.forEach(doc=>{
  rexList.push(doc.data());
 });

 render();
});

</script>

</body>
</html>
