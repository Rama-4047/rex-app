
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>REX Management</title>

<style>
body{font-family:Arial;background:#eef1f5;padding:20px;}
input,select,textarea{width:100%;margin:6px 0;}
button{padding:10px;background:#005a9e;color:white;border:none;margin:5px;cursor:pointer;}
.card{background:white;padding:15px;margin-top:10px;border-radius:6px;}
.row{display:flex;gap:10px;flex-wrap:wrap;}
.box{border:1px solid black;height:140px;display:flex;align-items:center;justify-content:center;}
.box img{max-width:100%;max-height:100%;}
</style>

<!-- ✅ ✅ CORRECT FIREBASE LOADING -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

</head>

<body>

<h2>REX Management System</h2>

<!-- FORM -->
<div class="card">

<input id="title" placeholder="Title">

<select id="cat">
<option>5S</option>
<option>Safety</option>
<option>QMS</option>
<option>Automation</option>
<option>Others</option>
</select>

<label>Before</label>
<input type="file" id="before">
<img id="bImg" width="120">

<label>After</label>
<input type="file" id="after">
<img id="aImg" width="120">

<textarea id="impact" placeholder="Impact"></textarea>

<button onclick="saveRex()">Save REX</button>

</div>

<hr>

<!-- SUMMARY -->
<div id="summary"></div>

<script>

// ✅ FIREBASE INIT
firebase.initializeApp({
  apiKey: "AIzaSyCPUL-TGaO2PY7zYC3d1Eyx6J2oHjHWoyE",
  authDomain: "rex-multi-user-file.firebaseapp.com",
  projectId: "rex-multi-user-file"
});

var db = firebase.firestore();

// ✅ IMAGE LOAD
var beforeData="", afterData="";

document.getElementById("before").onchange = function(e){
 let r=new FileReader();
 r.onload=function(x){
  beforeData=x.target.result;
  document.getElementById("bImg").src=beforeData;
 };
 r.readAsDataURL(e.target.files[0]);
};

document.getElementById("after").onchange = function(e){
 let r=new FileReader();
 r.onload=function(x){
  afterData=x.target.result;
  document.getElementById("aImg").src=afterData;
 };
 r.readAsDataURL(e.target.files[0]);
};

// ✅ SAVE FUNCTION (WORKING)
function saveRex(){

 let t = document.getElementById("title").value;

 if(!t){
  alert("Enter Title");
  return;
 }

 db.collection("rex").add({
  title:t,
  cat:document.getElementById("cat").value,
  before:beforeData,
  after:afterData,
  impact:document.getElementById("impact").value
 })
 .then(()=>{
    alert("✅ Saved Successfully");
 })
 .catch(err=>{
    alert("Error: "+err.message);
 });

}

// ✅ LIVE SUMMARY
db.collection("rex").onSnapshot(function(snapshot){

 let html="";

 snapshot.forEach(function(doc){

  let d = doc.data();

  html += `
  <div class="card">
    <b>${d.title}</class="box">${d.before?`${d.before}`:""}</div>
      <div class="box">${d.after?`<img src="${d.after}>
    </div>
    <div>${d.impact || ""}</div>
  </div>`;
 });

 document.getElementById("summary").innerHTML = html;

});

</script>

</body>
</html>
