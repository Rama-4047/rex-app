
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>REX Dashboard</title>

<style>
body{
  font-family:Arial;
  background:linear-gradient(135deg,#1e3a8a,#0ea5e9);
  padding:20px;
}

.main{
  background:white;
  border-radius:12px;
  padding:20px;
  max-width:1100px;
  margin:auto;
}

h2{text-align:center;color:white;}

/* ✅ KPI FIXED WIDTH */
.kpiContainer{
  display:flex;
  justify-content:center;
  gap:20px;
  margin-bottom:10px;
}
.kpi{
  width:220px;
  padding:15px;
  color:white;
  text-align:center;
  border-radius:10px;
  font-weight:bold;
}
.kpi1{background:#3b82f6;}
.kpi2{background:#10b981;}
.kpi3{background:#f59e0b;}

/* ✅ CATEGORY IMPROVED */
.summaryHeader{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  justify-content:center;
}
.catCard{
  background:#1e3a8a;
  color:white;
  padding:10px 15px;
  border-radius:8px;
  cursor:pointer;
  min-width:100px;
  text-align:center;  /* ✅ CENTER ALIGN */
}
.activeCat{background:#059669 !important;}

.chartBox{
  height:350px;
  margin-top:15px;
}

/* Cards */
.card{
  background:#f8fafc;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
}

.row{display:flex;gap:10px;}

.box{
  height:200px;
  border:1px dashed #ccc;
  display:flex;
  align-items:center;
  justify-content:center;
}
.box img{max-width:100%;max-height:100%;}

.section{font-weight:bold;margin-top:5px;}

textarea{
  width:100%;
  margin-top:5px;
}

.takeaway{
  background:#0c4a6e;
  color:white;
  padding:10px;
  margin-top:10px;
}

button{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:5px;
  background:#2563eb;
  color:white;
  cursor:pointer;
}
</style>

<!-- ✅ Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<!-- ✅ Chart -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- ✅ Data Labels -->
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>

<!-- ✅ PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

<h2>📊 Dashboard</h2>

<button onclick="showCreate()">New</button>
<button onclick="showSummary()">Summary</button>

<div id="createPage" class="main">
<input id="title" placeholder="Title"><br><br>
<select id="cat">
<option>5S</option>
<option>Safety</option>
<option>QMS</option>
<option>Automation</option>
<option>Digitization</option>
<option>Skill Development</option>
<option>Process Capability Improvement</option>
<option>Others</option>
</select>

<br><br>

<div class="row">
<div style="flex:1">
Before<br>
<input type="file" id="before"><br>
<img id="bImg">
<textarea id="beforeDesc"></textarea>
</div>

<div style="flex:1">
After<br>
<input type="file" id="after"><br>
<img id="aImg">
<textarea id="afterDesc"></textarea>
</div>
</div>

<textarea id="impact"></textarea>

<div class="takeaway">
<textarea id="takeaway"></textarea>
</div>

<button onclick="save()">Save</button>

</div>

<div id="summaryPage" class="main" style="display:none"></div>

<script>

firebase.initializeApp({
 apiKey:"AIzaSyCPUL-TGaO2PY7zYC3d1Eyx6J2oHjHWoyE",
 authDomain:"rex-multi-user-file.firebaseapp.com",
 projectId:"rex-multi-user-file"
});
const db=firebase.firestore();

let beforeData="",afterData="";

before.onchange=e=>{
 let r=new FileReader();
 r.onload=x=>{beforeData=x.target.result;bImg.src=beforeData;}
 r.readAsDataURL(e.target.files[0]);
};
after.onchange=e=>{
 let r=new FileReader();
 r.onload=x=>{afterData=x.target.result;aImg.src=afterData;}
 r.readAsDataURL(e.target.files[0]);
};

function save(){
 db.collection("rex").add({
  title:title.value,
  cat:cat.value,
  before:beforeData,
  after:afterData,
  beforeDesc:beforeDesc.value,
  afterDesc:afterDesc.value,
  impact:impact.value,
  takeaway:takeaway.value
 });
 alert("Saved");
}

function showCreate(){
 createPage.style.display="block";
 summaryPage.style.display="none";
}

function showSummary(){
 createPage.style.display="none";
 summaryPage.style.display="block";

 /* ✅ LOADING FIX */
 summaryPage.innerHTML="<h3 style='text-align:center'>⏳ Loading Dashboard...</h3>";
}

/* LOAD DATA */
db.collection("rex").onSnapshot(snap=>{

 let data=[],count={};

 snap.forEach(doc=>{
  let d=doc.data();
  data.push(d);
  count[d.cat]=(count[d.cat]||0)+1;
 });

 if(summaryPage.style.display==="block"){

 let html=`
 <h3 style="text-align:center">📊 Dashboard</h3>

 <div class="kpiContainer">
  <div class="kpi kpi1">Total<br>${data.length}</div>
  <div class="kpi kpi2">Categories<br>${Object.keys(count).length}</div>
  <div class="kpi kpi3">Displayed<br>${data.length}</div>
 </div>

 <div class="summaryHeader">`;

 for(let c in count){
  html+=`<div class="catCard" onclick="filterCategory('${c}',this)">
  ${c}<br><b>${count[c]}</b></div>`;
 }

 html+=`</div>

 <div class="chartBox">
 <canvas id="barChart"></canvas>
 </div>

 <div style="text-align:center">
  <button onclick="showAll()">Show All</button>
  <button onclick="exportPDF()">Export PDF</button>
 </div>

 <div id="rexList"></div>`;

 summaryPage.innerHTML=html;

 window.allData=data;

 renderList(data);
 createChart(count);
 }
});

/* FILTER */
function filterCategory(cat,el){
 document.querySelectorAll('.catCard').forEach(x=>x.classList.remove("activeCat"));
 el.classList.add("activeCat");
 renderList(allData.filter(d=>d.cat===cat));
}

function showAll(){
 document.querySelectorAll('.catCard').forEach(x=>x.classList.remove("activeCat"));
 renderList(allData);
}

/* ✅ FINAL CHART */
function createChart(count){

 let colors=['#3b82f6','#10b981','#f59e0b','#ef4444','#8b5cf6','#14b8a6'];

 let ctx=document.getElementById("barChart");

 new Chart(ctx,{
  type:'bar',
  data:{
   labels:Object.keys(count),
   datasets:[{
    data:Object.values(count),
    backgroundColor:colors
   }]
  },
  plugins:[ChartDataLabels],
  options:{
   plugins:{
    legend:{display:false},
    datalabels:{anchor:'end',align:'top'}
   },
   scales:{
    y:{beginAtZero:true}
   }
  }
 });
}

/* RENDER */
function renderList(data){
 let html="";
 data.forEach(d=>{
 html+=`<div class="card"><b>${d.title}</b></div>`;
 });
 rexList.innerHTML=html;
}

/* PDF */
async function exportPDF(){
 const {jsPDF}=window.jspdf;
 let canvas=await html2canvas(rexList);
 let pdf=new jsPDF();
 pdf.addImage(canvas,"PNG",0,0);
 pdf.save("REX.pdf");
}

</script>

</body>
</html>
