
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>REX</title>

<style>
body{font-family:Arial;background:#eef1f5;padding:20px;}
button{padding:8px 12px;background:#005a9e;color:white;border:none;margin:5px;}
.box{border:1px solid black;height:120px;display:flex;justify-content:center;align-items:center;}
.box img{max-width:100%;max-height:100%;}
.card{background:white;padding:10px;margin-top:10px;}
.row{display:flex;gap:10px;}
.col{flex:1;}
</style>
</head>

<body>

<h2>REX System</h2>

<input id="title" placeholder="Title"><br><br>

<select id="cat">
<option>5S</option>
<option>Safety</option>
<option>QMS</option>
<option>Automation</option>
<option>Others</option>
</select>

<br><br>

BEFORE:<br>
<input type="file" id="before"><br>
<img id="bImg" width="150"><br>

AFTER:<br>
<input type="file" id="after"><br>
<img id="aImg" width="150"><br>

<br>

<textarea id="impact" placeholder="Impact"></textarea><br><br>

<button onclick="save()">SAVE</button>

<hr>

<div id="data"></div>

<script>

// ✅ IMAGE LOAD
let bData="", aData="";

before.onchange = e=>{
 let r=new FileReader();
 r.onload=x=>{
  bData=x.target.result;
  bImg.src=bData;
 };
 r.readAsDataURL(e.target.files[0]);
};

after.onchange = e=>{
 let r=new FileReader();
 r.onload=x=>{
  aData=x.target.result;
  aImg.src=aData;
 };
 r.readAsDataURL(e.target.files[0]);
};

</script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyCPUL-TGaO2PY7zYC3d1Eyx6J2oHjHWoyE",
  authDomain: "rex-multi-user-file.firebaseapp.com",
  projectId: "rex-multi-user-file"
});

const db = getFirestore(app);

// ✅ SAVE
window.save = async function(){

 let t = title.value;

 if(!t){
  alert("Enter Title");
  return;
 }

 await addDoc(collection(db,"rex"),{
  title:t,
  cat:cat.value,
  before:bData,
  after:aData,
  impact:impact.value
 });

 alert("Saved ✅");
};

// ✅ LOAD
onSnapshot(collection(db,"rex"),snap=>{

 let html="";

 snap.forEach(doc=>{
  let d=doc.data();

  html+=`
  <div class="card">
    <b>${d.title}</b> (${d.cat})
    <div class="row">
      <div class="col box">${d.before?`<img src="${d.beforev>
      <div class="col box">${d.after?`<img src="${d.after}>
    </div>
    <div>${d.impact || ""}</div>
  </div>`;
 });

 data.innerHTML = html;

});

</script>

</body>
</html>
