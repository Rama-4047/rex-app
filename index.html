
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>REX Management</title>

<style>
body{font-family:Arial;background:#eef1f5;padding:20px;}
input,select,textarea{width:100%;margin:6px 0;}
button{padding:8px;background:#005a9e;color:white;border:none;margin-top:10px;cursor:pointer;}
.card{background:white;padding:12px;margin-top:10px;border-radius:6px;}
.row{display:flex;gap:10px;}
.box{border:1px solid black;height:120px;display:flex;align-items:center;justify-content:center;}
.box img{max-width:100%;max-height:100%;}
</style>

<!-- ✅ CORRECT Firebase Scripts -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

</head>

<body>

<h2>REX Management</h2>

<!-- FORM -->
<div class="card">

<input id="title" placeholder="Title">

<select id="cat">
<option>5S</option>
<option>Safety</option>
<option>QMS</option>
<option>Automation</option>
<option>Others</option>
</select>

<label>Before</label>
<input type="file" id="before">
<img id="bImg" width="120">

<label>After</label>
<input type="file" id="after">
<img id="aImg" width="120">

<textarea id="impact" placeholder="Impact"></textarea>

<button onclick="save()">Save REX</button>

</div>

<hr>

<!-- SUMMARY -->
<div id="summary"></div>

<script>

/* ✅ FIREBASE INIT */
firebase.initializeApp({
  apiKey: "AIzaSyCPUL-TGaO2PY7zYC3d1Eyx6J2oHjHWoyE",
  authDomain: "rex-multi-user-file.firebaseapp.com",
  projectId: "rex-multi-user-file"
});

var db = firebase.firestore();

/* ✅ IMAGE LOAD */
var beforeData="", afterData="";

document.getElementById("before").onchange = function(e){
 let r=new FileReader();
 r.onload=function(x){
  beforeData=x.target.result;
  document.getElementById("bImg").src=beforeData;
 };
 r.readAsDataURL(e.target.files[0]);
};

document.getElementById("after").onchange = function(e){
 let r=new FileReader();
 r.onload=function(x){
  afterData=x.target.result;
  document.getElementById("aImg").src=afterData;
 };
 r.readAsDataURL(e.target.files[0]);
};

/* ✅ SAVE */
function save(){

 let t = document.getElementById("title").value;

 if(!t){
  alert("Enter Title");
  return;
 }

 db.collection("rex").add({
  title: t,
  cat: document.getElementById("cat").value,
  before: beforeData,
  after: afterData,
  impact: document.getElementById("impact").value
 });

 alert("✅ Saved");
}

/* ✅ LIVE DATA */
db.collection("rex").onSnapshot(function(snapshot){

 let html="";

 snapshot.forEach(function(doc){

  let d = doc.data();

  html += `
  <div class="card">
    <b>${d.title}</b> (${d.cat})
    <div class="row">
      <div class="box">${d.before ? `<img src="${d.before}img src="${d.after}iv>
    </div>
    <p>${d.impact || ""}</p>
  </div>
  `;
 });

 document.getElementById("summary").innerHTML = html;

});

</script>

</body>
</html>
