
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>REX Management System</title>

<style>
body{font-family:Arial;background:#e5e7eb;padding:20px;}
button{padding:10px 15px;background:#155e95;color:white;border:none;margin:5px;cursor:pointer;}
.main{background:white;padding:15px;border-radius:8px;}
.card{background:#f3f4f6;padding:15px;margin-top:15px;border-radius:10px;}
.row{display:flex;gap:20px;}
.box{border:2px solid black;height:200px;display:flex;align-items:center;justify-content:center;}
.box img{max-width:100%;max-height:100%;}
.desc{border:1px solid black;margin-top:5px;padding:5px;}
.impact{border:1px solid black;margin-top:10px;padding:10px;}
.takeaway{background:#0c4a6e;color:white;margin-top:10px;padding:10px;text-align:center;}
</style>

<!-- ✅ Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<!-- ✅ ✅ HIGH QUALITY PDF LIBRARIES -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

<h2>REX Management System</h2>

<button onclick="showCreate()">New REX</button>
<button onclick="showSummary()">Summary</button>

<!-- CREATE -->
<div id="createPage" class="main">

<input id="title" placeholder="Title"><br><br>

<select id="cat">
<option>5S</option>
<option>Safety</option>
<option>QMS</option>
<option>Automation</option>
<option>Others</option>
</select>

<br><br>

<div class="row">
<div style="flex:1">
<b>BEFORE</b><br>
<input type="file" id="before"><br>
<img id="bImg"><br>
<textarea id="beforeDesc"></textarea>
</div>

<div style="flex:1">
<b>AFTER</b><br>
<input type="file" id="after"><br>
<img id="aImg"><br>
<textarea id="afterDesc"></textarea>
</div>
</div>

<div class="impact">
<b>Impact</b><br>
<textarea id="impact"></textarea>
</div>

<div class="takeaway">
<textarea id="takeaway"></textarea>
</div>

<br>
<button onclick="save()">Save REX</button>

</div>

<!-- SUMMARY -->
<div id="summaryPage" class="main" style="display:none"></div>

<script>

/* ✅ FIREBASE INIT */
firebase.initializeApp({
 apiKey: "AIzaSyCPUL-TGaO2PY7zYC3d1Eyx6J2oHjHWoyE",
 authDomain: "rex-multi-user-file.firebaseapp.com",
 projectId: "rex-multi-user-file"
});

const db = firebase.firestore();

/* ✅ IMAGE HANDLE */
let beforeData="", afterData="";

document.getElementById("before").onchange = function(e){
 let reader = new FileReader();
 reader.onload = function(evt){
   beforeData = evt.target.result;
   document.getElementById("bImg").src = beforeData;
 };
 reader.readAsDataURL(e.target.files[0]);
};

document.getElementById("after").onchange = function(e){
 let reader = new FileReader();
 reader.onload = function(evt){
   afterData = evt.target.result;
   document.getElementById("aImg").src = afterData;
 };
 reader.readAsDataURL(e.target.files[0]);
};

/* ✅ SAVE */
function save(){
 let title = document.getElementById("title").value;

 if(!title){
   alert("Enter title");
   return;
 }

 db.collection("rex").add({
   title: title,
   cat: document.getElementById("cat").value,
   before: beforeData,
   after: afterData,
   beforeDesc: document.getElementById("beforeDesc").value,
   afterDesc: document.getElementById("afterDesc").value,
   impact: document.getElementById("impact").value,
   takeaway: document.getElementById("takeaway").value
 }).then(function(){
   alert("✅ Saved Successfully");
 }).catch(function(e){
   alert(e.message);
 });
}

/* ✅ NAVIGATION */
function showCreate(){
 document.getElementById("createPage").style.display="block";
 document.getElementById("summaryPage").style.display="none";
}

function showSummary(){
 document.getElementById("createPage").style.display="none";
 document.getElementById("summaryPage").style.display="block";
 loadData();
}

/* ✅ LOAD DATA */
function loadData(){

 db.collection("rex").get().then(function(snapshot){

  let data=[];
  let count={};

  snapshot.forEach(function(doc){
   let d=doc.data();
   data.push(d);

   let c=d.cat||"Others";
   if(!count[c]) count[c]=0;
   count[c]++;
  });

  let html="<h3>Category Summary</h3>";

  for(let c in count){
   html+=`<button onclick="filterCategory('${c}')">${c} (${count[c]})</button>`;
  }

  html+=`<button onclick="showAll()">Show All</button>`;
  html+=`<button onclick="exportPDF()">Export PDF</button>`;
  html+=`<div id="rexList"></div>`;

  document.getElementById("summaryPage").innerHTML=html;

  window.allData=data;
  window.currentFilter=data;

  renderList(data);
 });
}

/* ✅ RENDER */
function renderList(data){

 let html="";

 data.forEach(function(d){

  html+='<div class="card">';
  html+='<b>'+ (d.title||'') +' ('+(d.cat||'')+')</b>';

  html+='<div class="row">';

  html+='<div style="flex:1">';
  html+='BEFORE';
  html+='<div class="box">';
  if(d.before){ html+='<img src="'+d.before+'">'; }
  html+='</div>';
  html+='<div class="desc">'+(d.beforeDesc||'')+'</div>';
  html+='</div>';

  html+='<div style="flex:1">';
  html+='AFTER';
  html+='<div class="box">';
  if(d.after){ html+='<img src="'+d.after+'">'; }
  html+='</div>';
  html+='<div class="desc">'+(d.afterDesc||'')+'</div>';
  html+='</div>';

  html+='</div>';

  html+='<div class="impact"><b>Impact</b><br>'+ (d.impact||'') +'</div>';
  html+='<div class="takeaway">'+ (d.takeaway||'') +'</div>';

  html+='</div>';
 });

 document.getElementById("rexList").innerHTML=html;
}

/* ✅ FILTER */
function filterCategory(cat){
 let f=window.allData.filter(d=>d.cat===cat);
 window.currentFilter=f;
 renderList(f);
}

function showAll(){
 window.currentFilter=window.allData;
 renderList(window.allData);
}

/* ✅ ✅ HIGH QUALITY PDF */
async function exportPDF(){

  const { jsPDF } = window.jspdf;

  let element = document.getElementById("rexList");

  const canvas = await html2canvas(element, { scale: 2 });

  const imgData = canvas.toDataURL('image/png');

  let pdf = new jsPDF('p', 'mm', 'a4');

  let imgWidth = 210;
  let pageHeight = 295;

  let imgHeight = canvas.height * imgWidth / canvas.width;

  let heightLeft = imgHeight;
  let position = 0;

  pdf.addImage(imgData, 'PNG', 0, position, imgWidth, imgHeight);

  heightLeft -= pageHeight;

  while (heightLeft > 0) {
    position = heightLeft - imgHeight;
    pdf.addPage();
    pdf.addImage(imgData, 'PNG', 0, position, imgWidth, imgHeight);
    heightLeft -= pageHeight;
  }

  pdf.save("REX_Report.pdf");
}

</script>

</body>
</html>
