
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>REX Dashboard</title>

<style>

/* ✅ FULL BACKGROUND */
body{
  font-family:Arial;
  background:#0b1e46;
  padding:20px;
}

/* ✅ HEADER DESIGN */
.header{
  background:linear-gradient(135deg,#1e3a8a,#0ea5e9);
  color:white;
  padding:20px;
  border-radius:15px;
  max-width:1100px;
  margin:auto;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

.header h2{
 margin:0;
}

.headerBtns button{
  padding:10px 18px;
  border-radius:10px;
  border:none;
  margin-left:10px;
  cursor:pointer;
  font-weight:bold;
}

.btn1{
 background:#e5e7eb;
 color:#1e3a8a;
}

.btn2{
 background:transparent;
 border:2px solid white;
 color:white;
}

/* ✅ MAIN PANEL */
.main{
  background:#e5e7eb;
  border-radius:15px;
  padding:20px;
  max-width:1100px;
  margin:20px auto;
}

/* ✅ CATEGORY CARDS */
.summaryHeader{
 display:flex;
 flex-wrap:wrap;
 gap:20px;
 justify-content:center;
}

.timelineCard{
 width:200px;
 height:110px;
 background:#2b3f8f;
 color:white;
 border-radius:20px;
 display:flex;
 align-items:center;
 justify-content:center;
 position:relative;
 cursor:pointer;

 box-shadow:0 8px 20px rgba(0,0,0,0.4);
 transition:0.3s;
}

.timelineCard:hover{
 transform:translateY(-5px);
}

.timelineCard.activeCat{
 background:#059669;
}

.cornerCount{
 position:absolute;
 top:-10px;
 left:-10px;

 background:#d1d5db;
 color:black;

 padding:6px 12px;
 border-radius:12px;
 font-weight:bold;
}

/* ✅ TEXT */
.timelineTitle{
 text-align:center;
 font-weight:bold;
}

/* ✅ CHART */
.chartWrapper{
 display:flex;
 justify-content:center;
 margin-top:20px;
}

.chartBox{
 width:85%;
 height:350px;
}

/* ✅ CARD DATA */
.card{
 background:white;
 padding:15px;
 margin-top:15px;
 border-radius:10px;
}

.row{
 display:flex;
 gap:15px;
}

.box{
 height:180px;
 border:1px dashed #aaa;
 display:flex;
 align-items:center;
 justify-content:center;
}

.box img{
 max-width:100%;
 max-height:100%;
}

.section{
 font-weight:bold;
}

/* ✅ CONTENT */
.descBox{
 background:#f3f4f6;
 padding:8px;
 margin-top:5px;
 border-radius:6px;
}

.impactBox{
 background:#dbeafe;
 padding:8px;
 margin-top:10px;
 border-radius:6px;
}

.takeaway{
 background:#1e3a8a;
 color:white;
 padding:10px;
 margin-top:10px;
 border-radius:6px;
}

button{
 padding:8px 12px;
 border:none;
 border-radius:6px;
 margin-top:5px;
 cursor:pointer;
}

.deleteBtn{
 background:#dc2626;
 color:white;
}

</style>

<!-- ✅ Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<!-- ✅ Chart -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>

</head>

<body>

<!-- HEADER -->
<div class="header">
  <h2>📊 REX Dashboard</h2>
  <div class="headerBtns">
    <button class="btn1" onclick="showCreate()">+ New REX</button>
    <button class="btn2" onclick="showSummary()">Summary</button>
  </div>
</div>

<!-- CREATE -->
<div id="createPage" class="main">
<input type="hidden" id="editId">
<input id="title" placeholder="Title"><br><br>

<select id="cat">
<option>5S</option>
<option>Safety</option>
<option>QMS</option>
<option>Automation</option>
<option>Digitization</option>
<option>Skill Development</option>
<option>Process Capability Improvement</option>
<option>Others</option>
</select>

<br><br>

<div class="row">
<div style="flex:1">
<div class="section">Before</div>
<input type="file" id="before"><br>
<img id="bImg">
<textarea id="beforeDesc"></textarea>
</div>

<div style="flex:1">
<div class="section">After</div>
<input type="file" id="after"><br>
<img id="aImg">
<textarea id="afterDesc"></textarea>
</div>
</div>

<div class="section">Impact</div>
<textarea id="impact"></textarea>

<div class="takeaway">
<textarea id="takeaway"></textarea>
</div>

<button onclick="save()">Save</button>
</div>

<!-- SUMMARY -->
<div id="summaryPage" class="main" style="display:none"></div>

<script>

/* Firebase */
firebase.initializeApp({
 apiKey:"AIzaSyCPUL-TGaO2PY7zYC3d1Eyx6J2oHjHWoyE",
 authDomain:"rex-multi-user-file.firebaseapp.com",
 projectId:"rex-multi-user-file"
});

const db=firebase.firestore();

/* NAV */
function showCreate(){
 createPage.style.display="block";
 summaryPage.style.display="none";
}
function showSummary(){
 createPage.style.display="none";
 summaryPage.style.display="block";
 summaryPage.innerHTML="<h3>Loading...</h3>";
}

/* SAVE */
function save(){
 db.collection("rex").add({
  title:title.value,
  cat:cat.value,
  beforeDesc:beforeDesc.value,
  afterDesc:afterDesc.value,
  impact:impact.value,
  takeaway:takeaway.value
 }).then(()=>alert("Saved"));
}

/* LOAD */
db.collection("rex").onSnapshot(snap=>{

 let count={};

 snap.forEach(doc=>{
  let d=doc.data();
  count[d.cat]=(count[d.cat]||0)+1;
 });

 if(summaryPage.style.display==="block"){

 let html="<h3 style='text-align:center'>Dashboard</h3>";
 html+="<h3 style='text-align:center'>REX Category</h3>";
 html+="<div class='summaryHeader'>";

 for(let c in count){
 html+=`
 <div class="timelineCard">
   <div class="cornerCount">${count[c]}</div>
   <div class="timelineTitle">${c}</div>
 </div>`;
 }

 html+="</div>";

 html+=`
 <div class="chartWrapper">
 <div class="chartBox">
 <canvas id="barChart"></canvas>
 </div>
 </div>`;

 summaryPage.innerHTML=html;

 createChart(count);
 }
});

/* GRAPH */
function createChart(count){

 new Chart(barChart,{
  type:'bar',
  data:{
   labels:Object.keys(count),
   datasets:[{
    data:Object.values(count),
    backgroundColor:['#4f46e5','#22c55e','#f59e0b','#ef4444','#10b981']
   }]
  },
  plugins:[ChartDataLabels]
 });
}

</script>

</body>
</html>
