
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>REX</title>

<style>
body{font-family:Arial;background:#eef1f5;padding:20px;}
input, select, textarea{width:100%;margin:5px 0;}
button{padding:8px;background:#005a9e;color:white;border:none;margin-top:10px;}
.card{background:white;padding:10px;margin-top:10px;}
.row{display:flex;gap:10px;}
.box{border:1px solid black;height:120px;display:flex;align-items:center;justify-content:center;}
.box img{max-width:100%;max-height:100%;}
</style>

<!-- ✅ Firebase (OLD SIMPLE VERSION — NO ERRORS) -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

</head>

<body>

<h2>REX System</h2>

<input id="title" placeholder="Title">

<select id="cat">
<option>5S</option>
<option>Safety</option>
<option>QMS</option>
<option>Automation</option>
<option>Others</option>
</select>

<br>

<input type="file" id="before">
<img id="bImg" width="120"><br>

<input type="file" id="after">
<img id="aImg" width="120"><br>

<textarea id="impact" placeholder="Impact"></textarea>

<button onclick="save()">Save</button>

<hr>

<div id="summary"></div>

<script>

// ✅ Firebase config
firebase.initializeApp({
  apiKey: "AIzaSyCPUL-TGaO2PY7zYC3d1Eyx6J2oHjHWoyE",
  authDomain: "rex-multi-user-file.firebaseapp.com",
  projectId: "rex-multi-user-file"
});

var db = firebase.firestore();

// ✅ IMAGE LOAD
var beforeData="", afterData="";

document.getElementById("before").onchange = function(e){
 var r=new FileReader();
 r.onload=function(x){
  beforeData=x.target.result;
  document.getElementById("bImg").src=beforeData;
 };
 r.readAsDataURL(e.target.files[0]);
};

document.getElementById("after").onchange = function(e){
 var r=new FileReader();
 r.onload=function(x){
  afterData=x.target.result;
  document.getElementById("aImg").src=afterData;
 };
 r.readAsDataURL(e.target.files[0]);
};

// ✅ SAVE (WORKS 100%)
function save(){

 var t = document.getElementById("title").value;

 if(!t){
  alert("Enter title");
  return;
 }

 db.collection("rex").add({
  title:t,
  cat:document.getElementById("cat").value,
  before:beforeData,
  after:afterData,
  impact:document.getElementById("impact").value
 });

 alert("✅ Saved");
}

// ✅ LIVE DATA
db.collection("rex").onSnapshot(function(snapshot){

 var html="";

 snapshot.forEach(function(doc){

  var d = doc.data();

  html += `
  <div class="card">
    <b>${d.title}</b> (${d.cat})
    <div class="row">
      <div class="box">${d.before?`<img src="${d.before}fter}`:""}</div>
    </div>
    <div>${d.impact || ""}</div>
  </div>
  `;
 });

 document.getElementById("summary").innerHTML = html;

});

</script>

</body>
</html>
