
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>REX Management</title>

<style>
body{font-family:Arial;margin:20px;background:#eef1f5;}

button{
 padding:10px 15px;
 background:#005a9e;
 color:white;
 border:none;
 margin:5px;
 cursor:pointer;
}

.template{
 background:white;
 padding:20px;
 margin-top:20px;
 border-radius:10px;
}

.row{display:flex;gap:20px;}
.col{flex:1;}

.box{
 border:2px solid black;
 height:180px;
 display:flex;
 align-items:center;
 justify-content:center;
}

.box img{max-width:100%;max-height:100%;}

.desc{
 border:2px solid black;
 margin-top:10px;
 padding:8px;
}

.impact{
 display:flex;
 border:2px solid black;
 margin-top:15px;
}
.impact div{flex:1;padding:10px;}

.takeaway{
 background:#003d66;
 color:white;
 padding:10px;
 margin-top:15px;
 text-align:center;
}
</style>

</head>

<body>

<h2>REX Management System</h2>

<button id="btnCreate">New REX</button>
<button id="btnSummary">Summary</button>

<!-- CREATE PAGE -->
<div id="createPage">

<input id="title" placeholder="REX Title"><br><br>

<select id="cat">
<option>5S</option>
<option>Safety</option>
<option>QMS</option>
<option>Automation</option>
<option>Others</option>
</select>

<div class="template">

<div class="row">

<!-- BEFORE -->
<div class="col">
<b>BEFORE</b><br>
<input type="file" id="beforeFile">
<div class="box"><img id="beforeImg" style="display:none"></div>
<textarea id="beforeDesc" class="desc"></textarea>
</div>

<!-- AFTER -->
<div class="col">
<b>AFTER</b><br>
<input type="file" id="afterFile">
<div class="box"><img id="afterImg" style="display:none"></div>
<textarea id="afterDesc" class="desc"></textarea>
</div>

</div>

<div class="impact">
<div><b>Impact</b></div>
<div><textarea id="impact" style="width:100%;border:none"></textarea></div>
</div>

<div class="takeaway">
<textarea id="takeaway" style="width:100%;border:none"></textarea>
</div>

</div>

<button id="saveBtn" type="button">Save REX</button>

</div>

<!-- SUMMARY -->
<div id="summaryPage" style="display:none"></div>

<script>

/* GLOBAL DATA */
var rexList=[];
var beforeData="";
var afterData="";

/* LOAD IMAGE */
function loadImage(input,type){

 var f=input.files[0];
 if(!f) return;

 var reader=new FileReader();

 reader.onload=function(e){
  if(type==="before"){
    beforeData=e.target.result;
    document.getElementById("beforeImg").src=beforeData;
    document.getElementById("beforeImg").style.display="block";
  }else{
    afterData=e.target.result;
    document.getElementById("afterImg").src=afterData;
    document.getElementById("afterImg").style.display="block";
  }
 };

 reader.readAsDataURL(f);
}

/* SAVE FUNCTION */
function saveRex(){

 var title=document.getElementById("title").value;

 if(title===""){
  alert("Enter Title");
  return;
 }

 var obj={};
 obj.title=title;
 obj.cat=document.getElementById("cat").value;
 obj.before=beforeData;
 obj.after=afterData;
 obj.beforeDesc=document.getElementById("beforeDesc").value;
 obj.afterDesc=document.getElementById("afterDesc").value;
 obj.impact=document.getElementById("impact").value;
 obj.takeaway=document.getElementById("takeaway").value;

 rexList.push(obj);

 alert("✅ REX Saved");

 clearForm();
 showSummary();
}

/* CLEAR FORM */
function clearForm(){

 document.getElementById("title").value="";
 document.getElementById("beforeDesc").value="";
 document.getElementById("afterDesc").value="";
 document.getElementById("impact").value="";
 document.getElementById("takeaway").value="";

 document.getElementById("beforeImg").style.display="none";
 document.getElementById("afterImg").style.display="none";

 beforeData="";
 afterData="";
}

/* SHOW SUMMARY */
function showSummary(){

 document.getElementById("createPage").style.display="none";
 document.getElementById("summaryPage").style.display="block";

 var html="";

 for(var i=0;i<rexList.length;i++){

  var d=rexList[i];

  html+="<div class='template'>";
  html+="<b>"+d.title+"</b> ("+d.cat+")";

  html+="<div class='row'>";

  html+="<div class='col'>";
  html+="<b>BEFORE</b>";
  html+="<div class='box'>"+(d.before? "<img src='"+d.before+"'>" : "")+"</div>";
  html+="<div class='desc'>"+d.beforeDesc+"</div>";
  html+="</div>";

  html+="<div class='col'>";
  html+="<b>AFTER</b>";
  html+="<div class='box'>"+(d.after? "<img src='"+d.after+"'>" : "")+"</div>";
  html+="<div class='desc'>"+d.afterDesc+"</div>";
  html+="</div>";

  html+="</div>";

  html+="<div class='impact'>";
  html+="<div><b>Impact</b></div>";
  html+="<div>"+d.impact+"</div>";
  html+="</div>";

  html+="<div class='takeaway'>"+d.takeaway+"</div>";

  html+="</div>";
 }

 document.getElementById("summaryPage").innerHTML=html;
}

/* NAV */
function showCreate(){
 document.getElementById("createPage").style.display="block";
 document.getElementById("summaryPage").style.display="none";
}

/* ✅ SAFEST EVENT BINDING */
document.addEventListener("DOMContentLoaded",function(){

 document.getElementById("beforeFile").onchange=function(){
  loadImage(this,"before");
 };

 document.getElementById("afterFile").onchange=function(){
  loadImage(this,"after");
 };

 document.getElementById("saveBtn").onclick=function(){
  saveRex();
 };

 document.getElementById("btnCreate").onclick=function(){
  showCreate();
 };

 document.getElementById("btnSummary").onclick=function(){
  showSummary();
 };

});
</script>

</body>
</html>
