
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>REX Management System</title>

<style>
body{font-family:Arial;background:#e5e7eb;padding:20px;}

h1{margin-bottom:20px;}

button{
 padding:10px 15px;
 background:#155e95;
 color:white;
 border:none;
 margin:5px;
 cursor:pointer;
}

.main{
 background:white;
 padding:15px;
 border-radius:8px;
}

/* REX CARD */
.card{
 background:#f3f4f6;
 padding:15px;
 margin-top:15px;
 border-radius:10px;
}

.row{display:flex;gap:20px;}

.box{
 border:2px solid black;
 height:200px;
 display:flex;
 align-items:center;
 justify-content:center;
}

.box img{
 max-width:100%;
 max-height:100%;
}

.desc{
 border:2px solid black;
 padding:5px;
 margin-top:5px;
}

.impact{
 border:2px solid black;
 padding:10px;
 margin-top:10px;
 display:flex;
 justify-content:space-between;
}

.takeaway{
 background:#0c4a6e;
 color:white;
 padding:10px;
 margin-top:10px;
 text-align:center;
}
</style>

<!-- ✅ CORRECT FIREBASE LOADING -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

</head>

<body>

<h1>REX Management System</h1>

<button onclick="showCreate()">New REX</button>
<button onclick="showSummary()">Summary</button>

<!-- CREATE PAGE -->
<div id="createPage" class="main">

<input id="title" placeholder="Title"><br><br>

<select id="cat">
<option>5S</option>
<option>Safety</option>
<option>QMS</option>
<option>Automation</option>
<option>Others</option>
</select>

<br><br>

<div class="row">

<div style="flex:1">
<b>BEFORE</b><br>
<input type="file" id="before"><br>
<img id="bImg" width="100%">
<textarea id="beforeDesc"></textarea>
</div>

<div style="flex:1">
<b>AFTER</b><br>
<input type="file" id="after"><br>
<img id="aImg" width="100%">
<textarea id="afterDesc"></textarea>
</div>

</div>

<div class="impact">
<b>Impact</b>
<textarea id="impact"></textarea>
</div>

<div class="takeaway">
<textarea id="takeaway"></textarea>
</div>

<button onclick="save()">Save REX</button>

</div>

<!-- SUMMARY -->
<div id="summaryPage" class="main" style="display:none"></div>

<script>

/* ✅ FIREBASE INIT */
firebase.initializeApp({
  apiKey: "AIzaSyCPUL-TGaO2PY7zYC3d1Eyx6J2oHjHWoyE",
  authDomain: "rex-multi-user-file.firebaseapp.com",
  projectId: "rex-multi-user-file"
});

var db = firebase.firestore();

var beforeData="", afterData="";

/* IMAGE */
before.onchange=e=>{
 let r=new FileReader();
 r.onload=x=>{beforeData=x.target.result;bImg.src=beforeData;};
 r.readAsDataURL(e.target.files[0]);
};

after.onchange=e=>{
 let r=new FileReader();
 r.onload=x=>{afterData=x.target.result;aImg.src=afterData;};
 r.readAsDataURL(e.target.files[0]);
};

/* SAVE */
function save(){
 if(!title.value){
   alert("Enter title"); return;
 }

 db.collection("rex").add({
  title:title.value,
  cat:cat.value,
  before:beforeData,
  after:afterData,
  beforeDesc:beforeDesc.value,
  afterDesc:afterDesc.value,
  impact:impact.value,
  takeaway:takeaway.value
 }).then(()=>{
   alert("✅ Saved");
 });
}

/* NAV */
function showCreate(){
 createPage.style.display="block";
 summaryPage.style.display="none";
}

function showSummary(){
 createPage.style.display="none";
 summaryPage.style.display="block";
 loadData("All");
}

/* LOAD DATA */
function loadData(filter){

 db.collection("rex").get().then(snapshot=>{

  let list=[];
  snapshot.forEach(doc=>list.push(doc.data()));

  let count={"5S":0,"Safety":0,"QMS":0,"Automation":0,"Others":0};

  list.forEach(d=>count[d.cat]++);

  let html=`
  <button onclick="loadData('5S')">5S (${count["5S"]})</button>
  <button onclick="loadData('Safety')">Safety (${count["Safety"]})</button>
  <button onclick="loadData('QMS')">QMS (${count["QMS"]})</button>
  <button onclick="loadData('Automation')">Automation (${count["Automation"]})</button>
  <button onclick="loadData('Others')">Others (${count["Others"]})</button>
  <button onclick="loadData('All')">All</button>
  <button onclick="window.print()">Export PDF</button>
  `;

  list.forEach(d=>{
   if(filter!="All" && d.cat!=filter) return;

   html+=`
   <div class="card">

   <b>${d.cat}</b>
   <button>Edit</button>

   <div class="row">

    <div style="flex:1">
     <b>BEFORE</b>
     <div class="box">${d.before?`<img srcd.beforeDesc}</div>
    </div>

    <div style="flex:1">
     <b>AFTER</b>
     <div class="box">${d.after?`${d.after}`:""}</div>
     <div class="desc">${d.afterDesc}</div>
    </div>

   </div>

   <div class="impact"><b>Impact</b><div>${d.impact}</div></div>

   <div class="takeaway">${d.takeaway}</div>

   </div>`;
  });

  summaryPage.innerHTML=html;
 });
}

</script>

</body>
</html>
