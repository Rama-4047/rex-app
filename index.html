
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>REX Management System</title>

<style>
body{font-family:Arial;background:#e5e7eb;padding:20px;}
button{padding:8px 12px;background:#155e95;color:white;border:none;margin:3px;cursor:pointer;border-radius:5px;}
.main{background:white;padding:15px;border-radius:8px;}
.row{display:flex;gap:20px;}

/* Cards */
.card{
  background:white;
  border-radius:10px;
  padding:15px;
  margin-top:15px;
  box-shadow:0 3px 8px rgba(0,0,0,0.15);
}
.card b{font-size:16px;color:#1e40af;}

.box{
  border:2px solid #ddd;
  height:200px;
  display:flex;align-items:center;justify-content:center;
}
.box img{max-width:100%;max-height:100%;}

.desc{border:1px solid #ddd;margin-top:5px;padding:5px;}
.impact{margin-top:10px;padding:10px;background:#f9fafb;}
.takeaway{background:#0c4a6e;color:white;margin-top:10px;padding:10px;text-align:center;}

/* Dashboard */
.summaryHeader{display:flex;flex-wrap:wrap;gap:10px;}
.catCard{
  background:#1e3a8a;color:white;padding:12px;border-radius:8px;
  cursor:pointer;min-width:120px;text-align:center;font-weight:bold;
}
.catCard:hover{background:#2563eb;}
.activeCat{background:#059669 !important;}

.topActions{margin-top:10px;}
.deleteBtn{background:#b91c1c;}
</style>

<!-- ✅ Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<!-- ✅ Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- ✅ PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

<h2>📘 REX Management System</h2>

<button onclick="showCreate()">New REX</button>
<button onclick="showSummary()">Summary</button>

<!-- CREATE -->
<div id="createPage" class="main">

<input type="hidden" id="editId">

<input id="title" placeholder="Title"><br><br>

<select id="cat">
<option>5S</option>
<option>Safety</option>
<option>QMS</option>
<option>Automation</option>
<option>Digitization</option>
<option>Skill Development</option>
<option>Process Capability Improvement</option>
<option>Others</option>
</select>

<br><br>

<div class="row">
<div style="flex:1">
<b>BEFORE</b><br>
<input type="file" id="before"><br>
<img id="bImg"><br>
<textarea id="beforeDesc"></textarea>
</div>

<div style="flex:1">
<b>AFTER</b><br>
<input type="file" id="after"><br>
<img id="aImg"><br>
<textarea id="afterDesc"></textarea>
</div>
</div>

<div class="impact">
<b>Impact</b><br>
<textarea id="impact"></textarea>
</div>

<div class="takeaway">
<textarea id="takeaway"></textarea>
</div>

<br>
<button onclick="save()">Save REX</button>

</div>

<!-- SUMMARY -->
<div id="summaryPage" class="main" style="display:none"></div>

<script>

/* Firebase */
firebase.initializeApp({
 apiKey:"AIzaSyCPUL-TGaO2PY7zYC3d1Eyx6J2oHjHWoyE",
 authDomain:"rex-multi-user-file.firebaseapp.com",
 projectId:"rex-multi-user-file"
});

const db=firebase.firestore();

/* Image */
let beforeData="",afterData="";

before.onchange=e=>{
 let r=new FileReader();
 r.onload=evt=>{beforeData=evt.target.result;bImg.src=beforeData;}
 r.readAsDataURL(e.target.files[0]);
};

after.onchange=e=>{
 let r=new FileReader();
 r.onload=evt=>{afterData=evt.target.result;aImg.src=afterData;}
 r.readAsDataURL(e.target.files[0]);
};

/* Save */
function save(){
 let id=editId.value;

 let data={
   title:title.value,
   cat:(cat.value||"Others").trim(),
   before:beforeData,
   after:afterData,
   beforeDesc:beforeDesc.value,
   afterDesc:afterDesc.value,
   impact:impact.value,
   takeaway:takeaway.value
 };

 if(!data.title){alert("Enter title");return;}

 if(id){
   db.collection("rex").doc(id).update(data).then(()=>alert("✅ Updated"));
   editId.value="";
 }else{
   db.collection("rex").add(data).then(()=>alert("✅ Saved"));
 }
}

/* Navigation */
function showCreate(){
 createPage.style.display="block";
 summaryPage.style.display="none";
}

function showSummary(){
 createPage.style.display="none";
 summaryPage.style.display="block";
 loadData();
}

/* Load */
function loadData(){

 db.collection("rex").get().then(snap=>{

  let data=[],count={};

  snap.forEach(doc=>{
   let d=doc.data();
   d.id=doc.id;

   let c=(d.cat||"").trim()||"Others";
   d.cat=c;

   data.push(d);

   if(!count[c]) count[c]=0;
   count[c]++;
  });

  let html="<h3>📊 REX Dashboard</h3>";

  html+=`<div class="summaryHeader">`;
  for(let c in count){
    html+=`<div class="catCard" onclick="filterCategory('${c}',this)">
             ${c}<br>${count[c]}
           </div>`;
  }
  html+=`</div>`;

  html+=`<canvas id="barChart" height="100"></canvas>`;

  html+=`<div class="topActions">
          <button onclick="showAll()">Show All</button>
          <button onclick="exportPDF()">Export PDF</button>
          </div>

          <div id="rexList"></div>`;

  summaryPage.innerHTML=html;

  window.allData=data;

  renderList(data);
  createChart(count);
 });
}

/* Chart */
function createChart(count){

 let labels=Object.keys(count);
 let values=Object.values(count);

 let ctx=document.getElementById('barChart').getContext('2d');

 if(window.chartObj){window.chartObj.destroy();}

 window.chartObj=new Chart(ctx,{
  type:'bar',
  data:{
    labels:labels,
    datasets:[{
      label:'REX Count',
      data:values,
      backgroundColor:[
        '#3b82f6','#10b981','#f59e0b','#ef4444','#8b5cf6','#14b8a6','#f43f5e'
      ]
    }]
  },
  options:{
    responsive:true,
    plugins:{legend:{display:false}},
    scales:{y:{beginAtZero:true}}
  }
 });
}

/* Render */
function renderList(data){

 let html="";

 data.forEach(d=>{
 html+=`<div class="card">
 <b>${d.title} (${d.cat})</b>

 <div class="row">
   <div style="flex:1">
     BEFORE
     <div class="box">${d.before?'<img src="'+d.before+'">':''}</div>
     <div class="desc">${d.beforeDesc||""}</div>
   </div>

   <div style="flex:1">
     AFTER
     <div class="box">${d.after?'<img src="'+d.after+'">':''}</div>
     <div class="desc">${d.afterDesc||""}</div>
   </div>
 </div>

 <div class="impact">${d.impact||""}</div>
 <div class="takeaway">${d.takeaway||""}</div>

 <button onclick="edit('${d.id}')">Edit</button>
 <button class="deleteBtn" onclick="del('${d.id}')">Delete</button>

 </div>`;
 });

 rexList.innerHTML=html;
}

/* Filters */
function filterCategory(cat,el){
 document.querySelectorAll('.catCard').forEach(x=>x.classList.remove("activeCat"));
 el.classList.add("activeCat");

 let f=allData.filter(d=>d.cat.toLowerCase()===cat.toLowerCase());
 renderList(f);
}

function showAll(){
 document.querySelectorAll('.catCard').forEach(x=>x.classList.remove("activeCat"));
 renderList(allData);
}

/* Edit/Delete */
function edit(id){
 let d=allData.find(x=>x.id===id);

 showCreate();

 editId.value=id;
 title.value=d.title;
 cat.value=d.cat;
 beforeData=d.before||"";
 afterData=d.after||"";
 bImg.src=beforeData;
 aImg.src=afterData;
 beforeDesc.value=d.beforeDesc;
 afterDesc.value=d.afterDesc;
 impact.value=d.impact;
 takeaway.value=d.takeaway;
}

function del(id){
 if(confirm("Delete this REX?")){
   db.collection("rex").doc(id).delete().then(()=>loadData());
 }
}

/* PDF */
async function exportPDF(){

 const {jsPDF}=window.jspdf;

 let canvas=await html2canvas(rexList,{scale:2});
 let img=canvas.toDataURL("image/png");

 let pdf=new jsPDF("p","mm","a4");

 let w=210;
 let h=canvas.height*w/canvas.width;

 pdf.addImage(img,"PNG",0,0,w,h);

 pdf.save("REX_Report.pdf");
}

</script>

</body>
</html>
