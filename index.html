
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>REX Dashboard</title>

<style>

body{
  font-family:Arial;
  background:linear-gradient(135deg,#1e3a8a,#0ea5e9);
  padding:20px;
}

/* ✅ HEADER */
.headerBox{
  background:linear-gradient(90deg,#1e3a8a,#0ea5e9);
  padding:18px 25px;
  border-radius:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  max-width:1100px;
  margin:auto;
}

.headerTitle{
  color:white;
  font-size:22px;
  font-weight:bold;
}

.btnNew{
  background:#e5e7eb;
  color:#1e3a8a;
  padding:8px 16px;
  border-radius:10px;
  border:none;
}
.btnSummary{
  background:transparent;
  border:2px solid white;
  color:white;
  padding:8px 16px;
  border-radius:10px;
}

/* MAIN */
.main{
  background:white;
  border-radius:12px;
  padding:20px;
  max-width:1100px;
  margin:20px auto;
}

/* ✅ SMART ART */
.summaryHeader{
 display:flex;
 flex-wrap:wrap;
 gap:40px;
 justify-content:center;
 position:relative;
}

.summaryHeader::before{
 content:"";
 position:absolute;
 top:50%;
 left:0;
 right:0;
 height:3px;
 background:#94a3b8;
}

.timelineCard{
 background:#1e3a8a;
 color:white;
 padding:15px 25px;
 border-radius:30px;
 cursor:pointer;
 position:relative;
 z-index:1;
}

.cornerCount{
 position:absolute;
 top:-10px;
 left:-10px;
 background:white;
 color:black;
 padding:5px 10px;
 border-radius:10px;
 font-weight:bold;
}

/* CHART */
.chartWrapper{
 display:flex;
 justify-content:center;
}
.chartBox{
 width:80%;
 height:350px;
}

/* CARDS */
.card{
  background:#f3f4f6;
  padding:12px;
  margin-top:10px;
  border-radius:8px;
}

.row{
 display:flex;
 gap:10px;
}

.box{
 height:150px;
 border:1px dashed #aaa;
 display:flex;
 justify-content:center;
 align-items:center;
}
.box img{
 max-width:100%;
 max-height:100%;
}

/* ✅ DESCRIPTION BOX */
.descBox{
 background:#eef2ff;
 padding:8px;
 margin-top:5px;
 border-radius:6px;
 font-size:13px;
}

/* ✅ IMPACT */
.impactBox{
 background:#dbeafe;
 padding:10px;
 margin-top:10px;
 border-left:4px solid #2563eb;
 border-radius:6px;
}

/* ✅ TAKEAWAY */
.takeaway{
 background:#0c4a6e;
 color:white;
 padding:10px;
 margin-top:10px;
 border-radius:6px;
}

.deleteBtn{background:#dc2626;color:white;}

textarea{width:100%;}

</style>

<!-- LIBRARIES -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

<!-- HEADER -->
<div class="headerBox">
  <div class="headerTitle">📊 REX Dashboard</div>
  <div>
    <button class="btnNew" onclick="showCreate()">+ New REX</button>
    <button class="btnSummary" onclick="showSummary()">Summary</button>
  </div>
</div>

<!-- CREATE -->
<div id="createPage" class="main">

<input type="hidden" id="editId">

<input id="title" placeholder="Title"><br><br>

<select id="cat">
<option>5S</option>
<option>Safety</option>
<option>QMS</option>
<option>Automation</option>
<option>Digitization</option>
<option>Others</option>
</select><br><br>

<div class="row">

<div style="flex:1">
<b>Before</b><br>
<input type="file" id="before"><br>
<img id="bImg">
<textarea id="beforeDesc"></textarea>
</div>

<div style="flex:1">
<b>After</b><br>
<input type="file" id="after"><br>
<img id="aImg">
<textarea id="afterDesc"></textarea>
</div>

</div>

<textarea id="impact"></textarea>

<div class="takeaway">
<textarea id="takeaway"></textarea>
</div>

<button onclick="save()">Save</button>

</div>

<!-- SUMMARY -->
<div id="summaryPage" class="main" style="display:none"></div>

<script>

/* FIREBASE */
firebase.initializeApp({
 apiKey:"AIzaSyCPUL-TGaO2PY7zYC3d1Eyx6J2oHjHWoyE",
 projectId:"rex-multi-user-file"
});

const db=firebase.firestore();

/* NAV */
function showCreate(){
 createPage.style.display="block";
 summaryPage.style.display="none";
}
function showSummary(){
 createPage.style.display="none";
 summaryPage.style.display="block";
 summaryPage.innerHTML="Loading...";
}

/* IMAGE */
let beforeData="",afterData="";
before.onchange=e=>{
 let r=new FileReader();
 r.onload=x=>{beforeData=x.target.result;bImg.src=beforeData;}
 r.readAsDataURL(e.target.files[0]);
};
after.onchange=e=>{
 let r=new FileReader();
 r.onload=x=>{afterData=x.target.result;aImg.src=afterData;}
 r.readAsDataURL(e.target.files[0]);
};

/* SAVE */
function save(){
 let id=editId.value;

 let data={
  title:title.value,
  cat:cat.value,
  before:beforeData,
  after:afterData,
  beforeDesc:beforeDesc.value,
  afterDesc:afterDesc.value,
  impact:impact.value,
  takeaway:takeaway.value
 };

 if(id){
  db.collection("rex").doc(id).update(data);
 }else{
  db.collection("rex").add(data);
 }
}

/* LOAD */
db.collection("rex").onSnapshot(snap=>{

 let data=[],count={};

 snap.forEach(doc=>{
  let d=doc.data();
  d.id=doc.id;
  data.push(d);
  count[d.cat]=(count[d.cat]||0)+1;
 });

 if(summaryPage.style.display==="block"){

 let html="<h3>Dashboard</h3><div class='summaryHeader'>";

 for(let c in count){
 html+=`
 <div class="timelineCard" onclick="filter('${c}')">
   <div class="cornerCount">${count[c]}</div>
   ${c}
 </div>`;
 }

 html+="</div><canvas id='barChart'></canvas><div id='rexList'></div>";

 summaryPage.innerHTML=html;

 window.allData=data;

 renderList(data);
 createChart(count);
 }
});

/* CHART */
function createChart(count){

 let colors=[
 '#3b82f6','#10b981','#f59e0b','#ef4444',
 '#8b5cf6','#14b8a6','#f97316','#6366f1'
 ];

 new Chart(barChart,{
  type:'bar',
  data:{
   labels:Object.keys(count),
   datasets:[{
     data:Object.values(count),
     backgroundColor:colors
   }]
  },
  plugins:[ChartDataLabels]
 });
}

/* FILTER */
function filter(cat){
 renderList(allData.filter(d=>d.cat===cat));
}

/* ✅ DISPLAY FIXED STRUCTURE */
function renderList(data){

 rexList.innerHTML=data.map(d=>`
 <div class="card">

 <b>${d.title}</b>

 <div class="row">

 <div style="flex:1">
 <b>Before</b>
 <div class="box">${d.before?'<img src="'+d.before+'">':''}</div>
 <div class="descBox">${d.beforeDesc||""}</div>
 </div>

 <div style="flex:1">
 <b>After</b>
 <div class="box">${d.after?'<img src="'+d.after+'">':''}</div>
 <div class="descBox">${d.afterDesc||""}</div>
 </div>

 </div>

 <div class="impactBox">
 <b>Impact</b><br>
 ${d.impact||""}
 </div>

 <div class="takeaway">
 <b>Takeaway</b><br>
 ${d.takeaway||""}
 </div>

 <button onclick="edit('${d.id}')">Edit</button>
 <button class="deleteBtn" onclick="del('${d.id}')">Delete</button>

 </div>
 `).join('');
}

/* EDIT */
function edit(id){
 let d=allData.find(x=>x.id===id);
 showCreate();

 editId.value=id;
 title.value=d.title;
 cat.value=d.cat;

 beforeData=d.before;
 afterData=d.after;

 bImg.src=d.before;
 aImg.src=d.after;

 beforeDesc.value=d.beforeDesc;
 afterDesc.value=d.afterDesc;
 impact.value=d.impact;
 takeaway.value=d.takeaway;
}

/* DELETE */
function del(id){
 if(confirm("Delete?")){
  db.collection("rex").doc(id).delete();
 }
}

/* PDF */
async function exportPDF(){
 const {jsPDF}=window.jspdf;
 let canvas=await html2canvas(rexList);
 let img=canvas.toDataURL("image/png");

 let pdf=new jsPDF();
 pdf.addImage(img,"PNG",0,0);
 pdf.save("REX_Report.pdf");
}

</script>

</body>
</html>
