
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>REX Management</title>

<style>
body{font-family:Arial;margin:20px;background:#eef1f5;}

button{
 padding:10px 15px;
 background:#005a9e;
 color:white;
 border:none;
 margin:5px;
 cursor:pointer;
}

.template{
 background:white;
 padding:20px;
 margin-top:20px;
 border-radius:10px;
}

.row{display:flex;gap:20px;}
.col{flex:1;}

.box{
 border:2px solid black;
 height:180px;
 display:flex;
 align-items:center;
 justify-content:center;
}

.box img{max-width:100%;max-height:100%;}

.desc{
 border:2px solid black;
 margin-top:10px;
 padding:8px;
}

.impact{
 display:flex;
 border:2px solid black;
 margin-top:15px;
}
.impact div{flex:1;padding:10px;}

.takeaway{
 background:#003d66;
 color:white;
 padding:10px;
 margin-top:15px;
 text-align:center;
}

/* Print (main page optional) */
@media print {
 button { display:none; }
 body { background:white; }
}
</style>

</head>

<body>

<h2>REX Management System</h2>

<button id="btnCreate">New REX</button>
<button id="btnSummary">Summary</button>

<!-- CREATE -->
<div id="createPage">

<input id="title" placeholder="REX Title"><br><br>

<select id="cat">
<option>5S</option>
<option>Safety</option>
<option>QMS</option>
<option>Automation</option>
<option>Others</option>
</select>

<div class="template">
<div class="row">

<div class="col">
<b>BEFORE</b><br>
<input type="file" id="beforeFile">
<div class="box"><img id="beforeImg" style="display:none"></div>
<textarea id="beforeDesc" class="desc"></textarea>
</div>

<div class="col">
<b>AFTER</b><br>
<input type="file" id="afterFile">
<div class="box"><img id="afterImg" style="display:none"></div>
<textarea id="afterDesc" class="desc"></textarea>
</div>

</div>

<div class="impact">
<div><b>Impact</b></div>
<div><textarea id="impact" style="width:100%;border:none"></textarea></div>
</div>

<div class="takeaway">
<textarea id="takeaway" style="width:100%;border:none"></textarea>
</div>

</div>

<button id="saveBtn">Save REX</button>

</div>

<!-- SUMMARY -->
<div id="summaryPage" style="display:none"></div>

<script>

/* LOAD DATA */
var rexList=[];
var saved=localStorage.getItem("rexData");
if(saved){ rexList=JSON.parse(saved); }

var beforeData="";
var afterData="";
var editIndex=-1;

/* IMAGE LOAD */
function loadImage(input,type){
 var f=input.files[0];
 if(!f) return;

 var reader=new FileReader();
 reader.onload=function(e){
  if(type==="before"){
    beforeData=e.target.result;
    document.getElementById("beforeImg").src=beforeData;
    document.getElementById("beforeImg").style.display="block";
  }else{
    afterData=e.target.result;
    document.getElementById("afterImg").src=afterData;
    document.getElementById("afterImg").style.display="block";
  }
 };
 reader.readAsDataURL(f);
}

/* SAVE */
function saveRex(){

 var title=document.getElementById("title").value;

 if(title===""){
  alert("Enter Title");
  return;
 }

 var obj={
  title:title,
  cat:document.getElementById("cat").value,
  before:beforeData,
  after:afterData,
  beforeDesc:document.getElementById("beforeDesc").value,
  afterDesc:document.getElementById("afterDesc").value,
  impact:document.getElementById("impact").value,
  takeaway:document.getElementById("takeaway").value
 };

 if(editIndex===-1){
   rexList.push(obj);
 }else{
   rexList[editIndex]=obj;
   editIndex=-1;
 }

 localStorage.setItem("rexData", JSON.stringify(rexList));

 alert("✅ Saved");

 resetForm();
 showSummary();
}

/* RESET */
function resetForm(){
 document.getElementById("title").value="";
 document.getElementById("beforeDesc").value="";
 document.getElementById("afterDesc").value="";
 document.getElementById("impact").value="";
 document.getElementById("takeaway").value="";

 document.getElementById("beforeImg").style.display="none";
 document.getElementById("afterImg").style.display="none";

 beforeData="";
 afterData="";
 editIndex=-1;
}

/* EDIT */
function editRex(i){

 var d=rexList[i];
 editIndex=i;

 document.getElementById("title").value=d.title;
 document.getElementById("cat").value=d.cat;

 beforeData=d.before;
 afterData=d.after;

 document.getElementById("beforeImg").src=d.before;
 document.getElementById("beforeImg").style.display="block";

 document.getElementById("afterImg").src=d.after;
 document.getElementById("afterImg").style.display="block";

 document.getElementById("beforeDesc").value=d.beforeDesc;
 document.getElementById("afterDesc").value=d.afterDesc;
 document.getElementById("impact").value=d.impact;
 document.getElementById("takeaway").value=d.takeaway;

 showCreate();
}

/* CATEGORY BUTTONS */
function buildCategoryButtons(){

 var cats=["5S","Safety","QMS","Automation","Others"];
 var html="";

 for(var i=0;i<cats.length;i++){
   var count=0;
   for(var j=0;j<rexList.length;j++){
     if(rexList[j].cat===cats[i]) count++;
   }
   html += "<button onclick=\"filterCat('"+cats[i]+"')\">"+cats[i]+" ("+count+")</button>";
 }

 html += "<button onclick='showSummary()'>All</button>";
 html += "<button onclick='printSummary()'>Export PDF</button>";

 return html;
}

/* FILTER */
function filterCat(cat){
 var list=[];
 for(var i=0;i<rexList.length;i++){
   if(rexList[i].cat===cat){
     list.push({d:rexList[i], i:i});
   }
 }
 renderSummary(list);
}

/* RENDER */
function renderSummary(list){

 var html=buildCategoryButtons();

 for(var i=0;i<list.length;i++){

  var d=list[i].d;
  var index=list[i].i;

  html+="<div class='template'>";
  html+="<b>"+d.title+"</b> ("+d.cat+") ";
  html+="<button onclick='editRex("+index+")'>Edit</button>";

  html+="<div class='row'>";

  html+="<div class='col'>";
  html+="<b>BEFORE</b>";
  html+="<div class='box'>"+(d.before? "<img src='"+d.before+"'>" : "")+"</div>";
  html+="<div class='desc'>"+d.beforeDesc+"</div>";
  html+="</div>";

  html+="<div class='col'>";
  html+="<b>AFTER</b>";
  html+="<div class='box'>"+(d.after? "<img src='"+d.after+"'>" : "")+"</div>";
  html+="<div class='desc'>"+d.afterDesc+"</div>";
  html+="</div>";

  html+="</div>";

  html+="<div class='impact'><div><b>Impact</b></div><div>"+d.impact+"</div></div>";
  html+="<div class='takeaway'>"+d.takeaway+"</div>";

  html+="</div>";
 }

 document.getElementById("summaryPage").innerHTML=html;
}

/* SHOW SUMMARY */
function showSummary(){

 document.getElementById("createPage").style.display="none";
 document.getElementById("summaryPage").style.display="block";

 var list=[];
 for(var i=0;i<rexList.length;i++){
   list.push({d:rexList[i], i:i});
 }

 renderSummary(list);
}

/* NAV */
function showCreate(){
 document.getElementById("createPage").style.display="block";
 document.getElementById("summaryPage").style.display="none";
}

/* ✅ FINAL PDF (ONE REX PER PAGE) */
function printSummary(){

 var content = document.getElementById("summaryPage").innerHTML;

 var win = window.open("", "", "width=1000,height=800");

 win.document.write(`
  <html>
  <head>
  <title>REX Report</title>

  <style>
  body{font-family:Arial;padding:20px;}

  .template{
    page-break-after: always;
    break-after: page;
    margin-bottom:20px;
  }

  .template:last-child{
    page-break-after:auto;
  }

  .row{display:flex;gap:20px;}
  .col{flex:1;}

  .box{
    border:2px solid black;
    height:180px;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .box img{max-width:100%;max-height:100%;}

  .desc{
    border:2px solid black;
    margin-top:10px;
    padding:8px;
  }

  .impact{
    display:flex;
    border:2px solid black;
    margin-top:15px;
  }

  .impact div{
    flex:1;
    padding:10px;
  }

  .takeaway{
    background:#003d66;
    color:white;
    padding:10px;
    margin-top:15px;
    text-align:center;
  }

  button{display:none;}
  </style>

  </head>

  <body>
  ${content}
  </body>
  </html>
 `);

 win.document.close();

 setTimeout(function(){
  win.print();
 },500);
}

/* EVENTS */
document.addEventListener("DOMContentLoaded",function(){

 document.getElementById("beforeFile").onchange=function(){
  loadImage(this,"before");
 };

 document.getElementById("afterFile").onchange=function(){
  loadImage(this,"after");
 };

 document.getElementById("saveBtn").onclick=function(){
  saveRex();
 };

 document.getElementById("btnCreate").onclick=function(){
  showCreate();
 };

 document.getElementById("btnSummary").onclick=function(){
  showSummary();
 };

 showSummary();

});

</script>

<!-- ✅ FIREBASE CODE ADD HERE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, updateDoc, doc, deleteDoc }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "PASTE_YOUR_API_KEY",
  authDomain: "PASTE_YOUR_AUTH_DOMAIN",
  projectId: "PASTE_YOUR_PROJECT_ID",
  storageBucket: "PASTE_YOUR_BUCKET",
  messagingSenderId: "PASTE_YOUR_SENDER_ID",
  appId: "PASTE_YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ✅ Make global
window.db = db;
window.rexList = [];

// ✅ REAL-TIME LOAD
onSnapshot(collection(db, "rex"), (snapshot) => {

  window.rexList = [];

  snapshot.forEach(docSnap => {
    window.rexList.push({
      ...docSnap.data(),
      id: docSnap.id
    });
  });

  showSummary();
});

</script>

</body>
</html>
