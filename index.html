
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>REX System</title>

<style>
body{font-family:Arial;padding:20px;background:#eef1f5;}

input, select, textarea{
 width:100%;
 margin:5px 0;
 padding:5px;
}

button{
 padding:10px;
 background:#005a9e;
 color:white;
 border:none;
 margin-top:10px;
}

.card{
 background:white;
 padding:10px;
 margin-top:10px;
 border-radius:6px;
}

.imgbox{
 border:1px solid black;
 height:120px;
 display:flex;
 align-items:center;
 justify-content:center;
}

.imgbox img{
 max-width:100%;
 max-height:100%;
}
</style>

<!-- ✅ CORRECT Firebase Script -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

</head>

<body>

<h2>REX System</h2>

<input id="title" placeholder="Title">

<select id="cat">
<option>5S</option>
<option>Safety</option>
<option>QMS</option>
<option>Automation</option>
<option>Others</option>
</select>

Before:
<input type="file" id="before">
<img id="bImg" width="120">

After:
<input type="file" id="after">
<img id="aImg" width="120">

<textarea id="impact" placeholder="Impact"></textarea>

<button onclick="save()">Save</button>

<hr>

<div id="summary"></div>

<script>

// ✅ FIREBASE INIT
firebase.initializeApp({
  apiKey: "AIzaSyCPUL-TGaO2PY7zYC3d1Eyx6J2oHjHWoyE",
  authDomain: "rex-multi-user-file.firebaseapp.com",
  projectId: "rex-multi-user-file"
});

var db = firebase.firestore();

var beforeData = "";
var afterData = "";

// ✅ IMAGE LOAD
document.getElementById("before").onchange = function(e){
 var r = new FileReader();
 r.onload = function(x){
  beforeData = x.target.result;
  document.getElementById("bImg").src = beforeData;
 };
 r.readAsDataURL(e.target.files[0]);
};

document.getElementById("after").onchange = function(e){
 var r = new FileReader();
 r.onload = function(x){
  afterData = x.target.result;
  document.getElementById("aImg").src = afterData;
 };
 r.readAsDataURL(e.target.files[0]);
};

// ✅ SAVE (WILL WORK NOW)
function save(){

 var title = document.getElementById("title").value;

 if(title == ""){
  alert("Enter title");
  return;
 }

 db.collection("rex").add({
  title: title,
  cat: document.getElementById("cat").value,
  before: beforeData,
  after: afterData,
  impact: document.getElementById("impact").value
 }).then(function(){
   alert("✅ Saved Successfully");
 }).catch(function(e){
   alert("Error: " + e.message);
 });

}

// ✅ LIVE DATA
db.collection("rex").onSnapshot(function(snapshot){

 var html = "";

 snapshot.forEach(function(doc){

  var d = doc.data();

  html += `
  <div class="card">
    <b>${d.title}</b> (${d.cat})
    <div class="imgbox">${d.before ? `<img src="${d.beforeer ? `${d.after}` : ""}</div>
    <p>${d.impact || ""}</p>
  </div>
  `;

 });

 document.getElementById("summary").innerHTML = html;

});

</script>

</body>
</html>
