
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>REX Management System</title>

<style>
body{
  font-family:Arial;
  margin:0;
  padding:20px;
  background:linear-gradient(135deg,#1e3a8a,#0ea5e9);
}

.main{
  background:rgba(255,255,255,0.9);
  backdrop-filter: blur(12px);
  border-radius:14px;
  padding:20px;
  max-width:1200px;
  margin:auto;
  box-shadow:0 12px 30px rgba(0,0,0,0.25);
}

h2{text-align:center;color:white;}

button{
  padding:10px 15px;
  margin:5px;
  border:none;
  border-radius:6px;
  background:#2563eb;
  color:white;
  cursor:pointer;
}
button:hover{background:#1d4ed8;}
.deleteBtn{background:#dc2626;}

textarea{
  width:100%;
  padding:6px;
  border-radius:6px;
  border:1px solid #ccc;
  margin-top:5px;
}

/* KPI */
.kpiContainer{display:flex;gap:15px;flex-wrap:wrap;}
.kpi{
  flex:1;
  min-width:150px;
  padding:15px;
  border-radius:10px;
  color:white;
  text-align:center;
}
.kpi1{background:#3b82f6;}
.kpi2{background:#10b981;}
.kpi3{background:#f59e0b;}

/* Category */
.summaryHeader{display:flex;flex-wrap:wrap;gap:10px;}
.catCard{
  background:#1e3a8a;color:white;padding:12px;border-radius:10px;
  cursor:pointer;min-width:120px;text-align:center;
}
.catCard:hover{background:#2563eb;}
.activeCat{background:#059669 !important;}

/* Chart */
.chartBox{
  background:white;border-radius:10px;padding:15px;margin-top:15px;
}

/* Cards */
.card{
  background:white;border-radius:10px;padding:15px;margin-top:15px;
}

.row{display:flex;gap:20px;}

.box{
  border:2px dashed #ddd;height:200px;
  display:flex;align-items:center;justify-content:center;
}
.box img{max-width:100%;max-height:100%;}

.section{font-weight:bold;margin-top:10px;}

.takeaway{
  background:#0c4a6e;color:white;padding:10px;margin-top:10px;
}
</style>

<!-- ✅ Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<!-- ✅ Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- ✅ Data Labels -->
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>

<!-- ✅ PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

<h2>📘 REX Management System</h2>

<button onclick="showCreate()">New REX</button>
<button onclick="showSummary()">Summary</button>

<!-- CREATE -->
<div id="createPage" class="main">

<input type="hidden" id="editId">
<input id="title" placeholder="Title"><br><br>

<select id="cat">
<option>5S</option>
<option>Safety</option>
<option>QMS</option>
<option>Automation</option>
<option>Digitization</option>
<option>Skill Development</option>
<option>Process Capability Improvement</option>
<option>Others</option>
</select>

<br><br>

<div class="row">

<!-- BEFORE -->
<div style="flex:1">
<div class="section">Before</div>
<input type="file" id="before"><br>
<img id="bImg"><br>
<textarea id="beforeDesc" placeholder="Before Description"></textarea>
</div>

<!-- AFTER -->
<div style="flex:1">
<div class="section">After</div>
<input type="file" id="after"><br>
<img id="aImg"><br>
<textarea id="afterDesc" placeholder="After Description"></textarea>
</div>

</div>

<div class="section">Impact</div>
<textarea id="impact"></textarea>

<div class="takeaway">
<textarea id="takeaway" placeholder="Key Takeaway"></textarea>
</div>

<br>
<button onclick="save()">Save REX</button>

</div>

<!-- SUMMARY -->
<div id="summaryPage" class="main" style="display:none"></div>

<script>

/* Firebase */
firebase.initializeApp({
 apiKey:"AIzaSyCPUL-TGaO2PY7zYC3d1Eyx6J2oHjHWoyE",
 authDomain:"rex-multi-user-file.firebaseapp.com",
 projectId:"rex-multi-user-file"
});

const db=firebase.firestore();

/* Image */
let beforeData="", afterData="";

before.onchange=e=>{
 let r=new FileReader();
 r.onload=evt=>{beforeData=evt.target.result;bImg.src=beforeData;}
 r.readAsDataURL(e.target.files[0]);
};

after.onchange=e=>{
 let r=new FileReader();
 r.onload=evt=>{afterData=evt.target.result;aImg.src=afterData;}
 r.readAsDataURL(e.target.files[0]);
};

/* Save */
function save(){
 let id=editId.value;

 let data={
  title:title.value,
  cat:(cat.value||"Others").trim(),
  before:beforeData,
  after:afterData,
  beforeDesc:beforeDesc.value,
  afterDesc:afterDesc.value,
  impact:impact.value,
  takeaway:takeaway.value
 };

 if(!title.value) return alert("Enter title");

 if(id){
  db.collection("rex").doc(id).update(data);
 }else{
  db.collection("rex").add(data);
 }

 alert("Saved");
 editId.value="";
}

/* Navigation */
function showCreate(){
 createPage.style.display="block";
 summaryPage.style.display="none";
}
function showSummary(){
 createPage.style.display="none";
 summaryPage.style.display="block";
 summaryPage.innerHTML="Loading...";
}

/* Load Data */
db.collection("rex").onSnapshot(snap=>{

 let data=[], count={};

 snap.forEach(doc=>{
   let d=doc.data();
   d.id=doc.id;

   let c=(d.cat||"").trim()||"Others";
   d.cat=c;

   data.push(d);
   count[c]=(count[c]||0)+1;
 });

 if(summaryPage.style.display==="block"){

 let total=data.length;

 let html=`<h3 style="text-align:center">📊 Dashboard</h3>

 <div class="kpiContainer">
  <div class="kpi kpi1">Total REX<br>${total}</div>
  <div class="kpi kpi2">Categories<br>${Object.keys(count).length}</div>
  <div class="kpi kpi3">Displayed<br>${total}</div>
 </div>

 <div class="summaryHeader">`;

 for(let c in count){
  html+=`<div class="catCard" onclick="filterCategory('${c}',this)">
           ${c}<br>${count[c]}
         </div>`;
 }

 html+=`</div>
 <div class="chartBox"><canvas id="barChart"></canvas></div>

 <div style="text-align:center">
 <button onclick="showAll()">Show All</button>
 <button onclick="exportPDF()">Export PDF</button>
 </div>

 <div id="rexList"></div>`;

 summaryPage.innerHTML=html;

 window.allData=data;

 renderList(data);
 createChart(count);
 }
});

/* Chart */
function createChart(count){

 let values=Object.values(count);
 let max=Math.max(...values)||1;

 let ctx=document.getElementById("barChart");

 if(window.chartObj) window.chartObj.destroy();

 window.chartObj=new Chart(ctx,{
  type:"bar",
  data:{
   labels:Object.keys(count),
   datasets:[{data:values,backgroundColor:"#3b82f6"}]
  },
  plugins:[ChartDataLabels],
  options:{
   plugins:{
     legend:{display:false},
     datalabels:{anchor:'end',align:'top',formatter:v=>v}
   },
   scales:{
     y:{
       beginAtZero:true,
       suggestedMax:max+1,
       ticks:{stepSize:1}
     }
   }
  }
 });
}

/* Render */
function renderList(data){
 let html="";
 data.forEach(d=>{
 html+=`<div class="card">
 <b>${d.title} (${d.cat})</b>

 <div class="row">

 <div style="flex:1">
 <div class="section">Before</div>
 <div class="box">${d.before?'<img src="'+d.before+'">':''}</div>
 <div>${d.beforeDesc||""}</div>
 </div>

 <div style="flex:1">
 <div class="section">After</div>
 <div class="box">${d.after?'<img src="'+d.after+'">':''}</div>
 <div>${d.afterDesc||""}</div>
 </div>

 </div>

 <div class="section">Impact</div>
 <div>${d.impact||""}</div>

 <div class="takeaway">${d.takeaway||""}</div>

 <button onclick="edit('${d.id}')">Edit</button>
 <button class="deleteBtn" onclick="del('${d.id}')">Delete</button>

 </div>`;
 });

 rexList.innerHTML=html;
}

/* Filter */
function filterCategory(cat,el){
 document.querySelectorAll('.catCard').forEach(x=>x.classList.remove("activeCat"));
 el.classList.add("activeCat");
 renderList(allData.filter(d=>d.cat===cat));
}

function showAll(){
 document.querySelectorAll('.catCard').forEach(x=>x.classList.remove("activeCat"));
 renderList(allData);
}

/* Edit/Delete */
function edit(id){
 let d=allData.find(x=>x.id===id);
 showCreate();

 editId.value=id;
 title.value=d.title;
 cat.value=d.cat;
 beforeData=d.before||"";
 afterData=d.after||"";
 bImg.src=beforeData;
 aImg.src=afterData;
 beforeDesc.value=d.beforeDesc||"";
 afterDesc.value=d.afterDesc||"";
 impact.value=d.impact||"";
 takeaway.value=d.takeaway||"";
}

function del(id){
 if(confirm("Delete?")) db.collection("rex").doc(id).delete();
}

/* PDF */
async function exportPDF(){
 const {jsPDF}=window.jspdf;

 let canvas=await html2canvas(rexList);
 let img=canvas.toDataURL("image/png");

 let pdf=new jsPDF();
 pdf.addImage(img,"PNG",0,0);
 pdf.save("REX_Report.pdf");
}

</script>

</body>
</html>
