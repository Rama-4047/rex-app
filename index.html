
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>REX Management System</title>

<style>
body{font-family:Arial;background:#e5e7eb;padding:20px;}
h1{margin-bottom:20px;}

button{
 padding:10px 15px;
 background:#155e95;
 color:white;
 border:none;
 margin:5px;
 cursor:pointer;
}

.main{
 background:white;
 padding:15px;
 border-radius:8px;
}

.card{
 background:#f3f4f6;
 padding:15px;
 margin-top:15px;
 border-radius:10px;
}

.row{display:flex;gap:20px;}

.box{
 border:2px solid black;
 height:200px;
 display:flex;
 align-items:center;
 justify-content:center;
}

.box img{max-width:100%;max-height:100%;}

.desc{
 border:2px solid black;
 padding:5px;
 margin-top:5px;
}

.impact{
 border:2px solid black;
 padding:10px;
 margin-top:10px;
}

.takeaway{
 background:#0c4a6e;
 color:white;
 padding:10px;
 margin-top:10px;
 text-align:center;
}
</style>

<!-- ✅ ✅ CORRECT FIREBASE SCRIPTS -->
 
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>


</head>

<body>

<h1>REX Management System</h1>

<button onclick="showCreate()">New REX</button>
<button onclick="showSummary()">Summary</button>

<!-- CREATE PAGE -->
<div id="createPage" class="main">

<input id="title" placeholder="Title"><br><br>

<select id="cat">
<option>5S</option>
<option>Safety</option>
<option>QMS</option>
<option>Automation</option>
<option>Others</option>
</select>

<br><br>

<div class="row">
<div style="flex:1">
<b>BEFORE</b><br>
<input type="file" id="before"><br>
<img id="bImg" width="100%"><br>
<textarea id="beforeDesc"></textarea>
</div>

<div style="flex:1">
<b>AFTER</b><br>
<input type="file" id="after"><br>
<img id="aImg" width="100%"><br>
<textarea id="afterDesc"></textarea>
</div>
</div>

<div class="impact">
<b>Impact</b><br>
<textarea id="impact"></textarea>
</div>

<div class="takeaway">
<textarea id="takeaway"></textarea>
</div>

<br>
<button onclick="save()">Save REX</button>

</div>

<!-- SUMMARY PAGE -->
<div id="summaryPage" class="main" style="display:none"></div>

<script>

/* ✅ FIREBASE CONFIG */
firebase.initializeApp({
 apiKey: "AIzaSyCPUL-TGaO2PY7zYC3d1Eyx6J2oHjHWoyE",
 authDomain: "rex-multi-user-file.firebaseapp.com",
 projectId: "rex-multi-user-file"
});

const db = firebase.firestore();

/* ✅ IMAGE HANDLING */
let beforeData = "";
let afterData = "";

const bImg = document.getElementById("bImg");
const aImg = document.getElementById("aImg");

document.getElementById("before").onchange = function(e){
 const reader = new FileReader();
 reader.onload = function(evt){
   beforeData = evt.target.result;
   bImg.src = beforeData;
 };
 reader.readAsDataURL(e.target.files[0]);
};

document.getElementById("after").onchange = function(e){
 const reader = new FileReader();
 reader.onload = function(evt){
   afterData = evt.target.result;
   aImg.src = afterData;
 };
 reader.readAsDataURL(e.target.files[0]);
};

/* ✅ SAVE FUNCTION */
function save(){

 console.log("Save clicked");

 const title = document.getElementById("title").value;
 const cat = document.getElementById("cat").value;
 const beforeDesc = document.getElementById("beforeDesc").value;
 const afterDesc = document.getElementById("afterDesc").value;
 const impact = document.getElementById("impact").value;
 const takeaway = document.getElementById("takeaway").value;

 if(!title){
   alert("Enter title");
   return;
 }

 db.collection("rex").add({
  title,
  cat,
  before: beforeData,
  after: afterData,
  beforeDesc,
  afterDesc,
  impact,
  takeaway
 })
 .then(()=>{
   alert("✅ Saved Successfully");
 })
 .catch(err=>{
   console.error(err);
   alert("❌ Error: " + err.message);
 });

}

/* ✅ NAVIGATION */
function showCreate(){
 document.getElementById("createPage").style.display="block";
 document.getElementById("summaryPage").style.display="none";
}

function showSummary(){
 document.getElementById("createPage").style.display="none";
 document.getElementById("summaryPage").style.display="block";
 loadData();
}

/* ✅ LOAD DATA */
function loadData(){

 db.collection("rex").get().then(snapshot=>{

  let html = "";

  snapshot.forEach(doc=>{
   const d = doc.data();

   html += `
   <div class="card">

     <b>${d.title} (${d.cat})</b>

     <div class="row">
       <div style="flex:1">
         BEFORE
         <div class="box">${d.before ? `<img src="${d.before}>${d.beforeDesc || ""}</div>
       </div>

       <div style="flex:1">
         AFTER
         <div class="box">${d.after ? `<img src="${: ""}</div>
         <div class="desc">${d.afterDesc || ""}</div>
       </div>
     </div>

     <div class="impact">
       <b>Impact</b><br>${d.impact || ""}
     </div>

     <div class="takeaway">
       ${d.takeaway || ""}
     </div>

   </div>`;
  });

  document.getElementById("summaryPage").innerHTML = html;

 });

}

</script>

</body>
</html>
