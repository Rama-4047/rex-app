
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>REX Dashboard</title>

<style>
body{
 font-family:Arial;
 background:linear-gradient(135deg,#1e3a8a,#0ea5e9);
 padding:20px;
}
.headerBox{
 background:linear-gradient(90deg,#1e3a8a,#0ea5e9);
 padding:12px;
 color:white;
 display:flex;
 justify-content:space-between;
 border-radius:10px;
}
.main{
 background:white;
 padding:20px;
 border-radius:10px;
 margin-top:15px;
}
.summaryHeader{
 display:flex;
 gap:10px;
 flex-wrap:wrap;
 justify-content:center;
}
.timelineCard{
 background:#1e3a8a;
 color:white;
 padding:8px 16px;
 border-radius:25px;
 cursor:pointer;
 position:relative;
}
.timelineCard.active{background:#22c55e;}
.cornerCount{
 position:absolute;top:-6px;left:-6px;
 background:white;color:black;padding:3px 6px;
 border-radius:8px;font-size:12px;
}
.chartWrapper{display:flex;justify-content:center;margin-top:10px;}
.chartBox{width:50%;height:260px;}
.card{
 background:#f3f4f6;
 padding:12px;
 margin-top:10px;
 border-radius:8px;
}
.row{display:flex;gap:10px;}
.box{
 height:140px;border:1px dashed #aaa;
 display:flex;justify-content:center;align-items:center;
 cursor:pointer;
}
.box img{max-width:100%;max-height:100%;}
.sectionTitle{font-weight:bold;color:#1e3a8a;}
.descBox{background:#eef2ff;padding:8px;margin-top:5px;}
.impactBox{background:#dbeafe;padding:8px;margin-top:5px;border-left:4px solid blue;}
.takeaway{background:#0c4a6e;color:white;padding:8px;margin-top:5px;}
#imgModal{
 display:none;position:fixed;width:100%;height:100%;
 background:rgba(0,0,0,0.8);
 justify-content:center;align-items:center;
}
#imgModal img{max-width:90%;max-height:90%;}
.btn{margin-top:8px;}
.deleteBtn{background:red;color:white;}
.editBtn{background:orange;color:white;}
textarea{width:100%;}
</style>

<!-- LIB -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

<div class="headerBox">
 <b>📊 REX Dashboard</b>
 <div>
  <button onclick="showCreate()">New REX</button>
  <button onclick="showSummary()">Summary</button>
 </div>
</div>

<!-- CREATE -->
<div id="createPage" class="main">

<input type="hidden" id="editId">

<input id="title" placeholder="Title"><br><br>
<input id="supplierName" placeholder="Supplier Name"><br><br>

<select id="cat">
<option>5S</option>
<option>Safety</option>
<option>Skill Development</option>
<option>Process Capability Improvement</option>
<option>QMS</option>
<option>Automation</option>
<option>Digitization</option>
<option>Others</option>
</select><br><br>

<div class="row">
<div style="flex:1">
<div class="sectionTitle">Before</div>
<input type="file" id="before"><br>
<img id="bImg">
<textarea id="beforeDesc"></textarea>
</div>

<div style="flex:1">
<div class="sectionTitle">After</div>
<input type="file" id="after"><br>
<img id="aImg">
<textarea id="afterDesc"></textarea>
</div>
</div>

<div class="sectionTitle">Impact</div>
<textarea id="impact"></textarea>

<div class="sectionTitle">Takeaway</div>
<div class="takeaway">
<textarea id="takeaway"></textarea>
</div>

<button onclick="save()">Save</button>

</div>

<!-- SUMMARY -->
<div id="summaryPage" class="main" style="display:none"></div>

<!-- ZOOM -->
<div id="imgModal" onclick="this.style.display='none'">
<img id="zoomImg">
</div>

<script>

firebase.initializeApp({
 apiKey:"YOUR_API_KEY",
 projectId:"rex-multi-user-file"
});
const db=firebase.firestore();

let allData=[];
let selectedCategory=null;
let chartInstance=null;
let selectedSupplier = null;

/* NAV */
function showCreate(){
 createPage.style.display="block";
 summaryPage.style.display="none";
}
function showSummary(){
 createPage.style.display="none";
 summaryPage.style.display="block";
}

/* IMAGE */
let beforeData="",afterData="";

before.onchange=e=>{
 if(!e.target.files[0]) return;
 let r=new FileReader();
 r.onload=x=>{beforeData=x.target.result;bImg.src=beforeData;}
 r.readAsDataURL(e.target.files[0]);
};

after.onchange=e=>{
 if(!e.target.files[0]) return;
 let r=new FileReader();
 r.onload=x=>{afterData=x.target.result;aImg.src=afterData;}
 r.readAsDataURL(e.target.files[0]);
};


/* ✅ SAVE (ADD + UPDATE) */
async function save(){

 let data={
  supplierName:supplierName.value,
  title:title.value,
  cat:cat.value,
  before:beforeData,
  after:afterData,
  beforeDesc:beforeDesc.value,
  afterDesc:afterDesc.value,
  impact:impact.value,
  takeaway:takeaway.value
 };

 try{

  if(editId.value){
   await db.collection("rex").doc(editId.value).update(data);
   alert("Updated ✅");
  }else{
   await db.collection("rex").add(data);
   alert("Saved ✅");
  }

  clearForm();
  showSummary();

 }catch(err){
  console.error(err);
  alert("Error saving record");
 }
}

/* ✅ CLEAR FORM */
function clearForm(){

 supplierName.value="";
 title.value="";
 beforeDesc.value="";
 afterDesc.value="";
 impact.value="";
 takeaway.value="";

 beforeData="";
 afterData="";

 bImg.src="";
 aImg.src="";

 editId.value="";
}



/* LOAD */
db.collection("rex").onSnapshot(snap=>{
 allData=[];
 let count={};

 snap.forEach(doc=>{
  let d=doc.data();
  d.id = doc.id;
  allData.push(d);
  count[d.cat]=(count[d.cat]||0)+1;
 });


if(summaryPage.style.display==="block")
  renderSummary(getCounts());


/* SUMMARY */
function renderSummary(count){

 
let supplierNameTitle = "";

if(allData.length > 0){
 supplierNameTitle = allData[0].supplierName || "";
}

let html = `
<div style="
background:white;
padding:15px;
border-radius:10px;
margin-bottom:15px;
text-align:center;
font-size:30px;
font-weight:bold;
color:#1e3a8a;">
🏭 ${supplierNameTitle}
</div>

<h3>
REX Dashboard
${selectedSupplier ? " - " + selectedSupplier : ""}
</h3>

`;


 html+="<div class='summaryHeader'>";
 Object.keys(count).forEach(c=>{
 html+=`
 <div class="timelineCard ${selectedCategory===c?'active':''}"
 onclick="selectCategory('${c}')">
 <div class="cornerCount">${count[c]}</div>${c}
 </div>`;
 });
 html+="</div>";

 
let suppliers = [...new Set(
 allData.map(d => d.supplierName).filter(Boolean)
)];

html += `
<div style="margin:15px 0;text-align:center;">
<label><b>Supplier Filter:</b></label>
<select onchange="filterSupplier(this.value)">
<option value="">All Suppliers</option>
${suppliers.map(s => `
<option value="${s}" ${selectedSupplier===s?'selected':''}>
${s}
</option>
`).join('')}
</select>
</div>
`;

 html+=`
 <div class="chartWrapper">
 <div class="chartBox">
 <canvas id="barChart"></canvas>
 </div>
 </div>

 <button onclick="clearFilter()">Show All</button>
 <button onclick="exportPDF()">Export PDF</button>

 <div id="rexList"></div>`;
 

function filterSupplier(supplier){

 selectedSupplier = supplier || null;

 selectedCategory = null;

 renderSummary(getCounts());
}


 summaryPage.innerHTML=html;

 renderChart(count);
 renderList();
}

/* FILTER */
function selectCategory(cat){
 selectedCategory=cat;
 renderSummary(getCounts());
}

function clearFilter(){
 selectedCategory = null;
 selectedSupplier = null;
 renderSummary(getCounts());
}


function getCounts(){

 let filteredData = allData;

 if(selectedSupplier){
  filteredData = filteredData.filter(
   d => d.supplierName === selectedSupplier
  );
 }

 let c = {};

 filteredData.forEach(d => {
  c[d.cat] = (c[d.cat] || 0) + 1;
 });

 return c;
}


/* GRAPH */
function renderChart(count){

 let labels=Object.keys(count);
 let values=Object.values(count);

 let colors=labels.map(l=>{
  return selectedCategory && l!==selectedCategory ? "#cbd5e1" : "#2563eb";
 });

 if(chartInstance) chartInstance.destroy();

 chartInstance=new Chart(barChart,{
  type:'bar',
  data:{labels,datasets:[{data:values,backgroundColor:colors}]},
  plugins:[ChartDataLabels],
  options:{
   plugins:{legend:{display:false}},
   onClick:(e,el)=>{
    if(el.length){
     selectCategory(labels[el[0].index]);
    }
   }
  }
 });
}

/* ✅ DISPLAY WITH EDIT + DELETE */
function renderList(){


let list = allData;

if(selectedSupplier){
 list = list.filter(
  d => d.supplierName === selectedSupplier
 );
}

if(selectedCategory){
 list = list.filter(
  d => d.cat === selectedCategory
 );
}



rexList.innerHTML=list.map(d=>`
 <div class="card">

 <div style="
 font-size:18px;
 font-weight:bold;
 color:#1e3a8a;
 margin-bottom:5px;">
 Supplier Name: ${d.supplierName || ""}
 </div>

 <b>${d.title}</b>

 <div>Category: ${d.cat}</div>



 <div class="row">
 <div style="flex:1">
 <div class="sectionTitle">Before</div>
 <div class="box" onclick="zoom('${d.before}')">
 ${d.before?'<img src="'+d.before+'">':''}
 </div>
 <div class="descBox">${d.beforeDesc||""}</div>
 </div>

 <div style="flex:1">
 <div class="sectionTitle">After</div>
 <div class="box" onclick="zoom('${d.after}')">
 ${d.after?'<img src="'+d.after+'">':''}
 </div>
 <div class="descBox">${d.afterDesc||""}</div>
 </div>
 </div>

 <div class="impactBox">${d.impact||""}</div>
 <div class="takeaway">${d.takeaway||""}</div>

 <button class="btn editBtn" onclick="editREX('${d.id}')">Edit</button>
 <button class="btn deleteBtn" onclick="deleteREX('${d.id}')">Delete</button>

 </div>
 `).join('');
}

/* ✅ EDIT */

function editREX(id){

 let d = allData.find(x => x.id === id);

 supplierName.value = d.supplierName || "";
 title.value = d.title;
 cat.value = d.cat;

 beforeData = d.before;
 afterData = d.after;

 bImg.src = d.before;
 aImg.src = d.after;

 beforeDesc.value = d.beforeDesc;
 afterDesc.value = d.afterDesc;
 impact.value = d.impact;
 takeaway.value = d.takeaway;

 editId.value = id;

 showCreate();
}


/* ✅ DELETE */
async function deleteREX(id){

 if(!confirm("Delete this REX?")) return;

 await db.collection("rex").doc(id).delete();

 alert("Deleted ✅");
}

/* ZOOM */
function zoom(src){
 if(!src) return;
 zoomImg.src=src;
 imgModal.style.display="flex";
}

/* PDF */
async function exportPDF(){

 const {jsPDF}=window.jspdf;

 let canvas=await html2canvas(rexList,{scale:2});
 let img=canvas.toDataURL("image/png");

 let pdf=new jsPDF("p","mm","a4");

 let imgWidth=210;
 let imgHeight=(canvas.height*imgWidth)/canvas.width;

 let heightLeft=imgHeight;
 let position=0;

 pdf.addImage(img,"PNG",0,position,imgWidth,imgHeight);
 heightLeft-=297;

 while(heightLeft>0){
  position=heightLeft-imgHeight;
  pdf.addPage();
  pdf.addImage(img,"PNG",0,position,imgWidth,imgHeight);
  heightLeft-=297;
 }

 pdf.save("REX_Report.pdf");
}

</script>

</body>
</html>
