
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>REX Management System</title>

<style>
body{
  font-family:Arial;
  margin:0;
  padding:20px;
  background:linear-gradient(135deg,#1e3a8a,#0ea5e9);
}

.main{
  background:rgba(255,255,255,0.9);
  border-radius:12px;
  padding:20px;
  max-width:1200px;
  margin:auto;
}

h2{text-align:center;color:white;}

button{
  padding:10px;
  margin:5px;
  border:none;
  background:#2563eb;
  color:white;
  border-radius:5px;
  cursor:pointer;
}
.deleteBtn{background:#dc2626;}

/* KPI */
.kpiContainer{display:flex;gap:10px;}
.kpi{flex:1;padding:10px;color:white;text-align:center;border-radius:8px;}
.kpi1{background:#3b82f6;}
.kpi2{background:#10b981;}
.kpi3{background:#f59e0b;}

/* Category */
.summaryHeader{display:flex;flex-wrap:wrap;gap:10px;}
.catCard{
  background:#1e3a8a;color:white;padding:10px;border-radius:8px;
  cursor:pointer;
}
.activeCat{background:#059669 !important;}

/* Charts */
.chartBox{
  background:white;
  padding:15px;
  margin-top:15px;
  border-radius:10px;
}

/* Cards */
.card{background:white;padding:10px;margin-top:10px;border-radius:8px;}

.row{display:flex;gap:10px;}

.box{
  height:200px;
  border:1px dashed #ccc;
  display:flex;align-items:center;justify-content:center;
}
.box img{max-width:100%;max-height:100%;}

.section{font-weight:bold;margin-top:5px;}

textarea{width:100%;margin-top:5px;}

.takeaway{background:#0c4a6e;color:white;padding:10px;margin-top:10px;}
</style>

<!-- ✅ Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<!-- ✅ Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- ✅ Data Labels -->
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>

<!-- ✅ PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

<h2>📘 REX Management System</h2>

<button onclick="showCreate()">New REX</button>
<button onclick="showSummary()">Summary</button>

<!-- CREATE -->
<div id="createPage" class="main">

<input id="title" placeholder="Title"><br><br>

<select id="cat">
<option>5S</option>
<option>Safety</option>
<option>QMS</option>
<option>Automation</option>
<option>Digitization</option>
<option>Skill Development</option>
<option>Process Capability Improvement</option>
<option>Others</option>
</select>

<br><br>

<div class="row">
<div style="flex:1">
<div class="section">Before</div>
<input type="file" id="before"><br>
<img id="bImg">
<textarea id="beforeDesc" placeholder="Before Description"></textarea>
</div>

<div style="flex:1">
<div class="section">After</div>
<input type="file" id="after"><br>
<img id="aImg">
<textarea id="afterDesc" placeholder="After Description"></textarea>
</div>
</div>

<div class="section">Impact</div>
<textarea id="impact"></textarea>

<div class="takeaway">
<textarea id="takeaway" placeholder="Takeaway"></textarea>
</div>

<br>
<button onclick="save()">Save REX</button>

</div>

<!-- SUMMARY -->
<div id="summaryPage" class="main" style="display:none"></div>

<script>

/* Firebase */
firebase.initializeApp({
 apiKey:"AIzaSy...",
 authDomain:"rex-multi-user-file.firebaseapp.com",
 projectId:"rex-multi-user-file"
});
const db=firebase.firestore();

/* Image */
let beforeData="",afterData="";

before.onchange=e=>{
 let r=new FileReader();
 r.onload=x=>{beforeData=x.target.result;bImg.src=beforeData}
 r.readAsDataURL(e.target.files[0])
};
after.onchange=e=>{
 let r=new FileReader();
 r.onload=x=>{afterData=x.target.result;aImg.src=afterData}
 r.readAsDataURL(e.target.files[0])
};

/* Save */
function save(){
 db.collection("rex").add({
  title:title.value,
  cat:cat.value,
  before:beforeData,
  after:afterData,
  beforeDesc:beforeDesc.value,
  afterDesc:afterDesc.value,
  impact:impact.value,
  takeaway:takeaway.value
 });
 alert("Saved");
}

/* Nav */
function showCreate(){createPage.style.display="block";summaryPage.style.display="none";}
function showSummary(){createPage.style.display="none";summaryPage.style.display="block";}

/* Load */
db.collection("rex").onSnapshot(snap=>{

 let data=[],count={};

 snap.forEach(doc=>{
  let d=doc.data();
  data.push(d);
  count[d.cat]=(count[d.cat]||0)+1;
 });

 if(summaryPage.style.display==="block"){

 let html=`<h3>📊 Dashboard</h3>

 <div class="kpiContainer">
 <div class="kpi kpi1">Total<br>${data.length}</div>
 <div class="kpi kpi2">Categories<br>${Object.keys(count).length}</div>
 <div class="kpi kpi3">Displayed<br>${data.length}</div>
 </div>

 <div class="summaryHeader">`;

 for(let c in count){
  html+=`<div class="catCard">${c}<br>${count[c]}</div>`;
 }

 html+=`</div>

 <!-- ✅ PIE -->
 <div class="chartBox">
 <h4>Distribution</h4>
 <canvas id="pieChart"></canvas>
 </div>

 <!-- ✅ BAR -->
 <div class="chartBox">
 <h4>Category Count</h4>
 <canvas id="barChart"></canvas>
 </div>

 <div id="rexList"></div>`;

 summaryPage.innerHTML=html;

 renderList(data);
 createPieChart(count);
 createBarChart(count);
 }

});

/* ✅ PIE */
function createPieChart(count){
 new Chart(document.getElementById("pieChart"),{
  type:'pie',
  data:{
   labels:Object.keys(count),
   datasets:[{
    data:Object.values(count),
    backgroundColor:['#3b82f6','#10b981','#f59e0b','#ef4444']
   }]
  },
  plugins:[ChartDataLabels],
  options:{
   plugins:{
    datalabels:{
     color:"#fff",
     formatter:(v,ctx)=>{
      let total=Object.values(count).reduce((a,b)=>a+b,0);
      return ((v/total)*100).toFixed(1)+"%";
     }
    }
   }
  }
 });
}

/* ✅ BAR */
function createBarChart(count){
 new Chart(document.getElementById("barChart"),{
  type:'bar',
  data:{
   labels:Object.keys(count),
   datasets:[{
    data:Object.values(count),
    backgroundColor:'#3b82f6'
   }]
  }
 });
}

/* Render */
function renderList(data){
 let html="";
 data.forEach(d=>{
 html+=`<div class="card"><b>${d.title}</b></div>`;
 });
 rexList.innerHTML=html;
}

</script>

</body>
</html>
