
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>REX Dashboard</title>

<style>
body{
  font-family:Arial;
  background:linear-gradient(135deg,#1e3a8a,#0ea5e9);
  padding:20px;
}

.main{
  background:white;
  border-radius:12px;
  padding:20px;
  max-width:1100px;
  margin:auto;
}

h2{text-align:center;color:white;}

button{
  padding:10px;
  margin:5px;
  background:#2563eb;
  color:white;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.deleteBtn{background:#dc2626;}

textarea{width:100%;}

/* CATEGORY */
.summaryHeader{
 display:flex;
 flex-wrap:wrap;
 gap:10px;
 justify-content:center;
}

.timelineCard{
 background:#1e3a8a;
 color:white;
 padding:10px;
 border-radius:20px;
 cursor:pointer;
 text-align:center;
 position:relative;
}

.cornerCount{
 position:absolute;
 top:-5px;
 left:-5px;
 background:white;
 color:black;
 padding:4px 8px;
 border-radius:10px;
}

/* CHART */
.chartWrapper{
 display:flex;
 justify-content:center;
}
.chartBox{
 width:80%;
 height:350px;
}

/* CARDS */
.card{
 background:#f3f4f6;
 padding:10px;
 margin-top:10px;
 border-radius:8px;
}

.row{
 display:flex;
 gap:10px;
}

.box{
 height:150px;
 border:1px dashed #ccc;
 display:flex;
 justify-content:center;
 align-items:center;
}
.box img{
 max-width:100%;
 max-height:100%;
}

.desc{
 font-size:13px;
 margin-top:4px;
}

.takeaway{
 background:#0c4a6e;
 color:white;
 padding:6px;
 margin-top:5px;
}
</style>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<!-- Chart -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>

<!-- PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

<h2>📊 REX Dashboard</h2>

<button onclick="showCreate()">New REX</button>
<button onclick="showSummary()">Summary</button>

<!-- CREATE -->
<div id="createPage" class="main">

<input type="hidden" id="editId">

<input id="title" placeholder="Title"><br><br>

<select id="cat">
<option>5S</option>
<option>Safety</option>
<option>QMS</option>
<option>Automation</option>
<option>Digitization</option>
<option>Others</option>
</select><br><br>

<div class="row">
<div style="flex:1">
Before <input type="file" id="before"><br>
<img id="bImg">
<textarea id="beforeDesc"></textarea>
</div>

<div style="flex:1">
After <input type="file" id="after"><br>
<img id="aImg">
<textarea id="afterDesc"></textarea>
</div>
</div>

<textarea id="impact"></textarea>

<div class="takeaway">
<textarea id="takeaway"></textarea>
</div>

<button onclick="save()">Save</button>
</div>

<!-- SUMMARY -->
<div id="summaryPage" class="main" style="display:none"></div>

<script>

firebase.initializeApp({
 apiKey:"AIzaSyCPUL-TGaO2PY7zYC3d1Eyx6J2oHjHWoyE",
 authDomain:"rex-multi-user-file.firebaseapp.com",
 projectId:"rex-multi-user-file"
});

const db=firebase.firestore();

/* NAV */
function showCreate(){
 createPage.style.display="block";
 summaryPage.style.display="none";
}

function showSummary(){
 createPage.style.display="none";
 summaryPage.style.display="block";
 summaryPage.innerHTML="<h3>Loading...</h3>";
}

/* IMAGE */
let beforeData="",afterData="";
before.onchange=e=>{
 let r=new FileReader();
 r.onload=x=>{beforeData=x.target.result;bImg.src=beforeData;}
 r.readAsDataURL(e.target.files[0]);
};
after.onchange=e=>{
 let r=new FileReader();
 r.onload=x=>{afterData=x.target.result;aImg.src=afterData;}
 r.readAsDataURL(e.target.files[0]);
};

/* SAVE */
function save(){

 if(!title.value) return alert("Enter title");

 let id=editId.value;

 let data={
  title:title.value,
  cat:cat.value,
  before:beforeData,
  after:afterData,
  beforeDesc:beforeDesc.value,
  afterDesc:afterDesc.value,
  impact:impact.value,
  takeaway:takeaway.value
 };

 if(id){
  db.collection("rex").doc(id).update(data).then(()=>alert("Updated"));
 }else{
  db.collection("rex").add(data).then(()=>alert("Saved"));
 }
}

/* LOAD */
db.collection("rex").onSnapshot(snap=>{

 let data=[],count={};

 snap.forEach(doc=>{
  let d=doc.data();
  d.id=doc.id;
  data.push(d);
  count[d.cat]=(count[d.cat]||0)+1;
 });

 if(summaryPage.style.display==="block"){

 let html="<h3>Dashboard</h3>";

 html+="<div class='summaryHeader'>";
 for(let c in count){
 html+=`
 <div class="timelineCard" onclick="filter('${c}')">
  <div class="cornerCount">${count[c]}</div>
  ${c}
 </div>`;
 }
 html+="</div>";

 html+=`
 <div class="chartWrapper">
 <div class="chartBox">
 <canvas id="barChart"></canvas>
 </div>
 </div>

 <button onclick="showAll()">Show All</button>
 <button onclick="exportPDF()">Export PDF</button>

 <div id="rexList"></div>`;

 summaryPage.innerHTML=html;

 window.allData=data;

 renderList(data);
 createChart(count);
 }

});

/* ✅ GRAPH CLICK FILTER */
function createChart(count){

 let labels=Object.keys(count);
 let values=Object.values(count);

 new Chart(barChart,{
  type:'bar',
  data:{
   labels:labels,
   datasets:[{data:values}]
  },
  plugins:[ChartDataLabels],
  options:{
   onClick:(e,el)=>{
    if(el.length){
     let cat=labels[el[0].index];
     filter(cat);
    }
   }
  }
 });
}

/* FILTER */
function filter(cat){
 renderList(allData.filter(d=>d.cat===cat));
}

function showAll(){
 renderList(allData);
}

/* ✅ FULL DISPLAY */
function renderList(data){

 rexList.innerHTML=data.map(d=>`
 <div class="card">

 <b>${d.title} (${d.cat})</b>

 <div class="row">

 <div style="flex:1">
 <div class="box">${d.before?'<img src="'+d.before+'">':''}</div>
 <div class="desc">${d.beforeDesc||""}</div>
 </div>

 <div style="flex:1">
 <div class="box">${d.after?'<img src="'+d.after+'">':''}</div>
 <div class="desc">${d.afterDesc||""}</div>
 </div>

 </div>

 <div><b>Impact:</b> ${d.impact||""}</div>

 <div class="takeaway"><b>Takeaway:</b> ${d.takeaway||""}</div>

 <button onclick="edit('${d.id}')">Edit</button>
 <button class="deleteBtn" onclick="del('${d.id}')">Delete</button>

 </div>
 `).join('');
}

/* EDIT */
function edit(id){
 let d=allData.find(x=>x.id===id);

 showCreate();

 editId.value=id;
 title.value=d.title;
 cat.value=d.cat;

 beforeData=d.before;
 afterData=d.after;

 bImg.src=d.before;
 aImg.src=d.after;

 beforeDesc.value=d.beforeDesc;
 afterDesc.value=d.afterDesc;
 impact.value=d.impact;
 takeaway.value=d.takeaway;
}

/* DELETE */
function del(id){
 if(confirm("Delete?")){
  db.collection("rex").doc(id).delete();
 }
}

/* PDF */
async function exportPDF(){
 const {jsPDF}=window.jspdf;
 let canvas=await html2canvas(rexList);
 let img=canvas.toDataURL("image/png");

 let pdf=new jsPDF();
 pdf.addImage(img,"PNG",0,0);
 pdf.save("REX_Report.pdf");
}

</script>

</body>
</html>
