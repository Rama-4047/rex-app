
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>REX Dashboard</title>

<style>
body{
  font-family:Arial;
  background:linear-gradient(135deg,#1e3a8a,#0ea5e9);
  padding:20px;
}

.main{
  background:white;
  border-radius:12px;
  padding:20px;
  max-width:1100px;
  margin:auto;
}

h2{text-align:center;color:white;}

button{
  padding:10px 15px;
  margin:5px;
  background:#2563eb;
  color:white;
  border:none;
  border-radius:6px;
  cursor:pointer;
}
.deleteBtn{background:#dc2626;}

textarea{width:100%;margin-top:5px;}

/* Category */
.summaryHeader{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  justify-content:center;
}
.catCard{
  background:#1e3a8a;
  color:white;
  padding:8px 14px;
  border-radius:25px;
  cursor:pointer;
}
.activeCat{background:#059669 !important;}

/* Chart */
.chartWrapper{
  display:flex;
  justify-content:center;
  margin-top:20px;
}
.chartBox{
  width:80%;
  height:350px;
}

/* Cards */
.card{
  background:#f3f4f6;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
}

.row{display:flex;gap:10px;}

.box{
  height:180px;
  border:1px dashed #ccc;
  display:flex;
  align-items:center;
  justify-content:center;
}
.box img{max-width:100%;max-height:100%;}
</style>

<!-- ✅ Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<!-- ✅ Chart -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>

</head>

<body>

<h2>📊 REX Dashboard</h2>

<button onclick="showCreate()">New REX</button>
<button onclick="showSummary()">Summary</button>

<!-- CREATE -->
<div id="createPage" class="main">

<input type="hidden" id="editId">

<input id="title" placeholder="Title"><br><br>

<select id="cat">
<option>5S</option>
<option>Safety</option>
<option>QMS</option>
<option>Automation</option>
<option>Digitization</option>
<option>Skill Development</option>
<option>Process Capability Improvement</option>
<option>Others</option>
</select>

<br><br>

<div class="row">

<div style="flex:1">
Before
<input type="file" id="before"><br>
<img id="bImg">
<textarea id="beforeDesc"></textarea>
</div>

<div style="flex:1">
After
<input type="file" id="after"><br>
<img id="aImg">
<textarea id="afterDesc"></textarea>
</div>

</div>

<textarea id="impact"></textarea>

<div>
<textarea id="takeaway"></textarea>
</div>

<button onclick="save()">Save</button>

</div>

<!-- SUMMARY -->
<div id="summaryPage" class="main" style="display:none"></div>

<script>

/* Firebase */
firebase.initializeApp({
 apiKey:"AIzaSyCPUL-TGaO2PY7zYC3d1Eyx6J2oHjHWoyE",
 authDomain:"rex-multi-user-file.firebaseapp.com",
 projectId:"rex-multi-user-file"
});

const db=firebase.firestore();

/* Navigation */
function showCreate(){
 createPage.style.display="block";
 summaryPage.style.display="none";
}

function showSummary(){
 createPage.style.display="none";
 summaryPage.style.display="block";
 summaryPage.innerHTML="<h3 style='text-align:center'>Loading...</h3>";
}

/* Images */
let beforeData="",afterData="";

before.onchange=e=>{
 let r=new FileReader();
 r.onload=x=>{beforeData=x.target.result;bImg.src=beforeData;}
 r.readAsDataURL(e.target.files[0]);
};

after.onchange=e=>{
 let r=new FileReader();
 r.onload=x=>{afterData=x.target.result;aImg.src=afterData;}
 r.readAsDataURL(e.target.files[0]);
};

/* Save */
function save(){

 if(!title.value){
  alert("Enter Title");
  return;
 }

 let data={
  title:title.value,
  cat:cat.value,
  before:beforeData,
  after:afterData,
  beforeDesc:beforeDesc.value,
  afterDesc:afterDesc.value,
  impact:impact.value,
  takeaway:takeaway.value
 };

 db.collection("rex").add(data)
 .then(()=>alert("Saved"))
 .catch(err=>{
  console.error(err);
  alert("Save Failed");
 });
}

/* Load Dashboard */
db.collection("rex").onSnapshot(snap=>{

 let data=[],count={};

 snap.forEach(doc=>{
  let d=doc.data();
  data.push(d);

  let c=d.cat || "Others";
  count[c]=(count[c]||0)+1;
 });

 if(summaryPage.style.display==="block"){

 let html=`<h3 style="text-align:center">Dashboard</h3>

 <div class="summaryHeader">`;

 for(let c in count){
  html+=`<div class="catCard" onclick="filterCategory('${c}',this)">
   ${c}<br>${count[c]}
  </div>`;
 }

 html+=`</div>

 <div class="chartWrapper">
  <div class="chartBox">
   <canvas id="barChart"></canvas>
  </div>
 </div>

 <div style="text-align:center">
  <button onclick="showAll()">Show All</button>
 </div>

 <div id="rexList"></div>`;

 summaryPage.innerHTML=html;

 window.allData=data;

 renderList(data);
 createChart(count);
 }
});

/* Chart */
function createChart(count){

 let labels=Object.keys(count);
 let values=Object.values(count);

 let colors=[
  '#3b82f6','#10b981','#f59e0b','#ef4444',
  '#8b5cf6','#14b8a6','#f97316','#6366f1'
 ];

 let max=Math.max(...values)||1;

 new Chart(document.getElementById("barChart"),{
  type:'bar',
  data:{
   labels:labels,
   datasets:[{
    data:values,
    backgroundColor:colors.slice(0,labels.length),
    borderRadius:6
   }]
  },

  plugins:[ChartDataLabels],

  options:{
   maintainAspectRatio:false,
   plugins:{
    legend:{display:false},
    datalabels:{
     anchor:'end',
     align:'top',
     formatter:v=>v
    }
   },
   scales:{
    y:{
     beginAtZero:true,
     suggestedMax: Math.ceil(max*1.2),   /* ✅ AUTO SCALE */
     ticks:{
       stepSize: Math.ceil(max/5) || 1   /* ✅ SMART STEP */
     }
    }
   }
  }
 });
}

/* Filter */
function filterCategory(cat,el){
 document.querySelectorAll('.catCard').forEach(x=>x.classList.remove("activeCat"));
 el.classList.add("activeCat");
 renderList(allData.filter(d=>d.cat===cat));
}

function showAll(){
 renderList(allData);
}

/* Render */
function renderList(data){
 let html="";
 data.forEach(d=>{
 html+=`<div class="card">
 <b>${d.title} (${d.cat})</b>

 <div class="row">
 <div style="flex:1">
 <div class="box">${d.before?'<img src="'+d.before+'">':''}</div>
 </div>

 <div style="flex:1">
 <div class="box">${d.after?'<img src="'+d.after+'">':''}</div>
 </div>
 </div>

 </div>`;
 });
 rexList.innerHTML=html;
}

</script>

</body>
</html>
