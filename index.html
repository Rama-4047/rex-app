
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>REX Dashboard</title>

<style>
body{
  font-family:Arial;
  background:linear-gradient(135deg,#1e3a8a,#0ea5e9);
  padding:20px;
}

.main{
  background:white;
  border-radius:12px;
  padding:20px;
  max-width:1100px;
  margin:auto;
}

h2{text-align:center;color:white;}

button{
  padding:10px 15px;
  margin:5px;
  background:#2563eb;
  color:white;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

/* KPI */
.kpiContainer{
  display:flex;
  justify-content:center;
  gap:20px;
  margin-bottom:10px;
}
.kpi{
  width:200px;
  padding:12px;
  color:white;
  text-align:center;
  border-radius:10px;
}
.kpi1{background:#3b82f6;}
.kpi2{background:#10b981;}
.kpi3{background:#f59e0b;}

/* Categories */
.summaryHeader{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  justify-content:center;
}
.catCard{
  background:#1e3a8a;
  color:white;
  padding:10px;
  border-radius:8px;
  cursor:pointer;
  text-align:center;
}
.activeCat{background:#059669 !important;}

/* ✅ CENTER GRAPH */
.chartWrapper{
  display:flex;
  justify-content:center;
  margin-top:20px;
}

.chartBox{
  width:80%;
  height:350px;
}

/* Cards */
.card{
  background:#f8fafc;
  padding:12px;
  margin-top:10px;
  border-radius:8px;
}

.row{display:flex;gap:10px;}

.box{
  height:180px;
  border:1px dashed #ccc;
  display:flex;
  align-items:center;
  justify-content:center;
}
.box img{max-width:100%;max-height:100%;}

.section{font-weight:bold;margin-top:5px;}
.takeaway{background:#0c4a6e;color:white;padding:10px;margin-top:10px;}
</style>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<!-- Chart -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>

<!-- PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

<h2>📊 Dashboard</h2>

<button onclick="showSummary()">Summary</button>

<div id="summaryPage" class="main"></div>

<script>

/* Firebase */
firebase.initializeApp({
 apiKey:"AIzaSyCPUL-TGaO2PY7zYC3d1Eyx6J2oHjHWoyE",
 authDomain:"rex-multi-user-file.firebaseapp.com",
 projectId:"rex-multi-user-file"
});

const db=firebase.firestore();

/* Load */
db.collection("rex").onSnapshot(snap=>{

 let data=[],count={};

 snap.forEach(doc=>{
  let d=doc.data();
  data.push(d);

  let c=(d.cat||"Others").trim();
  count[c]=(count[c]||0)+1;
 });

 let html=`<h3 style="text-align:center">Dashboard</h3>

 <div class="kpiContainer">
  <div class="kpi kpi1">Total<br>${data.length}</div>
  <div class="kpi kpi2">Categories<br>${Object.keys(count).length}</div>
  <div class="kpi kpi3">Displayed<br>${data.length}</div>
 </div>

 <div class="summaryHeader">`;

 for(let c in count){
  html+=`<div class="catCard" onclick="filterCategory('${c}',this)">
   ${c}<br><b>${count[c]}</b>
  </div>`;
 }

 html+=`</div>

 <div class="chartWrapper">
  <div class="chartBox">
   <canvas id="barChart"></canvas>
  </div>
 </div>

 <div style="text-align:center">
  <button onclick="showAll()">Show All</button>
  <button onclick="exportPDF()">Export PDF</button>
 </div>

 <div id="rexList"></div>`;

 summaryPage.innerHTML=html;

 window.allData=data;

 renderList(data);
 createChart(count);
});

/* ✅ FILTER */
function filterCategory(cat,el){

 document.querySelectorAll('.catCard')
   .forEach(x=>x.classList.remove("activeCat"));

 el.classList.add("activeCat");

 let filtered = allData.filter(d=>
   d.cat && d.cat.trim().toLowerCase() === cat.toLowerCase()
 );

 renderList(filtered);
}

function showAll(){
 document.querySelectorAll('.catCard')
   .forEach(x=>x.classList.remove("activeCat"));
 renderList(allData);
}

/* ✅ IMPROVED CHART */
function createChart(count){

 let values = Object.values(count);
 let labels = Object.keys(count);

 let max = Math.max(...values);
 let suggestedMax = Math.ceil(max * 1.2);

 let step = Math.ceil(max/5) || 1;

 let ctx=document.getElementById("barChart");

 if(window.chartObj) window.chartObj.destroy();

 window.chartObj=new Chart(ctx,{
  type:'bar',
  data:{
   labels:labels,
   datasets:[{
     data:values,
     backgroundColor:[
      '#3b82f6','#10b981','#f59e0b','#ef4444',
      '#8b5cf6','#14b8a6','#f97316'
     ],
     borderRadius:8,
     barPercentage:0.6
   }]
  },
  plugins:[ChartDataLabels],
  options:{
   responsive:true,
   maintainAspectRatio:false,
   plugins:{
     legend:{display:false},
     datalabels:{
       anchor:'end',
       align:'top',
       formatter:v=>v
     }
   },
   scales:{
    y:{
      beginAtZero:true,
      suggestedMax:suggestedMax,
      ticks:{stepSize:step}
    }
   }
  }
 });
}

/* ✅ SHOW FULL DATA */
function renderList(data){

 let html="";

 data.forEach(d=>{
 html+=`
 <div class="card">
 <b>${d.title} (${d.cat})</b>

 <div class="row">

 <div style="flex:1">
 <div class="section">Before</div>
 <div class="box">${d.before?'<img src="'+d.before+'">':''}</div>
 <div>${d.beforeDesc||""}</div>
 </div>

 <div style="flex:1">
 <div class="section">After</div>
 <div class="box">${d.after?'<img src="'+d.after+'">':''}</div>
 <div>${d.afterDesc||""}</div>
 </div>

 </div>

 <div class="section">Impact</div>
 <div>${d.impact||""}</div>

 <div class="takeaway">${d.takeaway||""}</div>
 </div>`;
 });

 rexList.innerHTML=html;
}

/* ✅ PDF */
async function exportPDF(){
 const {jsPDF}=window.jspdf;

 let canvas=await html2canvas(rexList,{scale:2});
 let img=canvas.toDataURL("image/png");

 let pdf=new jsPDF("p","mm","a4");

 let w=210;
 let h=canvas.height*w/canvas.width;

 pdf.addImage(img,"PNG",0,0,w,h);
 pdf.save("REX_Report.pdf");
}

</script>

</body>
</html>
