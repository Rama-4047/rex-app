
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>REX Dashboard</title>

<style>
body{
  font-family:Arial;
  background:linear-gradient(135deg,#0f172a,#1e40af,#0ea5e9);
  padding:20px;
}

/* HEADER */
.headerBox{
  background:linear-gradient(135deg,#1e40af,#0ea5e9);
  padding:20px;
  border-radius:12px;
  max-width:1100px;
  margin:auto;
  display:flex;
  justify-content:space-between;
  color:white;
}

/* MAIN */
.main{
  background:white;
  border-radius:10px;
  padding:20px;
  max-width:1100px;
  margin:20px auto;
}

/* CATEGORY */
.summaryHeader{
  display:flex;
  flex-wrap:wrap;
  gap:15px;
  justify-content:center;
}
.timelineCard{
  width:160px;
  height:100px;
  background:#1e3a8a;
  color:white;
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  cursor:pointer;
}
.cornerCount{
  position:absolute;
  top:5px; left:5px;
  background:white;
  color:black;
  padding:3px 8px;
  font-size:12px;
  border-radius:5px;
}

/* CARD */
.card{
  margin-top:15px;
  padding:10px;
  background:#f3f4f6;
  border-radius:8px;
}

/* IMAGE */
.box{
  height:160px;
  border:1px dashed #ccc;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
}
.box img{
  max-width:100%;
  max-height:100%;
}

/* TEXT BOXES */
.descBox{
  background:#f1f5f9;
  padding:5px;
  margin-top:5px;
}
.impactBox{
  background:#e0f2fe;
  padding:8px;
  margin-top:8px;
}
.takeaway{
  background:#034e5c;
  color:white;
  padding:8px;
  margin-top:8px;
}

/* ZOOM */
#imgModal{
 display:none;
 position:fixed;
 top:0; left:0;
 width:100%;
 height:100%;
 background:rgba(0,0,0,0.8);
 justify-content:center;
 align-items:center;
}
#imgModal img{
 max-width:90%;
 max-height:90%;
}
</style>

<!-- LIBRARIES -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body>

<div class="headerBox">
  <div><b>📊 REX Dashboard</b></div>
  <div>
    <button onclick="showCreate()">New REX</button>
    <button onclick="showSummary()">Summary</button>
  </div>
</div>

<!-- CREATE -->
<div id="createPage" class="main">

<input type="hidden" id="editId">
<input id="title" placeholder="Title"><br><br>

<select id="cat">
<option>5S</option>
<option>Safety</option>
<option>Automation</option>
<option>Digitization</option>
<option>Others</option>
</select>

<br><br>

<div style="display:flex;gap:10px">

<div>
Before<br>
<input type="file" id="before"><br>
<img id="bImg">
<textarea id="beforeDesc"></textarea>
</div>

<div>
After<br>
<input type="file" id="after"><br>
<img id="aImg">
<textarea id="afterDesc"></textarea>
</div>

</div>

<textarea id="impact"></textarea>

<div class="takeaway">
<textarea id="takeaway"></textarea>
</div>

<button onclick="save()">Save</button>

</div>

<!-- SUMMARY -->
<div id="summaryPage" class="main" style="display:none"></div>

<!-- IMAGE MODAL -->
<div id="imgModal" onclick="this.style.display='none'">
<img id="zoomImg">
</div>

<script>

firebase.initializeApp({
 apiKey:"AIza...",
 authDomain:"rex-multi-user-file.firebaseapp.com",
 projectId:"rex-multi-user-file"
});
const db=firebase.firestore();

/* NAV */
function showCreate(){
 createPage.style.display="block";
 summaryPage.style.display="none";
}
function showSummary(){
 createPage.style.display="none";
 summaryPage.style.display="block";
 summaryPage.innerHTML="Loading...";
}

/* IMAGE */
let beforeData="",afterData="";
before.onchange=e=>{
 let r=new FileReader();
 r.onload=x=>{
  beforeData=x.target.result;
  bImg.src=beforeData;
 }
 r.readAsDataURL(e.target.files[0]);
};
after.onchange=e=>{
 let r=new FileReader();
 r.onload=x=>{
  afterData=x.target.result;
  aImg.src=afterData;
 }
 r.readAsDataURL(e.target.files[0]);
};

/* SAVE */
function save(){
 db.collection("rex").add({
  title:title.value,
  cat:cat.value,
  before:beforeData,
  after:afterData,
  beforeDesc:beforeDesc.value,
  afterDesc:afterDesc.value,
  impact:impact.value,
  takeaway:takeaway.value
 }).then(()=>alert("Saved"));
}

/* LOAD */
db.collection("rex").onSnapshot(snap=>{

 let data=[];
 let count={};

 snap.forEach(doc=>{
  let d=doc.data();
  d.id=doc.id;
  data.push(d);
  count[d.cat]=(count[d.cat]||0)+1;
 });

 if(summaryPage.style.display==="block"){

 let html="<h3>Dashboard</h3><div class='summaryHeader'>";

 for(let c in count){
 html+=`
 <div class="timelineCard" onclick="filter('${c}',this)">
  <div class="cornerCount">${count[c]}</div>
  ${c}
 </div>`;
 }

 html+="</div><canvas id='chart'></canvas><div id='rexList'></div>";

 summaryPage.innerHTML=html;

 window.allData=data;

 renderList(data);
 createChart(count);
 }
});

/* GRAPH WITH CLICK */
function createChart(count){

 let chart=new Chart(chart,{
  type:'bar',
  data:{
   labels:Object.keys(count),
   datasets:[{data:Object.values(count)}]
  },
  plugins:[ChartDataLabels],
  options:{
   plugins:{
    datalabels:{anchor:'end',align:'top'}
   },
   onClick:(e,el)=>{
    if(el.length>0){
     let index=el[0].index;
     let cat=chart.config.data.labels[index];
     renderList(allData.filter(d=>d.cat==cat));
    }
   }
  }
 });
}

/* FILTER */
function filter(cat){
 renderList(allData.filter(d=>d.cat==cat));
}

/* RENDER */
function renderList(data){
 rexList.innerHTML=data.map(d=>`
 <div class="card">
 <b>${d.title}</b>

 <div style="display:flex;gap:10px">

 <div>
 <div class="box" onclick="zoom('${d.before}')">
 <img src="${d.before
 <div class="descBox">${d.beforeDesc||''}</div>
 </div>

 <div>
 <div class="box" onclick="zoom('${d.after}')">
 <img src="${d.after||''iv class="descBox">${d.afterDesc||''}</div>
 </div>

 </div>

 <div class="impactBox">${d.impact||''}</div>
 <div class="takeaway">${d.takeaway||''}</div>

 <button onclick="edit('${d.id}')">Edit</button>
 <button onclick="del('${d.id}')">Delete</button>
 </div>
 `).join('');
}

/* ZOOM */
function zoom(src){
 if(!src) return;
 imgModal.style.display="flex";
 zoomImg.src=src;
}

/* EDIT */
function edit(id){
 let d=allData.find(x=>x.id==id);
 showCreate();
 title.value=d.title;
 cat.value=d.cat;
 beforeData=d.before;
 afterData=d.after;
 bImg.src=d.before;
 aImg.src=d.after;
}

/* DELETE */
function del(id){
 if(confirm("Delete?")){
  db.collection("rex").doc(id).delete();
 }
}

/* PDF */
async function exportPDF(){
 const {jsPDF}=window.jspdf;
 let canvas=await html2canvas(rexList);
 let pdf=new jsPDF();
 pdf.addImage(canvas,"PNG",0,0);
 pdf.save("REX.pdf");
}

</script>

</body>
</html>
